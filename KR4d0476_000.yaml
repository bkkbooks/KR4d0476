body:
  text: 申齋集目録别集類四元卷一序卷二序卷三説卷四書卷五記卷六記卷七碑卷八碑銘卷九碑志卷十碑志卷十一碑志卷十二祭文卷十三傳卷十四題贊卷十五雜著臣等謹案申齋集十五卷元劉嶽申撰嶽申字髙仲吉水人以學行稱於時為劉辰翁吳澄等所推重與劉詵龍仁夫齊名嘗以澄薦召為遼陽儒學副提舉不就後授泰和州判致仕學者稱為申齋先生是集乃其門人蕭洵所輯李祁為之序元季嘗付剞劂久經淪燬惟抄帙僅存顧嗣立元詩選搜羅至備獨不及此編江西通志亦謂嶽申文集今已不傳蓋屬希覯之本矣嶽申為文根柢六經而以韓蘇為圭臬故其氣骨遒上無後來卑冗之習豫章人物志以簡約峻潔許之殆非虛美至集中碑志之作居什之四五尤可據以考證史事如文天祥傳比宋史所載為詳夏貴墓志稱其出竒計立戰功甚悉而貴之失節並不為之諱且深致惋惜之詞亦非曲筆諛墓者可比洵可謂知作文之體要者也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀申齋集序廬陵文章詩書之鄒魯也斷自歐陽公而下舂容大雅鳴琚佩玉者有之刻削峭厲嵬眼澒耳者有之琳琅炳煥磊珂竒傑或同時競秀或殊世儷美在有元國初時猶聞有相頡頏以甲乙數者近至四五十年之間則惟申齋劉先生昻然獨步一時無所與讓當時在朝諸老如草廬吳公相知最先且厚虞揭諸老亦相與推敬恨不及相挽入直館閣四方嬴糧執贄而來請者足相躡於庭由是而先生之文日益富矣先生學問根據切實故其文思深逺閲涉積久故其文氣老成好持論論古今事變人品髙下確然不可易故其文詞簡而盡約而明峻潔修整而和易暢達決不肯厠一冗語贅一冗字以自同衆人與人談至有一言而足以得其終身者此先生之文之大略也先生之文多至千餘篇遭世亂蕩失過半其門人蕭洵德瑜日夜捃托編校將以刻諸梓而無其財於是吉水郡侯番易費君振逺慨然領之期以梓成當置諸郡庠使四方之聞者見者知廬陵文章一代之統系在此而德瑜復來請余文為序且謂余嘗侍教於先生先生極知愛余宜不可辭因念余之生也後數十年又逺隔江湘數百里不及見廬陵先輩諸老而猶以得見先生為幸先生每見余輒舉老杜好心事真顔色之句為余誦之余亦每念不忘今也何幸復見先生文章之有傳哉先生與客坐談笑又嘗好舉先輩諸老言論行事及其笑貌舉止一一可敬可慕故余私竊自幸以為余雖不及見廬陵先輩諸老見先生如見諸老焉後之來者雖不及見先生見先生之文章如見之諸老焉德瑜之請不可辭費侯之美意不可泯故為述之亦因以寄余懷云雲陽李祁序
