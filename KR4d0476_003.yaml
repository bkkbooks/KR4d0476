body:
  text: 申齊集卷三元劉嶽申撰說性存說昔者堯有天下天下之人被堯之澤者七十年堯樂之昔者舜有天下天下之人被舜之澤者五十年舜樂之其間堯未得舜日與歡兜共鯀之徒吁咈於朝堯何其憂也舜未得禹稷四凶族未去位舜何其憂也禹自懷襄以後作十有三載以前稷未播奏艱食鮮食民未知藝五榖當是時與湯未放桀文王未伐崇密武王周公未誅紂伐奄戮飛亷惡來其心又豈有異耶雖孔子不得位而轍環而老於行又豈有異耶以數聖人所憂則所不憂而樂可知也然而數聖人所得於天者皆不繫此何也使堯舜禹稷湯文武周公不得志行乎中國而僅僅為孔子其生知安行者固不為之減少使孔子而為堯舜禹稷湯文武周公又豈有增多於其生知安行者哉故聖人者其心所存即為道所欲即為義其德之潤身者即如富之潤屋其動容周旋中禮者即其盛德之至此所謂天所畀付天理之在人無窮逹無得志不得志者也故曰由堯舜至於湯由湯至於文王至於孔子其五百嵗同其聞知同故曰禹稷當平世為君為相顔子當亂世一簞食一瓢飲其道同古滕王守德字性存求字說於余余為孟子疏義作性存說以示之守德有如知生民物則上帝降衷雖凡民果不異乎上聖大賢雖為天子宰相為庶人果無加損乎物則無少多乎降衷則所以明善復初者當無所不用其至矣孟子道性善意也初心說三山林宗起以漢果守被檄與余同校文湖廣嘗謂余曰掾吏周克明者幕之良也問齊居之名於我我將告之曰初心子以為何如余聞而韙之曰此赤子之心也本心最初無如赤子惟此時四端萬善之根已具惟此時四肢百骸九竅之欲未開惟時雖怵惕惻隱之心其情可以為善者猶未發又安有內交要譽惡其聲而然者雜於其中也哉此最初心也故又曰本心惟是心可與天地日月四時鬼神合惟是心可以正已而物正惟是心可以格君心之非而大人者安有一毫付畀增益於其初僅能存養之不失之而已由是而舉斯心加諸彼由是引而伸之觸類而長之由是逹之天下一致而百慮同歸而殊途人見其為大人也以為其心有異乎億兆人之心而不知億兆人者為赤子之心則赤子之心未嘗不與大人同及其長也往往失其本心往往放其心而不知求浸浸為細人之歸豈不大可哀也哉克明於此蚤夜孜孜求其本心以明善復初而有志乎大人之事其誰能禦之余嘉宗起能反求其初又喜克明善取諸人故作初心說以與共學者講求之焉元統乙亥重九日廬陵劉嶽申書揭汯字元量說應奉翰林文字官揭君曼碩之子汯字伯防余請字之曰元量夫汯者水之深廣者也夫水至深廣莫如海至於海無所事防猶有防焉其深廣非其至者也夫江河有時而溢溢而人然後為之防海未有聞其溢者其量不開也夫有大功而伐有異能而矜者非功能之至也江河之量也其量可知也神禹其功能在天地在萬世而不矜不伐者四海之量也其量不可知也自有聖人以來知仁勇宜無如夫子孝弟忠信宜無如夫子而曰我無能又曰某未能一此之謂大此之謂化其所過如四序功成之不可留其所存如元氣方來之不可測此其為深廣可量不可乎哉君子學以至乎聖人者也水至海而除學至聖人而除故曰何福不除夫學如是量亦如是量如是福亦如是以是為揭汯字元量說藍氏二子字說藍氏二子其伯子之子曰思敏叔子之子曰思順皆求字於余余字敏曰伯時順曰叔時名不同而字同何也夫敏者與時俱競時不可失也苟一失之不敏莫大焉夫順者惟時是從時不可違苟一違之不順莫大焉古之學者無時不習故曰時習習敏德也古之君子隨時取中故曰時中中順德也何德輔字說元統乙亥八月望余以校文三至湖廣始識至治癸亥所得進士何槐孫德符其先蜀人由漢大司空武封汜鄉侯子孫始為南陽人唐僖宗幸蜀有諱騰者以扈駕為資州丹山令復為蜀人四世至德符遷中渡為中渡初祖其子從連為嘉定史君孫之偃為瀘州郡丞曽孫倞遷內江為內江初祖內江之子剛中兄弟三人皆舉進士子為太學上舍珙孫為貢士子演孫之孫為昌元尉汝賢昌元之子為省天元駿宋藤州文學也宋季蜀破藤州因世父文伯俞二令蒲折有德於民蒲折人歡趣之曰二令吾父母也爭留之因家焉遂為蒲折人其子宋貢士某是生祀孫貢士以槐孫貴贈蒲折縣尹終其身所知者不過藤州而上三世向微蜀僧宗壽得其先數世墓碣安知有中渡初祖而其子槐孫不免字其名哉蓋亂離奔播故家破亡一至於此槐孫以泰定丁邜賜進士歷撫州宜黃尹至是以雲夢尹同校文湖廣始知避中渡初祖諱求余更其字於是去中渡十三世矣余聞而嘉之曰司空之澤逺矣乎昔晋欒武子有大功於晋室至其孫盈而其施已沒其後降在皂𨽻聞者傷之司空至丹山不知幾世丹山至雲夢又十六世而科第仕宦方興未艾皇皇求免於藉談之愧此豈獨司空之積而已余請更其字曰德輔蓋昔人有樹槐以必其子孫為三公者已而果然此樹德之報也然至於為公為侯而德衰者有矣始慙卿慙長蔗杪之所以薄也歟公侯之子孫必有世世修德不徒食舊德者而後可復其始嗚呼難矣孟子曰輔世長民莫如德齒德不俱不可長民爵德不稱不可輔世德輔免之有公輔之符必有公輔之德詩不云乎子子孫孫勿替引之鄧願之字說鄧寧字安之以其說問於余余與之言曰寧之義為安固也子如安於仁安於貞安於至善不亦善乎既寧矣又安之將非宴安乎非安安而不能遷者乎余將改字子曰願之按釋文願辭語有之與為彼寧為此又曰寧若此無若彼故稱願辭子知願乎舜之命禹曰敬修其可願㫖哉言乎夫堯舜禹湯文武周公皆修其身可願者也故終備五福焉令名垂於萬世桀紂幽厲皆修其不可願者也故終備六極焉而惡名亦垂於萬世為桀紂為幽厲而其終有不忍言者雖桀紂幽厲其初亦豈願其至此哉大人未有不願為五福之民而願為六極者夫可願者何即可欲之謂善也故傳曰賀善故攸好德與壽富康寧考終命為類應而人有不願之者乎故惡弱與凶短折疾憂貧為類應而或者為我願之可乎余將使子為聖為賢以備五福之歸未知人生可願有大此否雖子自擇所願有大此否昔有謂孟子曰敢問所安孟子曰姑舍是乃所願則學孔子也夫孟子舍所安而求所願必有所見者也子其擇於斯二者劉昕字賔旭字說古人愛日雖斜暉無幾猶重惜之然惜之之意常如不欲其中非不欲其中不欲其昃也於是愛日之情有甚迫者矣故愛日者曰旭日始旦愛其人者如日之升今夫賓日者夏以寅春秋以邜冬以辰皆出日也今夫餞日者夏以戌春秋以酉冬以申皆納日也今夫人生或五十或二十或三四十為中身或百年或四十或五六七八十為百年夫人不能皆百嵗猶不能常夏日也則豈獨三十即二十猶不可不愛昔者夫子十有五而志於學有不待二十者矣夫子以十有五為旭日此夫子之寅賓也古以七十為稀年則十五為旭日有不信可惜乎安成劉氏子昕字賓旭美哉是父是兄之命子也朂哉是師是友之字子也夫賓者如見大賓蓋旭日甚可愛而不可玩故加敬焉兢兢焉業業焉雖然子之父兄師友之愛子至矣抑余將進子於道必始𠂻終之衛武公八九十猶使人誦詩以教戒我是尤兢兢於納日也曽子之易簀子路之結纓皆是也朂哉賓旭寅餞如賓慎終如始是終身皆旭日也朂哉賓旭申齊集卷三
