body:
  text: 申齋集卷四元劉嶽申撰書與吳草廬書吳文正公伏聞聖朝開經筵明公正講席此千載一時也在宋大儒惟程朱二夫子得以所學進講嘗有啓沃之功而一時遭逢終身䘵位何敢仰望明公則所以大啓今日之殊遇者固將大明五經四書之用大慰普天率土之望豈徒富貴榮名明公之一身而已昔我先正許文正公以道格君一由正與自宗親近屬子弟皆嘗受業至今為國名臣者皆正之徒也今天下復知高尚程朱之學以上遡孔孟遺經者皆文正之賜也雖明公今日得致身清峻為帝者師震動一時光耀四方亦何莫非文正之餘光緒業蓋自江南儒者遭時得君未有如明公今日者矣此天所以報明公平日問學之勤記覽之富也明公何以慰答天下之望哉明公宜益為江南衣冠儒士增重為臨川鄉國經學增光雖由此位極品不為峻雖門生兒子皆逹官要路不為泰雖結乘連騎奔走後先擬封君將侯王者奉給左右又豈為過哉嶽申夙辱教授而以坐貧塊守窮櫩者有年矣鄉者明公家居不能一造詣今明公在京師日覲清光與道揆法守之臣朝夕可否又何由一望見道德之光也哉鄉里楊景行賢可明公甲寅門生也甲寅至今十年與李遵道輩約及門者屢矣乃展轉蹉趺以至今賢可在門生中為最單薄在舉子中為最賢且能有為有守而不詭不激為今時最難得者初筮會昌幸得生還再調永新即以戞去假館茍活如未第前賢固不可不拜明公在明公亦不可不進賢可大抵門生難得座主座主亦難得門生此論雖近草茅然古今朝野所不能廢明公試進而教之益增其所能賢可之願亦嶽申之望也書辭干冒伏楮震凌嶽申頓首再拜答中丞賀太平書中丞來書云賀惟一再拜奉書申齋翰學先生侍右僕嘗聞山川清淑之氣鍾之在人則為文章之盛東南諸山惟衡廬為最髙其間率多文章魁卓之士世之炳耀以名能文章者僕嘗識其一二焉其懷抱道德不汲汲於利祿不終於山林者蓋想望其丰采而未得之見也往嵗令嗣子文留京師得與晤語因出示先生所為文周覽纍日令人竦敬無已伏惟先生道德之富文華之盛始吳相賢文子纍所稱道中朝薦紳來自東南者無一不以先生為今巨擘焉僕生長北方僻陋不學局於所見故聼之亦藐如也後觀子文之賢則知東南山川清淑之氣鍾之在人不然何其雄渾而深厚閎慱而勤敏若是哉先生懷藏道德不以利祿係乎其心足迹未嘗一至京師此正僕想望其丰采而未得之見者也今既獲與子文交又得示先生所為文僕幸有以自慰雖不見猶見也人來言先生耳聰目明筋力強健年踰八十尚能執筆紀述此蓋世所希有惟先生獨得天地至長之氣故精神至老而不衰以僕言之亦宜省思慮慎起居以享九五康寧之福茍天假之便尚冀一見以慰平昔之望也近辱惠教問且進且勉詞意切至先生之賜大矣援稱仲山之詩曰既明且哲以保其身又曰夙夜匪懈以事一人先生不以僕為不肖進而勉之以明哲為保身之道忠勤事君之莭若古之仲山甫者焉僕闕何人哉道德不足濟於時功業不足稱於後果而可與仲山甫者同年語也僕自去嵗得風濕疾迄今春夏尚未能出前集賢學士之際以疾不就職經又有中書參政之命在人則以為喜在僕則以為憂其出處之難蓋有不可言者未審先生其何以教我尚後命以慰區區不悉賀惟一再拜嶽申恭承嘉惠寵示報書此韓公所不能得於光範者也書詞諄厚伏讀感激貺遺孔嘉尤見情至扶衰有杞菊天隨生之糗糧暖老有毛嬙西施氏之布縷殆過几杖無不及緇衣矣此杜公所勤求於假功曹輩而得未可知者也明公以興王名世之家正主庇民之學天子大臣所倚毗宗廟社稷所委寄何藉踈逺寒微士而愛厚過當乃如朝廷所謂老成人耆壽俊古心古道雖上聖吐握何以尚之而或者乃謂此市駿骨之微權良俗薄不復聞承平君子至誠樂與真情實意槩以戰國策士權謀術數推之甚矣今人不復見古人也如嶽申者少不自力昔慙老至今耄及之豈復於明時有毫髮可補益者孔文舉有言五十之年融又過二以文舉其材猶有此恨况萬萬不及文舉八十又過二者乎居常妄論隆古用人自大舜起耕稼陶漁三十徴庸未有以用少為嫌者又安得人人必如鷹揚一老八十而後遇漢綘灌不學始有洛陽年少之論遂起顔駟三世不遇之嘆此漢所以不逮隆古也後來安車蒲輪所得老生寥寥一二語竟何補哉方今四海之士萬目睽睽萬口喁喁所希望明公者何限明公辭要路而居散地今又不留中而補外於此有天意非庸衆人所測識者伏惟千萬珍重式如玉式如金朝野幸甚謹頓首再拜奉書以聞臨楮翹企答許可用書可用答書云有壬再拜申齋提舉先生閣下王務先來奉書知體侯康適今似已到何慰如之歐碑及髙文之賜尤感厚意某於文墨本非長加以南北奔走者二十年讀書見聞有退無進一嵗中括起者不過二數次時技癢弗禁時出鄙意自不知其何如故以三求教也書未指喻詳悉啓發良多此古人之盛心豈世俗相諛以求合者所可同日語哉熊志書實祐乙邜實為差謬因閲其家譜并謬稿所録皆作寶祐乙未後得石刻更不加點勘不知其家何緣故作乙邜也然乙未亦未真此間求舊日登科録不得廬陵多故家文獻足徴其乙未省元姓名望檢考示下者歐公作金石録欲徴史傳之失謬文固不直挂齒牙既已上石豈容率爾如此也示聞銘於大手謬作可袖碎矣當時謬妄非有意於簡也亦謂若是亦足以盡事矣檀弓沐浴佩玉楚子圍宋用疊語法昔嘗聞之竊亦有意而學陋力淺未易學也兹承喻及雖不能的然有見而亦竊有會焉向在京師觀朋遊間名能文辭者求如退之答李翊書子厚答韋中立書者未見也非欲其文之省也欲知其文之所從也觀答趙秀才書則知公之於文可謂得已慕薛序悲歡溢目雙桂堂吾無間矣但於不才褒與太過有頌無規非所望於左右也又山傳既蒙不鄙不敢自外帖出數處惟髙明可否辱教當又得誨益不少此傳出世已遲其孫亟欲板行公其撥冗了之非瘍七十日不良於行復苦暑泄拜狀恕不謹子永賢昆玉同此致意不次五月九日某又拜嶽申辱書知襄奉大事已畢讀禮正嚴古詩云雖有良朋蒸也無戎雖有良朋兄也永嘆因念丁邜先大夫不祿於都城辛未先太夫人棄代於維揚雖為慶門凶變亦由我輩家人薄命上纍左右當此時不能以一字問候又安能走數千里面唁其為無戎甚矣今明公并舉五喪一時還葬此事至難此情至痛此際尤須愛重以盡慈孝惟明公深思熟念此我輩至情也見示髙文三篇為上長兒抄示二篇詞為上熊志書寶祐乙邜省試第一宋科以子午邜酉為解辰戌丑未為省乙邜非省試年分次年丙辰方為省試其年第一乃廬陵彭方逈又書補大學上舍宋舍法甚嚴初入由生員積分升外舍外舍積分升內舍積分升上舍止可書補太學生此雖異代異事亦無與文法但此等南人所知不容失實終篇甚悲甚暢謹正甚雅所擬于闐甚簡嚴然史漢之妙有在簡嚴之外者平生最慕史記初看甚有羡字羡句再看但覺好三看元無一字一句羡減一字一句即不佳此最未易學善學者惟歐公故曰序事似司馬遷舊記前輩讀檀弓云石駘仲率無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也使今人作此必曰沐浴佩玉則得兆五人者皆從之石祁子曰孰有執親之喪而若此者乎石祁子不從石祁子兆可減三個沐浴佩玉字然文字不古矣此所謂繁而不殺者也前年嘗有答趙民信論文書因祿求教子闐名并慕薛序同至皆望示以於意云何為感雙桂堂亦然可用經濟之才餘事文章故不可及當以餘光振德我輩乃見氣誼小兒退飛可笑甚感愛念瀧岡碑一本附納二兒不别上狀餘惟千萬珍重至祝至祝嶽申頓首與甘肅參政吳思可去冬留維揚聞小令似嵗晚可行親迎之禮明公此時亦可到舊治嶽申以歸計頗迫不及候迎嘗留書李逹可處上徹左右今年見闕知明公有甘肅參政之命甘肅雖比各省為逺而參政去左右丞為近明公資歷聲望皆應合到此地位然多少三品不及到者明公憂國愛民有所興除害利宜諏謀度詢庶幾謀之既臧期於可行既行期於可久孔子所謂好謀而成易所謂無咎無悔者是也若有志而謀踈又失於乘快則所至必有齟齬於事有害於物有傷甚無謂也此猶小節為宰相有大體非刺史二千石比又有大焉古人以身名俱泰者為上故難在保身保晚節保身貴明哲保晚節貴戒慎自古富貴多履危機故貴而能貧者為難以其能逺勢利故也明公起布衣歷官至參政亦榮矣常戒得常慮危其庶矣乎書生感辱知遇當以規為頌以憂為愛惟思可可與言故也嶽申此際留鄉里粗安二兒亦僅尋常舊學徒范恱古還鄉謹附拜此書范乃故人范濟卿之子貧而有守讀書有見幸與進之二兒不敢上狀末由參覿千萬為時厚愛不宣備與江西參政亷公邁書嶽申廬陵下士也明公過聼不以其愚不肖而假之以一日文衡之柄使者及門屬有湖廣先諾不得奉命承教當此時貌似不恭稱心而言實為近情何以明之場屋之士半為廬陵得者率常過半一宜避嫌嶽申又望輕材劣二宜揣已是以舟過豫章之日不敢拜閣下者此也閣下嘗有枉顧之命又有後會之期於是公卿不下士久矣乃今見之嶽申雖非其人奈何以已愚戅而使賢宰相盛德謙光遂暗昧而不章也哉古者士必有贄敢以書先竊伏念今之科舉周漢隨唐宋之遺意也周漢隋唐宋所不能行之地今皆行之矣此豈獨刀筆筐篋之徒驚悸嘆息出所不意雖儒生學士亦夢寐所不敢僥幸萬一者向非天啓宸衷明謨獨斷聖神繼述克至于今即左右小大之臣孰能及此然士氣文運猶若有所待而後昌何也以古準今漢初文帝即得賈生明逹治體武帝即得董子明道正誼唐進士多得名臣宋科尤盛不獨為國名臣者代不乏人者而為往聖繼絶學為萬世開太平者亦出於其間今國家所表章以為天下法程者皆宋科目中人也然則科目何負於人也哉天開一代文明之運必有非常情俗意所可管窺而蠡測之者矣此宜閣下所為惓惓以式克欽承自任者也閣下以歷朝勳舊之家纍世忠清之裔輟從禁省參預江西此殆天以江西士民慁閣下江西士民何其幸也雖然書生遇閣下一日之知常思所以報已閣下受朝廷數世之恩將何以報國哉閣下慱古通今歷觀古勳臣世閥之子孫能長守其富貴者何如而史册書之以美談其不然者何如而册書之以為世戒然後以耳聞目見者端居而熟念之則思過半矣書曰位不期驕祿不期侈孟子曰恭者不侮人儉者不奪人夫為明公明哲保身莫如退讓恭儉以率其家人子弟為明公計久逺莫如忠孝仁厚以自結知天地鬼神夫為主愛民為國育材皆仁厚之大者而忠孝亦在是矣若夫為治之體當今之急務有非書生所能知皆明公所不可不聞者也嶽申庸愚不足以與於此必有能為左右陳之者書辭干冒伏楮震兢不備與范德機書曩嵗從通齋湜溪二老聞足下名籍籍及與遜志益初還往所得尤多比年聞足下大肆其力於詩於今獨步益願傾倒而承顔接辭若有所待足下自海北移江西雖為底僚然在執法理難相即今兹適有過洪之役而不敢必為踵門之見故以書寓萬一嶽申蚤嵗無復世意又不獨學不若人而止獨有一事在胸次終不能忘人如是足下苟非當路亦不可言可言而不言其為失人失時之恨可勝道哉居常竊謂湜溪先生其學問在江東西未見有可隨行者此老固不求知而亦誰知之誰為言之今之都大名登膴仕者何必嘗窺其藩哉而廬陵遂為無人矣此不足恨所可深恨者其平生著述身後流落門生兒子無一人以為念大率貨視斯文而不復斯文視之間有意者又皆欲竊取以為干祿要譽之資於是有郭象莊子之心無侯芭太玄之意甚矣人心士習之壞也其始由此老未嘗以所著出示人尤少與四方學者談其心本出於不肯自炫與不敢自是而次第未近者不得陵躐及之學者不悟遂以為論文及道當如是祕密以此求此老則并與其心事失之矣又何以論其學問哉足下及今多方求索而表章之猶可收拾散亡久則遂不復可得矣近年學校多為逹官摹刻文字使吾鄉有此老著書一二豈為四方學者稍具心目大史公有言巖冗之士趍舍有時若此類名湮沒而不稱悲夫閭巷之士欲砥行立名者非附青雲之士惡能施於後世哉此語可痛湜溪髙弟中惟足下敬與可與語此足下官江西又要路然且不及為此一事他無責爾臨楮悚然不宣與湖廣參政書嶽申今兹多幸得從試院承顔接辭以近大君子道德之光出院又得親熏而炙者既月踰旬盛心盛德有公卿下士之風有宰相知人之度古所謂不可諼者其在斯歟席庇賴以十月末抵家即得欽納御寶札子於本路專人欽賫還納湖廣謹奉書左右嶽申中承面命先正郡公家廟繪象章服其時求敢率爾以對嘗托行可轉聞且宗廟碑用韓文袁氏先廟碑例及至九江見狄侯成甫因與啇論前事蒙見教至治中嘗用衮冕行大禮而公以下章服亦嘗議行未有定制於今家廟雖有贈典難同許魯齋陪通祀甫冕服例蓋酌古易而凖今難細思此為確論在洪會可行已詳及之兹因人行復此以聞歐用家廟遺象歐以回祿失之僅存蒸居華陽帽紫氅服一本今摹去奉獻周文忠則有碑刻在僧寺者謹用呈似伏望採覽至廟碑一節必須得先正世家某地諱某字某歷仕某官終於某官贈某官某郡公及平生行事實迹一一依問賜教方可一下筆傳俟示下即當擬呈嶽申末由嗣見即日冬寒伏惟為國為民倍加崇重不宣備答宜春秀才趙民信論文書辱書再三大抵所不當獲者理難為報荷意良厚又勤逺道欲不報不可得報與不報皆非也惠示詩文務不同流俗而有志乎古之作者韓公所謂不知直似古人亦何得於今人也每誦此言可為深悲至慨僕於文字本非所長徒願學則有志久矣然每不敢輒有所出何者誠知其未易以為知者固不可常遇而遂謂世無知者尤不可茍一遇之則百醜敗露矣趙岐稱孟子辭不迫切而意已獨至此文章至妙處然安可得岐可謂知者古人不可及正在此今人急言極論愈雜亂紛紏但覺古人不勞餘力而旁通曲暢無所不有何其易也春秋之稱微而顯夫微即不顯顯即不微君子之道淡而不厭簡而文夫淡即厭不厭即不淡簡即不文文即不簡每讀左傳史記漢書去之數千年其事其人委曲詳悉皆如當日親見而髙古要妙去人愈逺又何也寓從容於簡寡藏曲折於平易欲以整見暇以少為多非不欲髣佛近似而終不可到故有至朴而巧者不能及有至約而博者不能盡有至顯白而深晦者不能近此古人所以可師也嶽申於行輩中天資最下徒望古人慱學強記不敢希兾萬一况敢擬議其開口下筆跋涉傾倒變化反覆之妙哉孔子誦蒸民之詩而讃之曰為此者其知道乎孟子曰君子之言不下帶而道存焉此言惟知道者為能言此至言亦要道也感足下不鄙聊布區區殊不足塞厚望慚愧無任當由頓首與學士揭曼碩書去年嘗因賀元忠奉書諏問理無不徹而相遙遙復欲似往嵗風流還往不可得矣君處日邉龍光天漢我居田里蝸舍詹暄鵬鷃不同逍遙則一即辰逺想帝城風月翰苑文章衣被昭回何所不有詹望可勝惓企吾徒有劉成之今年當上春官不可不使一及門下同榜如劉鳯皆希晉接之榮皆吾徒與進與潔上聖猶然伏惟採納楮無任馳情與學士揭曼碩書留維揚日嘗附便拜書計已久徹即辰學館𢎞開經筵熟講明道有緝熙之益論功在啓沃之間此儒者之自致亦千載之相逢也曼碩退居鄉里數年一出而乘熙運固宜展素學又當好文臣未老之時宜有以自見嶽申維揚歸後未能出門有學徒真定范恱古乃故人范濟卿之子濟卿以亷吏桐鄉吾安成此來京城因得附此書逹望進而教之二兒不及上狀附上起居未會千萬自愛不備與南臺侍御王繼學書嶽申往嵗廬陵水驛匆匆一見繼從友人王實初奉書左右計此書無不逹而此心猶若未見竊謂往者致和天厯之間明公既以不負先朝不辱先正矣其後持節江東得釋機務今又由江東升華臺端將江南諸道皆被其澤豈不私竊喜幸雖然昔者參與大政彼一時也江東又一時江南諸道此又一時而前書所謂不負先朝不辱先正者則此一時猶當如彼一時何也海內時名關天下之氣運如明公與可用者有幾人今可用為中執法而明公出為臺端此氣類翕合之日而事有未易言志有未易行者奈何易之嶽申既知其未易而不憚諄復言之是責難也嶽申嘗謂詩至蒸民之四章曰既明且哲以保其身夙夜匪懈以事一人其傳曰保身者順理以守身非趨利避害而偷以全軀之謂也孟子所謂不失其身而能事親者意正如此明公既已允蹈於其初矣今豈待迂儒瞽生之論而迂儒瞽生又何足以補報萬一哉獨懷夙昔嘗有一日之知於今不可無千嵗之報何謂一日之知明公所施於不報是也何謂千嵗之報不敢以世俗庸衆人事在右者為愛也天下事有不可以書傳而明公所當自致不朽者亦非他人所能致故曰我儀圖之維仲山甫舉之愛莫助之此意近嘗為可用誦之矣復為繼學言之不置則嶽申至情也嶽申老矣無能為役矣何幸身親見之天下幸甚斯文幸甚伏惟惠念實初重來因得拜此書辭潦率不罪幸甚與歐陽元功書圭齋答書云玄頓首再拜復書提舉劉君申齋先生文席玄即辰清和承體候佳勝濟南闕有闕之道不勝願見之禱吾宗闕先闕辱書具知姪孫宗任客臘參謁座下弟緘寄雄文逮今未至不審何故亟稱督索端使復命隴阡闕採之禁事出當然流言之感矣無是也區區抱病三載始獲一歸心志凋減舊學失闕其不能為先生大夫役也審矣適候闕氏女病闕先就之相見借紙占酬凡百潦略惟闕玄加毖以夀斯文謹奉狀不宣里注歐陽頓首拜往嵗兒曹與鄉人來都城者皆嘗為書問候雖未辱惠報而鄉黨自好不敢忘昨嵗得賜書文畢即時稟知吳左丞走檄廬陵賴郡侯慨然即修完遂復舊觀此六十年所未有者也鄉里兒童父老皆知誦圭齋學士克念紹盛心盛德是以有此令姪學正來拜祠下亦既見止弟中間閻茂德來兒曹為書已具蹉跌附寄近聞有某道童與寨官李鎮撫偕行妄訴歐陽忠義擾愛大涉誣枉蓋自南北混頴之子無一足至瀧岡者惟城西歐陽忠義居仁節春秋拜掃闕祠字兢兢焉西陽宫者本以為功德寺文忠素闢佛議以為觀又避崇公諱故稱宫宫有田園山林數十里皆借蔭焉道士炎涼以歐陽氏為無人稍伐墳木之連數抱者假繕完以為名而實鬻之以與逺近有力者為棺槨為屋宇縱尋斧焉忠仁憤惋不平訴之本縣縣不為理僅有一縣令賢者又死巫蠱居仁方欲訴郡府不及而以疾不起鄉里朋友無不悵惋歎恨惟道士稱快李鎮撫為寨官其鄉但知有道士不知有歐陽久矣伏慮圭齋萬一為其所惑將入先言此皆兒曹前書未逹之故兒曹正擬及門而訴幸遇令姪故以此托之圭齋能一至廬陵拜諸祖墓拜瀧岡使鄉邦聳動驚喜諸豪民冒附者侵奪者皆知歐陽公有後為之改心易慮亦賢子孫盛德一事瀧岡幸甚鄉國幸甚伏惟動念嶽申臨楮不勝􅈤切之至答吳草廬書辱示書教又得識士展聼其議論觀其氣貌真先生之才子也於是家教逺矣鄉者劉氏人回得所賜報章固已如見儀刑况見士展乎其為慰沃無量可知也因記去年黃庸之嘗以所寫小景為贊下方竊謂今世未見有胸次氣象如古人者此最大恨事求如古人胸次氣象自先生外斷斷無第二人雖以耆年碩德而學如不及猶惜隂競辰每遇學者無不傾倒至盡於凡下者尤反覆嗟譬至再四不厭但恐已意如有不明不盡殊不見問者之為不逹此不知當在古人某地位中求之故嘗贊云其心休休其容肅肅多學多識以似以續耄有不倦瀆無不告允矣君子是宜其服恭惟先生盛德光輝未易可言語髣佛獨自負恃庶幾識其大者因士展歸侍録求教弟年年恨不能如徐則用輩一侍左右良可惜耳臨楮悵望惟兾為道為時千萬珍重與賀右丞嶽申聞古有大臣者其聲實足以威信一時其名德足以綏懷方夏其出處進退足以繫朝廷之輕重天下之安危君子小人之消長然未嘗一念有好惡之私一事有威福之擅一馬二童猶以為多三吐三握猶恐不及求之前史至甚難逢誠不圖悼耄餘生親聞見之蓋自曩嵗辱賜書教至今謙光逺猶有耀比聞以右揆而還朝為中書而居守老癃真有須臾無死之望顛崖辛苦真有到頭蘇息之期此可為世道生人賀而不足為明公賀也兒子文曰華倍費陶鎔雖賤貧未知報稱而悠邈無恨因依瞻望雲霄惟切企翹謹頓首望拜此書托之友人曽傳道以逹於閣下傳道鄉里再貢久交可敬伏惟與潔幸甚幸甚幾務餘間千萬金玉不備具與張侍郎書嘗謂自古人臣有大功德於天下能為其主建萬世帝王之業者必有賢子孫以與繼體守文之主共享太平之福故書有與國咸休之命詩有不顯亦世之歌要不可誣也三代而下享國久長者莫如漢唐宋其臣有如蕭何房玄齡趙普皆以開國元勳而其後無聞焉有不再傳者是何子孫之賢不肖制於天者若是其難必也我國家聖聖相承以道德合天心以福祿勝人力自厥初生民以來有大勳勞於國而簡在上心者其子孫茅土之封其與山河帶礪之誓相為終始為此雖聖子神孫深仁厚澤所致而先正大臣咸有一德積慶所鍾亦有自來矣嗚呼盛哉嶽申廬陵下士也素賤微見聞狹陋不足以知聖世喬木故家之盛獨自兒時從父老聞太師淮陽王崖山之功德論者比之晉羊祜宋曹彬有過無不及如以客禮禮文丞相而讀於上元庸殺之以勸為人臣不二心者此又前代所未聞皇慶更化今平章蔡國公位中書力抗權姦得罪東朝天子知其忠至治臨御肅清宫禁平章再位中書力贊賢相弼成治本天下稱其賢及泰定撥亂反正平章贊大議定大難而以明哲之見早決止足之計今天子深嘉其節而重違其志處之以承明之廬而使之與議乎政事之堂不役之以幾務之煩而使之不廢乎論思之益自古人臣以勳名終始未有如此者天下服其髙恭惟明公以淮陽之聞孫平章之仲子中朝之世家天下之正人持莭補外方將掃除瘴海之炎埃以報明時東粵之人方歡呼鼓舞曽未踰月而天子以為執法於偏方不如典禮於中朝政刑以齊逺人不如德化以綏畿甸使者數輩絡繹召還於是明公方將勒石南海之上與磨崖一碑相頡頏為不朽此杜元凱欲刻石峴山之上漢水之淵以待後世陵谷於無窮也夫元凱豈不能待後之人而必欲當日自紀其功德哉論者以為元凱好名之過余獨以為此元凱知子之明預計其後之不足以與乎此則付之後來之不可知又不如當日身親見之為愈也抑豈獨元覬哉雖羊叔子登峴山亦有身後之悲言外之感湛輩所未盡喻者於是淮陽王有賢子孫為不可及矣天也此蕭何房玄齡趙普諸公所不能得於天者嗚呼盛哉嶽申竊伏念自幼聞大師之名中嵗聞平章之賢今又幸遇明公旬宣南海道出廬陵而獨以不得見為恨又幸遇明公還朝而得一見以不負平生之願也謹以書自薦其姓名伏惟明公與進而教之幸甚臨楮悚仄與中丞許可用書嶽申伏覩臺除進位中丞公論翕然天下幸甚如嶽申者固當為中丞賀天下之人皆曰明公發身科第而至此如嶽申者又當為科第賀夫為中丞賀者不辱中丞者也為科第賀者不辱科第者也自有中丞以來豈獨可用自有科第以來亦豈獨可用而嶽申獨為可用言之者則嶽申之至情亦天下之至望也明公將何以謝中丞又何以報科第哉今天下大計有當為國家深逺慮者天下之人皆知之而明公有不知之者乎蓋昔之君子有憂治危明者彼其心豈故為是私憂過計必有髙見逺識前知其勢必出於此又必有不世之才非常之略如昔人所謂不動聲色而措天下於太山之安者而後足以當之竊伏念明公於此憂責甚重獨未易為明公賀此尤嶽申之至情亦天下之至慮也今天下大計其大者固未易言其小者又不勝舉其逺者固未易慮而近者又不可憂此非踈逺微賤之人所可妄議而在清要尤切近者不可不端居深念也夫科舉特一事耳當明公參預大政之時不能保有其舉之莫敢廢今明公為御史大夫之二又豈可謂有其廢之莫敢舉哉且聞罪人既已黜伏矣將非趣刻銷之時乎此特善者幾耳昔者讀書詩至於既明且哲以保其身夙夜匪懈以事一人以為尹吉甫深知仲山甫其言有深愛有至味所謂愛莫助之者正在此孟子以不失其身為守身以守身為事親意豈異哉前所謂為中丞賀為科第賀者在此後所謂未易為明公賀者亦在此故曰尹吉甫之詩我儀圖之維仲山甫舉之愛莫助之此春秋賦詩意也書辭干冒謹令學子彭季斗宗建持獻左右伏惟採察宗建嘗從長兒瞻履舄之光敢望與進不宣與虞伯生書詩云借曰未知亦聿既耄余嘗三復斯言未嘗不泣下沾襟也誠不自揆甲申嵗得既見君子於廬陵蓋自往嵗豫章拜府君大參以來坐歷少壯老今耄及之而無所成也豈不可為痛恨大息明公以不世出之才遇聖天子賢宰相為千載相逄與名山大川為無窮罔極四方之士雲合響應爭願出我門下者亦既有年矣退而老於臨川之上如眉山之隂講道授業載酒問竒者日踵門而不絶大江以南斷無似人嶽申杜門索居有豫章胡生名泰字志同青年妙質以公事至廬陵過余衡門之下自陳願拜虞先生而無由聞先生將之豫章幸乃得賜之一言俾得備撰杖履之末以從先生逰豈不此生萬有餘榮嶽申見其誠求􅈤至不能拒也會寒煥不時念其久客留滯又自念安得一日復為胡生謹望拜此書伏惟與而進之瞻望光儀不勝拳毣二子不敢輒上狀起居惟千萬珍重與左丞相别怯烈不花書伏自至順壬申從浙江試院得朝夕親承履舄之光今十有四年中聞明公移鎮江浙不敢僣問鈞候起居兹審宅揆中書正名左相上副一人元良之簡在下為萬方百姓之具瞻朝野歌謳室家慶愜嶽申犬馬之齒今兹八十有六雖無光範上書之日猶有老癃扶杖之心側聞命下還朝江浙父老要遮借冦攀轅臥轍者所在馬首塞道周又聞京城父老舉手加額望見明公馬上如孩提之童初見父母明公當自愛重以愛重其天下國家之身此百辟卿士所屬望亦萬億年天命人心所倚注嶽申敢不為明公誦之鄉里蒲察推官過滿還謹附拜此書少寓萬分一嚮之私臨楮無任拳切與翰林承旨歐陽元功書歲昨令姪還侍嘗拜一書居然改歲又見暮春誦人生幾何之句香醪可如蜜可人難可如期大抵自楚適燕甚逺而難時勢使然廬陵城西歐祠賴文翰一紙復還舊觀而瀧岡二百餘年宰木為陽道流日縱尋斧自朔南混六十年間頴無一足至瀧江者莭春秋惟城西子孫歐陽忠義字居仁能固窮以祖宗為念不幸去歲居仁死而道流無所忌憚借修祠為伐樹名實鬻材為棟棺槨之利重不幸閻橘山未北而吾書不及將又使土豪資左道小李反訴居仁於左右雖閣下不無惑志則會之不時而天未定有不能勝人者今居仁之孫元介余字來拜宗長惜其行期已迫而前期不以告故為書猝猝賴前書已徹尚願終惠碑尚未刻亮難為書必須題額瀧岡葬崇公夫婦而胥楊二夫人祔焉瀧岡之上為回陂回陂之上皆圭齋所當拜者孰敢為遙遙之譏但恐有藉談之忘爾行忙無以侑書小兒留太和學中不及拜起居臨楮拳切申齋集卷四
