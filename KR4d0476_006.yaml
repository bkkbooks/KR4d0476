body:
  text: 申齊集卷六元劉嶽申撰記雲南中慶路儒學新製禮器記世祖皇帝以聰明睿知神武不殺格於皇天自有朔方以來所未有也由是混一區宇盡有華夏蠻貊之地達於九州四海之外又自開闢以來所無嗚呼盛哉雲南在秦以前為鎮楚將莊蹻始王其地歷秦漢蜀晉隋唐宋置郡封王羈縻不絶國朝始王皇子視封建置行中書省亷訪司視中國至元甲戌始建夫子廟丙子春江南方被兵而雲南獨於此時落成新宫始行釋奠禮此豈非天哉於是五十年然禮器周陶歲歲春秋取具有司亷訪副使安公固始議範金而難其費始刻孝經以摹本市民間積鈔萬一千緡㑹亷訪使汪公壽昌至是其議以江西治鑄良合古制白之平章囊嘉岱合中慶路儒學正孫彬學録杜餘慶馳驛江西檄行中書省亷訪司江西以吉安為尤良以總管杜公元忠歷任憲使檄公董其事公被檄以國家崇明祀懷逺人為重申飭惟謹而達嚕噶齊托果齊嘗宣慰雲南尤喜贊成之選良工考古制為簠簋登鉶爵玷尊勺凡伯六十有八用銅十六石三鈞有竒緡五千六百七十緡有竒既成倣古而尤工以其餘財購經史子集以歸公喜形於色曰此廬陵工師之良典籍之富也今四方名能文辭可傳逺者亦莫如廬陵求記以昭示無窮則相與屬筆於劉嶽申既辭弗獲則諗於使者曰自古聖人皆修文德以來逺人而後世一之威武至有求書籍於中國而不與者元德如天逺人既來而省憲大臣知求學校禮器於錢榖甲兵之外使者知求書籍於禮器之外吾廬陵太守於簿書期㑹之間又知承流宣化於封疆之外將天地之氣藏蓄而不泄以待今日耶天將華西南夷使其民由是興於禮讓而修其孝弟忠信由是誦行夫子之言行而可使出長入治此豈錢榖甲兵簿書期㑹所敢望者哉是役也惟廬陵太守能敬其事惟雲南使者能竭其力惟亷訪使副二公平章公能知闕休又能用人皆用意久逺皆可書也於是相與復於公退而書之以為記讀書巖記至治三年江西參知政事亷公邁以愛民下士聞於江廣其秋八月定鄉試官而廬陵劉嶽申忝在選中嶽申先諾湖廣九月自湖廣歸以書獻三言於公邁曰忠孝曰恭儉曰退讓公邁與為賓主禮執書讀至盡愈益恭明日謂嶽申曰惇之顯考太師恆陽文正王嘗鎮閩陜買田築室少陵原之陽藏書二萬卷日與司徒許文正公紫陽楊先生講學太師出鎮荆鄂再入朝决大議定大計未嘗忘此書惇幼從伯兄平章仲兄中丞讀書其中後頗修理故處益市書萬卷名曰讀書巖承先志也集賢侍講學士商君琦為之圖中朝士大夫各為文字子幸記之嶽申不敢當亦不敢辭則復於公邁曰少陵原有杜城春秋杜伯所封國非乎樊川為漢樊將軍食邑韋杜二曲為唐相國故宅非乎歷代王侯將相第宅園池多矣亦嘗有如太師以藏書聞者乎樊川與韋杜二曲徒以姓得名爾又有如亷泉以太師忠清正直得姓者乎韋杜子孫又有如公邁歷官貴盛田不加多而書增置者乎萬有一焉當時之所詠歌後來之記載有不及之者乎畫與否弗論也公邁不名之曰藏書而名之曰讀書異乎鄴侯三萬軸之手未觸者矣是書也太師讀之出將入相為國名臣公邁昆季讀之歷登臺省為賢公卿公邁讀書愈多愈益忠孝恭儉退讓使萬世子孫世守此三言即萬世子孫世讀此數萬卷將與亷泉相為無窮豈可與平泉草木同年而語哉公邁曰惇敢不佩服以毋為先太師羞且以昭示子孫孫子永永無斁壽聖觀記元有天下嘉惠黎庶懷柔百神凡前代所以為民事神者有舉無廢惟九江有江湖之險而壽聖觀祠通慧真君姓張名正夫始家臨川嘗遊襄漢遇異人當宋慶元乙卯誅茒結屋九江之泥沱觜救民水旱疾厲之菑江湖河漢之厄次第衆建道院嘉祐初賜觀額封通慧先生咸淳甲戌觀燬於火皇元大德乙已始建殿皇慶癸丑觀門建橋延祐甲寅藏殿而下以次成戊午年改封真君加以孚惠仁祐徽稱泰定丁卯𤣥武殿成元統癸酉三門成凡民事神與國家從民之欲者備矣九江張鑑趙某為士請記廬陵乃為之言曰昔者聖人治天下自天地日月五行四時山嶽河海丘陵墳衍皆聽於一人而類禋望秩咸編民詩書禮樂各保有其帝衷以無獲戾於上下神祗有誦之者曰五日一風十日一雨乂曰風不鳴條雨不破塊槩未有知其善誦者也當是時天清地寧海晏而不波河翕而不泛民生其間不知帝力其後德衰菑害並至始有盲風怪雨旱乾水溢其後德愈降菑害愈至有民社者不足禦菑捍患而一切聽於神物怪神姦愈益衆矣嗟乎甚矣難乎其為後世之民也方今聖人作為舟楫以濟民車馬之所不通而民利賴之孰知乃有中流一旦號呼天地鬼神以乞其父母妻子之身者乎人非管幼安誰能濟海自訟其過惟三日不梳頭一日晏起而止又非程叔子誰能渡江正襟危坐神色泰然者則其不免於號呼一旦亦其勢也於是為政者不知先成民而後致力於神為士者不知修身以事天為民者不知遷善以逺罪其來久矣使又無明神以禦災捍患其間民將若之何昔人云吾其魚矣嗚呼甚矣難乎其為後世之民也自今九江之士與其鄉人父老率其子弟益務修其隱慝訟其內疚以庶無罪悔於俯仰間神其有不佑之者乎此明神之至願而善為政治民事神者之深望也詩不云乎豈弟君子神所勞矣瑞州路儒學大成殿記元統三年六月瑞州路學以郡侯之命鑄祭器於廬陵八月丁巳釋奠於先聖先師既乃命工度材爰作新廟凡棟梁楹桷非大材不用凡蓋瓦甃石非堅甓不施凡金碧丹堊非華采不設敞東西序坐賢哲像明年二月廟成崇髙巨鹿視舊有加侯命郡文學求記且遺余書曰筠自宋紹興壬申始遷今學而大成殿重建於紹定戊子距今至元丙子百一十年矣蓋元與之六十年也不記何以示今與後余自昔在宋微宋髙宗御書榜文殿顔曰大成之殿門曰大成殿門至今天下郡縣因之此秦漢隋唐所未聞也至大聖人詔天下尊先聖為大成至聖文宣王此又唐宋以來所未及也前記稱宋慶厯初天下皆奉詔立學筠獨後二十有三年學始克成今郡侯作新廟於科舉初罷之後此又宋初筠士所愧者也蓋昔之善言夫子者惟宰我子貢子思孟子而孟子以樂論德曲盡其妙殆兼三子之撰矣蓋堯舜不為湯武湯武不得為堯舜雖天地日月四時有所不備而夫子以堯舜湯武周公為一人以天地日月四時為一身故曰大成又非獨兼伯夷伊尹栁下惠無可無不可而已侯之作新廟也豈獨徒使諸君子求宗廟百官土木之間蓋將使在廟者皆如見聖人在天之靈來學者皆知及聖人時雨之化皆能學聖人知之至庶幾不蔽於始皆能學聖人行之盡庶幾罔缺於終上不負明時長育之恩下不負賢守教思之意若徒錮於俗學牽於末流既不得於中行又不及於狂狷知行兩失雖家至户到日取聖哲尸祝社稷之亦奚以為侯名僧嘉努以亷能治郡為良二千石是役也知事髙士昌文學解應辰學正黃少游學正鄢養正皆修其官府史袁德厥有勞力皆可書素心堂記素心堂者廬陵郭適圖南讀書之所也初圖南其先人樂南村山水而居之自號南村老人圖南因取陶詩語名堂以示繼志且求余記余惟圖南學古之學者其知素心也審矣何以余言為於是余友羅啓初方為圖南請則與之言素曰昔者舜若將終身於飲糗茹草與若固有於袗衣鼓琴皆此心也昔者夫子飯蔬食飲水此時此心為魯司冦墮三都却萊夷此時亦此心於陳蔡於宋於匡此時此心使夫子遂居夷遂浮海此時亦此心是心也惟曽㸃春服童冠浴沂詠歸近之啓初曰子之言美矣淵明疑不足以與乎此余請謂啓初言淵明樂莫樂乎淵明然淵明此樂不過飲食起居之內不在淵明一身之外則猶㸃也何以知之以遊暮春賦時運知之夫淵明固嘗為州祭酒不辭矣至以主簿召則不顧又嘗為鎮軍建威參軍不辭彭澤令不辭矣至自免去官雖公田不及穫亦不顧去家八十餘日耳見稚子候門而喜松菊猶存而喜有酒盈樽而又喜流憩遐觀見飛雲歸鳥無不可喜至於尋壑經丘見榮木流泉萬物得時尤可喜也然後登髙而嘯臨流而賦焉雖悠悠清沂閒詠以歸不啻過也夫曽㸃行不掩而志及之淵明學不足而趣有之皆素心也圖南能守先人丘墓與田廬以老可謂素其位由淵明而曽㸃由曽㸃而夫子與虞舜又得其心焉此圖南之素學也以是繼志使後之繼圖南者世無忘將南村山水世有無涯之樂南村之人有不為郭氏幸願之者乎以是為記南康路儒學重修記唐虞三代以來治天下之道具於易詩書禮樂春秋論語孟子而亡於秦雜亂於諸子百家之說湮塞於諸儒傳注之學誘壞於選舉祿利之途為政者尚吏治而論道者近異端俗流世壞厯千有餘年而不能復宋慶厯初詔天下郡縣皆立學周元公起舂陵下州得人靈性善之根於太極得仲尼顔子之樂於反身始以楚産而開北學是興河南程氏新安朱氏而後六經孔孟之書復明於天下禮樂政刑之源復出於儒者皇元肇興益尊顯朱氏以風厲天下惟兹南康元公嘗治郡又嘗家廬山後百餘年朱文公繼之首建元公祠象於學宫重建書院於白鹿洞四方學者與郡泮諸生又親黨而炙之則所漸濡涵染者深矣廬山故以山水聞天下而道學尤盛此一時實自元公文公始自宋亡科廢元興四十年而復復二十年而又廢益都朱侯某以判官實來為政知大體先教化謂大成殿可以見聖人在天之靈觀瀾閣可以見聖人在川上之意敝宜改作若東西序有嚴有翼如覩七十子容貌講學有堂肄業有舍如濓洛考亭之風宜修飾潤色起至元丙子五月訖於七月凡良材堅甓工役既廩之費為中統萬緡侯以公事至廬陵謁余為記余既辭不獲則復於侯曰昔者鄭校毁而刺詩作魯泮修而頌聲起此不學將落之所為懼而君子小人學道所以可喜也賢侯能不以科暫廢而遂廢興學養士之規固非俗吏之所能為此邦人士亦不待科興而後讀書僅為應舉之地則元公文公之教其來久矣其自於今來者以不倦之心因勢而導無棄前功學者以有為之志乘時並進無俾後艱將德行道藝人可考而賢能歲可書各自獻於先哲以不廢於明時豈不天下國家受其福也哉不然雖駿奔走有廟藏修游息有所而無補救於人心世道人謂斯何吾為此懼逺復堂記關西馬冀伯有志節氣誼而胸次和平意象寬廣終不為險巘峭刻聽其議論必不可苟且遷就而望其色容自然益可親近愛悅蓋天資近道者也去年歲盡始相識今年一再聚而遽語離且告行使人甚愛其難得而甚恨其易失間嘗語余以其平生涉世大略慨然欲還其初今廣東帥王侯都中嘉其志為書復堂以贊其决余請為冀伯名堂逺復有難余者曰易稱不逺復而子以逺復名之非侯意且非易意奈何余曰此易也復六爻惟初知幾惟九勇决故稱不逺復故稱無祗悔元吉它爻不與也夫子贊易獨稱顔子有不善未嘗不知知之未嘗復行不以許冉閔之徒亦不及六二以上嘗試論之顔子終身惟有此一不善耳此一不善微見於心旋已覺悟即便屏絶終身無復再有萌蘖故曰不二過此所以不逺復無祗悔也過且未形而悔安有故曰元吉今人有不善久而後知知之未免復行蓋屢失屢悔以終其生豈不大可哀也哉莊周稱蘧伯玉行年五十而知四十九年之非此已逺而後復者也賴伯玉行年六十而六十化庶幾已復而不二者歟使伯玉年不登五十幾無知非之日且使伯玉六十未化則五十以後十年之間皆為知非之日何以為伯玉哉故稱逺復以自訟其不如顔子者知年歲之不吾與過之不堪二也以庶幾學顔子之學焉在宋之隆有君子曰張子厚關西之學顔子者也早恱孫吳而晚猶逃佛老子厚之復不可謂不逺矣而一變至道其勇有大過人者此非冀伯所當師者乎愧顔子之知幾希子厚之至道庶乎其可也余與冀伯相見恨晚傷人事之好乖悵年運之已往其辭危其志苦冀伯其庶乎有以助余詩不云乎我日斯邁而月斯征春暉堂記元統三年春三月四日龍興路富州斂池鄉張氏子崇髙踵門而見再拜稽首而言曰崇髙之母鄒夫人有志節有孝行朝廷旌其門曰節婦今年八十為堂曰春暉以兄弟奉夫人朝夕上壽鄉先生長者教之曰報罔極者惟圖不朽崇髙走八百里詣先生之廬以堂記請再拜而跪余謝久之諾而後起進而問之故初至元乙酉先君子巡檢河湖以其職捕盜死之祖母熊年六十一晝夜哭不絶聲夫人年二十有六崇始甫六歲崇髙甫三歲夫人感憤即欲自裁念夫婦俱棄老母弱子何益死者自誓必終養姑教二子以待其成舅欲奪志誓必至死舅語塞姑晚得疾卧起抱持晝夜不倦比殁終喪族姻稱之曰即其子存不啻如是撫二子至於今皆年過五十族姻稱之曰即其父在不啻如是母處變而德殊常劬勞異罔極又異今旌門命下而堂成無記於人子事親得無恨乎又曰詩書以來下逮後世史傳以倫誼著稱者無不待文字而後表顯於人子事親不求必得非恨之大者乎余感其言方河湖之死職也母且不遑恤况妻子乎夫人有不念姑老子幼委而去之即凱風七子能孝能言末之如何况二子乎况未能言乎且如河湖者何限湮沒無聞者多矣獨河湖乎河湖乃有妻能終養姑教子又能以其夫顯謂非賢妻可乎李少卿謂蘇子卿來時太夫人以不幸子卿婦少聞己更嫁矣果如少卿言即子卿十九年而歸而其妻不能待也河湖不幸五十年矣而夫人靡他如一日不賢而能之乎夫人今年八十耳目聰明身康强子孫逢吉天報之矣而猶未也雖使夫人滿百歲常如今日又過百歲亦如今日而亦未也必使夫人子孫孫子讀吾記者皆為孝子其庶乎又使夫人曽孫之曽孫𤣥孫之𤣥孫登斯堂者世世鄉稱善人無為斯堂之辱其庶乎斯言其可以復乎公之鄉先生長者乎必厚稽首再拜而謝請刻於堂上吉安路修學記皇元暨朔南於今五十有七年是為今天子臨御之五載興賢能之再歲廬陵之學式克修完以欽承世祖皇帝之休命於乎豈偶然之故哉初延祐科興西北之士學於江南者皆由江南貢天下西北為優江南廬陵為盛今天子開奎章閣以逹聰明親經筵以資啓沃廬陵於此時乃能修學養士以稱塞上意此天也惟學建於宋慶厯甲申中更宣和乙巳徙為東鄉改修於淳熙戊申始正南面今藏書寶慶丁亥先後二趙侯所建其故址即歐陽公學記之藏書也今振文堂與其上之尊經其旁兩廡咸淳乙丑魏侯峙所建其故址即歐陽公之堂筵齊講也今大成殿重建於皇元元貞乙未余所目擊於是歐陽公所謂嚴嚴翼翼壯偉閎耀皆無有存者矣余以泰定甲子備員鄉校顧瞻殿柱己有一易再易者况振文尊經乎又况藏書乎蓋屢請還貢士莊以給修完而不報謹能一修殿廡稍葺藏書而止甚矣其無能為役也今教授汴人王誠以至順元年庚午始至當凶年饑歲之後仰視振文愛其規制之雄深既登尊經藏書愛其氣象之廣逺念今不修後將愈敝不可以敝者纍後之人曰監郡請以貢士之羡修之監郡托果齊是其議曰此世祖皇帝之命也敢不欽承始二年冬訖三年春凡用中統鈔一萬七千五百緡有竒貢士十之瞻士一之教授與凡在學者三之凡材木瓦甓更其舊者三之一用人之力三千二百四十有四工由是振文尊經藏書復仍舊貫而有如改作他如賔客之位游息之亭稍創為之以存慶厯之舊士相與言曰昔之學創於宋慶厯開天章閣之日今之學修於天子開奎章閣之後雲漢昭回不可誣也雖然昔之來學者常三百餘人其間真知實踐能自致不朽其名與天壤相敝其志與日月爭光者既可睹矣今其庸有羞鄉校負科目者乎竊伏念先王之政其不與封建井田肉刑俱廢者惟學校貢舉而名存實亡亦未有如學校貢舉之甚者此吾黨之過也昔有北方學者著書稱五經之道至宋儒而中興偉哉言乎今天下復知尊朱氏之學五經四書如日行天此學校貢舉復古一大機括也士未有躬行心得於五經四書而名存實亡於學校貢舉者惟我廬陵遭遇明時諸君子景行先哲將復見道德明秀而有可為公卿之士將復見禮讓興行而有風俗淳之日然後為列聖深仁厚澤之所致亦賢師帥所以期待方來之意也三善堂記贑石城胡亷踵門而見示余以翰林學士臨川吳公所為其母徐墓碣余讀之廢卷而嘆亷求余一言余謝不敢抗臨川然不能郤則取墓碣所稱胡氏一家三善語名其堂曰三善而記之亷先九歲而孤值其鄉劇盜方張徐携持二子一女流離奔播者數年幾不免者屢矣亂定甫歸其不饑寒死者又幸也亷日賣卜於市中與弟更為笠屨徐夜績課亷讀書及亷稍長為童子師以代負米徐就養者數年初避冦時亷父遇所知告以某澤可避既至而徐獨疑之即他徙其夜冦果至其澤又嘗舉族盡室以行徐趣行甚疾薄暮抵邑舉族得脫他不及邑二里許者皆殱焉亂後不知曽大父母大父母其暮徐携亷披荆棘往求而得遂改葬大父如初女適廖氏者半載而廖掠於冦廖兄欲强嫁之女以死自誓不脫喪服而寢處者十有七年終於廖氏夫以胡氏之貧人所不堪而其母甘貧善處患難一難其子娣妹盛年能守心志節二難亷五十哀慕不衰三難臨所謂一家三善行莘者真厚倫矣化之名言也余謂胡氏母女流離之際有如不幸遇盜其志節必有大過人者可書當不止此昔聶政以其娣妹而得亷又能求文字以傳其母與其娣妹得俱不泯滅亷又有子天之報施其在兹乎重修慶洲書院記資水在禹貢荆州為九江之一寶慶在春秋戰國屬楚秦漢吳晉或為長沙或為昭陵或為邵陽而水出寶慶新化東流入益陽為縣屬於潭水中有洲曰慶洲皇元始升縣為州大德辛丑里人劉履泰以父命創慶洲書院捐田三百六十餘畝中書准設書院以履泰為之長歷四十年為後至元庚辰履泰以通道縣尹卒官其子壽翁克承先志以私錢萬緡更為殿堂門亷起四月迄明年八月書院為一新舊翁以其兄弟曽益良田二百畝歸復侵疆一頃而書院為再造則山長康震與有力焉震之言曰自有慶洲未有書院而創建於通道自有書院歷幾山長而再造於壽翁新學成而新田增蓋新田歸而侵田歸復厥有相道震何力之有余惟天下四書院湖湘居其一又有命世大賢父子相繼以聖賢問學為家學者以姒以續此所以有慶洲也尚論水木本原其誰忘之震其知本者乎余又聞天下學記惟歐陽公以道德明秀可為公卿者望吉之士李泰伯以為臣死忠為子死孝望後來而以美筆墨邀利逹者戒二三子是邦自朱文公張宣公極言科舉學校之弊正人心明學術至宋亡元興其間所自樹立卓絶殊常有光前哲大開來許記不為無助則今之創慶洲者而豈徒然哉竊伏念科舉興而學校欲廢六藝四書行世如日行天而士大夫不耻言利士君子不諱媦嫉人心風化至此非諸君子所當是究是圖者乎圖之此其時矣使科舉學校而無功名富貴之念即焉往而不以義為利又焉往而不心休休有容也哉此躬行心得之驗而世道生人之德也諸君子勉之豫日望之瑞芝堂記河南參政張訥翁以張夫人憂棄官不仕至元戊寅建義學其家其秋芝生梁間者五乃作瑞芝堂逺徴余記之余聞而喜曰美哉孝友之祥此唐曲江公居母喪時休徴也按五色生五嶽益五臟久服食輕身延年使人有智慧聰察仁恕忠知强勇之德比物有珊瑚截肪澤漆翠羽紫金之色而紫芝又為萬年茯苓夜有光怪佩之辟兵故在天為景星慶雲在地為醴泉甘露在榖為嘉禾在飛走為麟鳯皆其類也嘗謂生五嶽者天地中和之氣所鍾生一家者人倫孝友之感所應聖朝以同倫理天下以殊俗通五方斁倫者誅違俗者禁道並行而不相悖也張侯族出西夏家居保定揚名中外歷官臺省出其至性行其至孝有厚倫之道有易俗之心於是義學起其間於是靈芝生其上於是無人非鬼責而天祐神相之矣使侯不能棄官則不可行志不能行志則不可興學孟子曰學則三代共之皆所以明人倫也安有孝友廢而學校不可興學校不可興而祥瑞可至者哉張侯可謂出乎其類矣蘇文忠有言上以孝取人則勇者割股怯者廬墓此言極俗失世壞之弊深惡夫僞以要名者也若侯至誠惻怛由內生心以生於此化民成俗不亦善乎此豪傑之士此天下國家之福也余聞延祐科興芝生國學殿楹者九莖芝不輕為時出如此科舉賔興賢能以興孝興弟以先此其應也傳曰孝悌為仁之本又曰一家仁一國興仁國學庶學皆學也一家仁一國仁皆仁也芝有異哉余將上以為天下國家胥慶而下以為保定志喜故樂為之記四月吉水州修學記吉水鄉校自至元中縣令丞多東魯儒生凡致美於廟學者靡不畢用其至改州以來東平曹侯珣始築修堤甃夷道作新亭樹美䕃自宫墻之外以逹於內畢致力焉濟南程侯恭始遷亭出於學之外凡曹侯所不及為者又畢為之衆謂來者幾無可為矣至治三年冬知州事廣平馬侯稱德以選為州始至顧瞻廟學慨然曰修完當先廩膳當務而皆非教也謂七十子未覩厥容貌則審肖像先十哲凡綵服必明次東西序將以倣佛求聖門之氣象謂大成樂無磬則先禮樂先十六磬凡器服必備次定弟子員將以庶幾求道德之聲容然後興除利弊視先後守宰有遺慮者將不遺餘力焉嗚呼何其成之難也於是延祐科興十有二年矣吉水之士貢於鄉擢於禮部者率常倍他州縣何其盛也皆曰此興學之力也或曰科第非不盛而士志不立士氣未充何也則曰此科舉之學非古之學此科舉之文非古之文或曰今之學者非五經四書不講今之科舉非昔之科舉也皆以諗於郡文學劉嶽申則復於衆曰惟我廬陵厥初先正學問之懿者曰忠節忠節之盛自歐陽公而下既已聞於天下矣若丞相文公其志氣與日月爭光與天地相弊其人與五公皆發於科第皆不愧於聖賢由此觀之科第固未可少也然則今之士必有三年學不至於穀必有修其天爵而人爵從之者而後可以讀五經四書將見有道德明秀之士可以為公卿者出乎其間如此則士志其有不立士氣其有不充者乎此先哲之望鄉校之願也不然以土木為尸祝以玉帛鐘鼓為禮樂筆墨利逹為文學甚非馬侯所以期待之厚意亦豈聖世興學崇文之始願哉和樂堂記和樂堂者故司丞鄧君以修之所建也君不逮事其先君孝養其母何夫人友愛其弟自樹立者二十有三年而夫人即世自夫人即世載其恭儉友愛其弟以肥其家者又十有五年而君即世凡當時之豐冨而寧謐者皆和樂之所致也其名堂者以著其志其以訓也方夫人無恙其世家固己饒矣而君日率其弟以奉夫人怡怡愈愈但知有母且不復知有妻子其後家愈益饒而母不復可得君愈益怡愈如在母前但知有兄弟又安知復有財物由當時觀之君之治財未見其能孶孶未見其有他技巧也以君為迂濶者有矣三十年間財日以阜家日以肥孶孶者愧之有他技巧者愧之於是君之棄捐斯堂也十有八年矣其子嗣子復知修葺而居處之將迎其兄以繼其父之志述其父之事求范君德機大書三字以揭其顔求余文以記其壁㑹途過塗獲登斯堂堂之上新作連床嗣子願謂余曰將與伯氏聽雨於斯指其東偏曰先子之所休也伯氏至則休焉其西偏曰先子之所以處季父也嗣子處焉又曰先子之於斯也法書名畫各以其序花草佳花各以其彚一室之中一歲之內四時之氣各得其平何其樂也吾兄弟庶幾有此樂乎余告之曰兄弟無故和者樂之苟惟不和雖好貨財私妻子不樂也故自世之趣利也而父有不重於耰鋤而母有輕於箕帚者矣况兄弟乎况財物乎斯人也雖祿以萬鍾富纍千金豈有一日之樂哉子之兄弟常以子之先君子為法和樂常如一日雖廢亦興雖貧可富鄧氏之富固未有艾也夫惟力行不倦而後斯言為可必詩不云乎凡今之人莫如兄弟贑州路儒學重修大成殿記贑學創於宋慶厯中而改作於治平初元燬於紹興壬申而再造於甲戌始以壯麗甲江右大成殿故在學之西重修於紹定辛卯宋亡元興學毁兵間惟殿僅存元貞丙申左丞董公以分省來臨始遷殿於東建學於西至是殿以朽蠧不支郡長二以兩御史之命修之始盡更其棟楹梁桷之腐撓者凡蓋甃丹艧稱是為庫以貯禮器樂器新為屋以署學官建學廩起至順辛未冬仲訖壬申夏五凡用人之力三千餘工材木瓦甓之用二十萬二千有竒中銃鈔二萬六千二百緡有竒贑學以江西分司之命來請記辭之辭之而請益勤惟夫子之教自圍城弦歌而過魯太牢一時本心萬世令典後來非無干戈雲擾盜賊蝟興如風雨晦冥曽不終日而大明麗空羣慝俱失生民未有於斯為信尚論厥初有天地而有君師未有庠校而有孝敬其秩然在天常隱然在人心者百世之上百世之下猶一日也故由漢歷八代而為唐開元由唐開元而為宋慶厯由慶厯而為紹興式克至於皇元天涵地育科舉學校行乎開闢以來所未有之地况禹跡所奠秦漢郡縣之內者乎是邦其山崆峒其水章貢其俗質直而尚氣先民之獻以忠節義著稱名在郡志者往往有之使今之教者有如后䕫樂教之剛而無虐臯陶九德之彊而義洪範三德之柔克剛克洙泗及門之好勇好學其變化成就何非聖人之徒治世之良臣也哉六經四書垂憲萬世濟濟多士對越在天駿奔走在廟要皆有他日民社之責鄉邦無窮之聞今其庸少有愧於中者乎思親堂記余既銘故人彭和卿之墓其鄉鄰有為余言彭氏子孝友事者余曰孝友常事也春秋常事不書他日見與其子同學者其言詳矣他日又見與和卿有連者其言又加詳焉某槩曰和卿娶徐氏有五丈夫子其三徐出也三子既孝矣二季子孝其母有過無不及焉自吾為比鄰為姻若友皆親見生長者雖曰二季子亦徐出可也樂哉和卿有閨門雍睦之娛而無左右忌嫌之逼何其福之盛也於是和卿之墓有宿草者再矣諸子以思親名其堂而求余記余謝之曰子之思親何以記為則曰昔者親之存也以不得先生常過門為恨以不能迎致先生於家朝夕得侍先生為大恨倘幸得先生文字以為斯堂之光使諸孤升堂如有聞乎親之聲者今而聞其粲然如有見乎親之容者今而見其欣然豈特慰諸孤之思將使吾親不復有平生之恨矣此記所以不可無也余聞其言然後知鄉者其鄉鄰其朋友其親姻所為余言者非私相好非相與為謏恱者也夫且事死安有不能事生者哉雖然未也傳曰君子思終身不辱子如思不辱其親將有所為必審思之使宗族姻友鄉黨皆曰和卿有子不亦榮乎榮果如是辱亦如之此孝思也以是為記吳文正公跋云提學劉髙甫為鄉人和卿之子作思親堂記謂彭氏之子五三適二庶三適之友其弟不異於同産二庶之孝其母不異於生已余嘗聞禮家之說曰知有母而不知有父飛走之類是也人則不然何也物不思人能思故爾均之為吾父之遺體豈以異所出而薄其愛乎尊其為吾父之敵體其以非生已而弛其敬乎父為子之所天是以敬父之配同於父而愛父之配同於同母者也凡此詎非其心之能思而然哉推其所思思不止此思吾身之所從始惟恐有毁傷惟恐有耻辱一舉足而不敢忘一出言而不敢忘如臨深履薄以全其生逮啓手啓足而後知其免也為善而思貽親之榮則必為之為不善而思貽親之羞則必不為將祭之先思其居處思其笑語思其志意以其思也故祭之日如見所祭因春風之來思吾親之來而怵惕焉因秋氣之清思吾親之生而悽愴焉思親者蓋如是至若後山陳氏之記思亭而舉不當思之事以戒夫不肖子者持其淺而已髙甫以余言故能羽翼其所記請書之以遺彭之子於是如髙甫所請書之不復辭也臨川吳澄跋於思親堂記之後西蜀石室書院記祕書大監某建石室書院於蜀祠漢文翁因江西提學范君匯請記於廬陵其祠曰祕書䝉古人生長蜀中承恩入侍三朝纍官至大監告老還鄉既以私財建書院又購古今書籍備禮樂器載與俱歸托不朽焉敢助之請余聞而韙之曰賢哉祕書古之人不羈縻於君臣之恩不推挽於妻子之計能知止知足者罕矣不市便好田宅以遇子孫能以賜金日燕飲自虞樂又罕矣不私寶劔遺所愛子弟教以一經遺之長安佚殆絶未有聞者賢哉祕書辭榮蚤退不田宅於家而書院於其鄉不書籍於家而於書院蓋將以遺鄉人子孫孫子於無窮謂非賢者可乎謂不賢而能之乎賢者有不能者矣故曰賢哉祕書今又聞祕書能為墨池草堂二書院求賜額又為之曽益其田廬書籍是何恢恢有餘裕也惟此蜀郡以國始見周書云近都為近曽不如江漢南紀王化行焉自周衰歷春秋戰國秦楚千有餘年漢興至景帝之末始有郡守好學通春秋者為之師帥而後文學之士可比齊魯尚論文學之功業比蠶叢為再開闢誰忍忘之孰知漢後歷三國六朝隋唐宋至今又千有餘年而然後有石室書院哉殆天運循環地氣推遷有待其時漢史稱武帝令天下郡國皆立學校官自文翁為之始又稱文翁殁於蜀吏民為立祠堂春秋祭祀不絶然則祠堂祭祀尚矣又豈待書院而後見哉余猶及見成都禮殿聖賢圖像石本蘇文忠録王逸少帖云殿漢帝所立文翁石室在焉地志亦稱學有石室以文翁與學作石室以奉之顔師古以為祠堂在益州城內余以為古之石室在學校今之石室在書院者専祠也蜀自蘇氏父子出而相如子雲不得専美安知書院成而不有名世者出此天下國家之福也然非范君余何自知之范君亦賢矣哉故樂為之書大監字逹可君字朝宗申齊集卷六
