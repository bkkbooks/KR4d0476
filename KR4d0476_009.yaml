body:
  text: 申齊集卷九元劉嶽申撰碑志元通奉大夫湖廣等處行中書省參知政事鄭公墓志銘公姓鄭氏諱昂霄字顯卿世家鄭州滎陽里由高平公宰輔州陽城縣十餘年寬賦興學盜不入境及代民遮留不得去始為陽城人曽祖諱圭祖諱臯忠昌軍節度使贈寧路總管高平郡侯父諱甫勇略絶人讀書善騎射以扈從征西有功歷尹陽城陽夏長子潞城平棘五縣有惠政于民同知潞定不從長吏加鐡冶之課改知邠州以邠告老贈廣東宣慰使都元帥高平郡公夫人宋氏路氏皆有賢行公其冡子也初公伯父潞國忠肅諱鼎用莊靖李先生太保劉公薦扈從西征南伐有功嘗負世皇度雪山擁世皇度金沙河世皇深嘉其忠而戒其驍勇以平陽太原萬户戍蘄黃移戍鄂州竟以戰殁樊口子澤國忠宣公制宜襲尋授樞密院判官湖廣參政以叔父延瑞襲延瑞老不任以公襲公始宿衛世皇至是以萬户從征八畨順元反者破諸寨勦郡蠻斬賊首宋隆濟酋長阿女以懷逺大將軍進定逺大將軍從征安西猺獠斬賊首梁君政等以中奉大夫廣西兩江都元帥招撫右江復其城郭人民有某萬户以公升擢授公職公重棄祖父勳名辭元帥仍受萬户㑹西猺賊復作有㫖出征以竒珠左丞及公督師公即日就道馳至慶逺等處設方略涉險隘抵賊巢燬其室廬倉廪獲其首從㑹有㫖原其悔罪者因諭以禍福降其洞寨八十五處猺賊二百五十户男女八百五口器械數百餘盡完聚其所掠民男女班師以還天厯元年九月授湖廣行中書省參知政事有㫖領平陽保定兩軍近黃河屯駐聽調尋授行樞密院副使戍虎牢扼潼關以禦西軍西軍潰㫖還京賜銀鈔辭不受明年二月㫖授通奉大夫以湖廣參政事領軍思播征蜀臨遣賜表裏衣甲弓刀三月至自京師始還署三日即發湖廣四月播州石虎關蜀軍潰六月至自播州以疾辭中書勉諭毋勞謙退而公常不安席八月知貢舉公力疾留貢院誓天為國得人竣事士論歸之長二僚佐日請還署而公以疾竟不起九月二十七日也享年六十夫人郭氏封高平郡夫人子濤宣武將軍襲萬户鎮武昌嘗從公征西公之初薨也夫人與濤俱慟絶久乃𣸪蘇濤妻范氏侍姑從夫竟以慟絶家無以斂治命還葬濤以某月某日葬其鄉某山從祖父之兆以余嘗校文知公公又辱知泣請銘曰先生以試士來湖廣殆天以不肖孤慁先生而掦其先美蓋其遺𦙍也敢泣血稽顙以請伏地者久之余惟鄭氏自其祖父父兄世樹功勳而公又備著忠勤顯有勞績親結主知歷位參樞而謙退不伐是宜富貴壽考而家無遺財年僅中壽有令妻賢子子婦又孝是可銘也已公治兵有法臨財亷臨陳勇平居愛民下士其忠心誠實厚有德君子也銘曰天祐忠臣以興上聖上聖龍興克篤其慶維兹鄭氏勳在上心祖父父兄式克至今忠肅之忠忠宣之勤高平再世膏澤下民以名將子有循吏風子又克世王臣匪躬戰不辭難功不居寵惟儉惟勤將懼將恐妻賢子肖曰公家教無財無恱有婦死孝見者盡傷聞者感歎至今荆州四境猶晏昔歌凱還今哭還葬風號天旱雨泣嵗旱國有恤典史有易名庶足徴者不在斯銘有元隱君子冷正叔桐鄉阡碣自余聞分寧冷正叔為義田以仁其族逺近無所然罕有言其為之有本而行之有序者若其志節之盛行誼之高則世有未必知也余讀周儀之所為狀而悲之其狀曰正叔十嵗試宋童科以文武藝冠一時遂免解少長即慕古人問學以當世自任及寶章捐館章貢家難國亡正叔間關千里以喪歸終喪有聞即絶世念用孝友為政於家不逮事母事生母黃孝謹居喪校楊氏附注家禮可傳於世事伯兄常如未昏宦時仲兄蚤世教育其遺腹子至於冠㛰如其父未亡季弟為人後者友之如未嘗後人方義田之未成也族多不舉子有不娶者有流落無死所者及義田既成族無不舉子男女無無室家者矣有過五十而娶有子者有六十始育八十而以天年終者有老且死他邦不逺千里而來歸者有濱死而生者死而得所歸者然其法與文正少異再嫁者削之守志者倍給之壯能自食其力者量給之離族者削之無恆心者削之又皆有意然後次及親黨鄰里又次及故人逺客無不隨事多方各用其情嗚呼可謂難矣今之讀正叔詩文者但見其雄渾雋永而不知其為顧行之言又不知其躬行皆過其言之行也蓋至於疾病且死不亂而後知之使正叔遂行其所學必不顧遺餘其才志事君有如不幸必不茍以謀其身與其家其功施豈止族里言行又豈止耳目所覩記哉正叔嘗被命湘鄉縣尹不赴有書義田事於郡志者命急去之曰此先世善慶之積先公賜祿之餘某何力之有正叔諱頥孫世為豫章分寧泰清里人系出周世宗時淮南租庸鹽鐡轉運判官嘉曽祖諱某贈奉直大夫父諱某宋朝議大夫直寶章閣廣東路經略安撫使分寧縣開國男食邑三百户母宋氏王氏俱贈宜人生母黃封孺人娶周氏宋瑞州使君周公某之女先卒子男三有泰以海南北道憲司帥府照磨管勾知名有益以文學聞有觀方學父兄之學女六孫男十女五曽孫女一生宋寶祐丙辰七月二十八日卒以泰定乙丑七月三日明年丙寅某月某日葬武寧桐鄉余友羅以通郭公晋能讀六經四書與君深友言君平生與儀之令狀略同儀之有文學政事瑞州使君才子也余悲君才志不獲展而言行不多見知君者又不多死之日自吾鄉㑹哭者其色容必哀比葬自吾鄉㑹葬而求余文者其辭尤頎至是可銘矣有益請銘以揭於其阡乃揭之曰有元隱君子銘之曰士不用世則必附驥世非不用而驥不至自淑其身以見古人古人不作不朽焉作不尚有聞嗚呼此其墳余士南墓志銘君諱湘字士南世居永豐之故縣相傳其先自撫州徙士南幼孤昆弟三人二昆既盡亡其故祖父遺業士南始折節讀書始變始躬耕五畝之田以為生終三時無一隙其法以深耕勝廣畝畝常收二畝半其後田愈益多墾愈益勤又以率其同社人以為常不率者輒為之耕尤善畜牧魚可計日滿尺牛羊隨地輒成群種樹有法被服其家爰及鄉人取材手植以為居室用器皆中尺度二昆所棄故業身盡復之至盡然終身儉勤不改或從之貨不厭或請夷山徑修江橋不卻常恨人心不盡得我以濟每被誣輒厚費然財輒日益蓋天與之地常遣其孫來學命之曰不耕則學勤乃有獲有如惰農同奏罔功又曰吾起耕稼是謂本富末富如倚市門姦富如殺越人雖積數巨萬不願汝曹效之每誦其言嘗過其家門外多役水為舂連晝夜聲不絶機杼聲聞於外與書聲雜里有龍塘産嘉魚過者輒以盜論君得之而㢮其禁以享先祖以羞嘉客即止嘗自謂終身用物皆身勤力所自致然至老死不敢過亦可謂賢矣曽祖某祖某父某生宋辛亥終大元太定丁卯正月十六娶羅繼劉子男某孫某咸來請銘銘曰自古王政必先樹畜莫重省耕其次考牧頌有載芟雅有無羊周人以興卜世以長降及秦漢漸為賈區始禁賈人衣糸乘車古風又降降及近代姦富爭雄盜憎民憝惟兹歐鄉庶幾余氏孰令而行孰禁而止茍非其力不食不衣終身衣食惟恐過之率其鄉人教其孫子續古之人以續以似我銘此墓以易俗故世萬子孫勿㬱斯文元奉議大夫吉安路吉水州知州驍騎尉永豐縣子孫君墓志銘延祐乙卯贑寧都亂微孫氏寧惟寧都不守贑不支廬陵亦曰殆哉初江西經理白糧民不堪命贑為甚寧都又甚有蔡午玖者因之脅從其鄉以叛而從之者三鄉同知趙某遇害自七月朔攻圍州城十有四日城守堅稍退復進後八日圍城數重朝廷命三省討賊聲援稍集而飛芻挽粟不繼孫氏悉其牛羊倉廪府庫以備供億又多設方略以家僮民義先官軍衝冒萬死力戰潰圍又八日而薄諸河踰月而拉其巢又踰月生擒午玖而後亂甫定當城中食盡時危不能朝夕城不陷兵不潰衆謂孫氏力為多而終不言功則孫公有大德於其鄉也事平命下旌其門方事之殷有謂公盍盡室去諸公怒斥言者賢內助尤贊公急毁紓嚴守禦逮糗糧多芻茭具脯資餼牽則其鄉人人能言之公真德人哉余每恨酷吏妬財常疾視富家有盜憎主人之意不思凶年勸分倉卒守望即有大調大徴發致期取其將屬之蓽門圭竇之人乎繩樞甕牗之子乎甚矣其為臣不忠也於是復見至元丙子距乙卯二十有二年矣公之訃至廬陵而思公者如新公之子寶孫以州判官張本所狀世系功行因余友周某求余銘余素聞輿人之誦又嘉寧都大夫之賢誼不得辭按贑寧都在唐為處之處化狀稱寧都孫氏自唐中書舍人拙避亂徙家處化始中書五世至宋桂州節度使判官立節嘗抗丞相不為條例司又嘗奏論活十二人於死蘇文忠稱之為剛者必仁其子協勴從公逰協歷官至嶽州使君嶽州六世至興禮以子貴國朝追封登仕郎撫州萬户府經歷公其仲子也諱正臣事登仕府君母曽氏宜人備極孝餋府君即世五十孺慕繼志終身貧者待其餋生送死大德丙午丁未大祲賑其州及于豫章于金陵他如鑿山通道彼岨者夷使盜失據為梁為亂必有巷田使民永賴嘗修鄉校以為國育才又即京師鑄寶瓶于廬陵塔寺於其鄉建經閣為華嚴院以為天下祝聖人壽仁皇在宥擢寶孫少府監丞制封公奉議大夫吉安路吉水知州驍騎尉永豐縣子夫人陳氏永豐院君泰定中賜酒咸寧又賜命服及帶公卿大夫咸為歌詩以餞優游家居享壽康之福者又十有二年而以至元丙子八月三日終於正寢得年七十有六鄉人哭者皆慟部使郡守而下致奠尤哀子男三寶孫今為護聖營膳司令伯顔大司農司語官鼎龍興平凖行用庫使先卒公命以弟師為之後女三長壻吉安萬户邸貫先卒孫男五赫師大司徒宣使孫女五曽孫男一女二治命葬懷德鄉心化里竹龍橋余今年始識司令愛其寬深博厚又聞其平反西京寃獄七人公喜形於色奉㫖修光天殿亷省常費數萬董營大剎省費十餘萬故有營膳之命乙亥冬馳驛核田計賦奉常先帝祠廟明年春至廬陵聞公疾馳歸而公疾愈先是伯顔以叔出季處辭朝還侍至是與其兄嘗藥進膳者又五月而後公卒非厚德盛福不及此嗚呼公之德足以似續其先人而化又行於妻子不賢而能之乎銘曰善人為政使富者仁凶人在位使富者貧民茍貧矣將焉用之無所用衆國何以為惟兹孫氏惟德是種是其種德已歷唐宋朔南教暨雨露恩深使縱尋斧安得至今年飢誰望寇至誰仗兵興誰飾城守誰仰天助皇家亦右富民蕃祉老壽以活鄉人活人多矣何以報之民之所好神之好之相其子孫永仁無已嗟爾鄉人子孫二子少者携壺老者扶路年年寒食來祭公墓彭魯叔墓志銘安城處士彭君諱絲字魯叔江陵府君長子也府君學行不可少愧古人既第恨不及餋不就祿不忍言挂冠嫌以本忠歸􅏺當世世既變始益杜門裹足著書以終其志魯叔與弟長庚用著述為幹裕修踐為孝餋切偲為怡恱作小學進業廣記草卷補救人心世道末舉九章算法恨未盡念周大司徒設教與賓興賢能九數其一自劉向父子班固鄭康成皆通其義前代置博士科目百餘年間曠不復講今其書固在悉本禮經中雜秦官制算術如科條疑秦漢間人補綴然苦難讀乃取二百四十六問為注疏圖名曰算經圖釋凡九卷勾股少廣羃積最隱互者最有功始悟禮經八十縷為升乃由經緯各八十積六千四百縷為方一升殆借良法以明度法合㮚氏為量方深一尺之義與算經合由算悟律於是黃鍾樂律不定千五百餘年矣法圓經羃積最難惟祖冲之密率最而未嘗以算黃鍾惟蔡季通候氣法最善而未嘗得算法徒以圓田術乘除約之故于律孔經為疏宜用蔡氏候法而加以祖氏算術用圓周求徑徑定則積實亦定乃作黃鍾律說凡八篇自謂神䕫復生必有取此嗟夫季世士大夫髙科厚祿晚致為臣歸見孫曽四世不知平生學問曽不如古人十五嵗以前而父子兄弟間可愧憾多矣况論及物哉嗟夫魯叔父子豈有一日民社之責而常懷萬世太平之心良由俱存無故俯仰不愧用意常在千載之上千載之下嘗輯八先生書說槩取諸周程以下府君定著纂傳多所取焉嘗謂易潔靜精微之書無事不包不當拘一事一義故其書曰易包春秋春王正月實建子本泰誓十有一年春一月自武王已改時改月考國語及唐大衍厯皆合此夫子所以欲有行夏之時也故其書曰春秋辨疑禮記有集說四十九卷前無此書已多論著猶未脫藁府君當之江陵有為疏廣效子孫計者則對客人各有志清白遺子孫不更勝耶先廬逼仄有操書致者則白府君以無故之恩必不可受梁伯夷所築亦不可使伯夷傷惠府君三遷而至黃山有屋山之警請必治之以為小懲大誠乃人之福今不懲將不利鄉人小人亦終凶于其身置之理而其感悟卒為良民門外雪深數尺猶執筆細書不輟病中齊叔曲臂之則吾生平多憂顧憂貧若病哉吾父著書滿家吾著書數種今吾已矣將其在吾弟乎張也汝必勉之嗟夫使魯叔得志必有被其澤者然不可得魯叔不加損而民之無祿哀哉將其在後之人乎曽祖某祖某父某宋江陵府教授鄉先生太學博士劉辰翁私諡為端素先生妣羅氏娶劉繼劉子男通孫先卒以弟張後之女四壻周某劉某劉某生宋嘉熙己亥四月十四日沒大元大德己亥七月二十五日葬翔鸞鄉府君墓側張求余銘銘曰文富無貧良貴無賤茍不怨尤又何歆羡義理密微必辨其非象數隱互必求其著禮樂有興丘厚無起茂陵有求空谷無似吁嗟魯叔其人如玊暴之天下以俟來者湘隂知州崔架之墓志銘余平生老友崔架之質直方正天性好誼誼至髙尤惡薄當世者常欲挽天下熙熙穰穰皆回心而鄉誼甚盛心也喜賓客至傾竭接脫妻子所服􅎖質貨以供燕勞贈賄以為常人人滿意去不知架之故無宿舂聞人有急暮夜馳赴不一語家人尤恐後事已不歸德故信義士也架之諱棟世為晋寧綘州翼縣人系出唐國子博士駰弱冠試吏江西鈔提舉司行泉府司理問所知名提控富州安福州撫州路案牘名益聞歷大都人匠都總管府留守司少府監知事升監經歷改留守司都事經歷瑞州路省臺交章不報授天臨路同知益陽州事年六十九以奉議大夫天臨路湘隂州知州致仕架之有守有為常思奮不顧身以脫人於險其素所蓄積甚于人所嗜欲常從韓理問多方白員主簿實不與贓通員得不死瑞州日飯施縣丞又代輸其誣服之臧施得不以餓死鞭笞死皆人所甚難而意不滿不能力爭省憲脫二人於亡辜西師興益陽當轉輸播州往復道理六十判官當督餉故墜馬竟辭行架之屢請身督餉救四十萬軍士饑欲死者父老遮留不許至常德而蜀平班師架之亦還治則天也益陽有故監縣太原人無子而家資巨萬諸壻二十餘年不决架之遣吏其鄉訪求得其族子當為後者而訟為息此居官理余所知者也其間居有鄉人逺服賈于洪失利而病且死自言識架之實未嘗識聞其名居則曰魏仁卿為謁醫治病病已又為稱貸以資為賈乃好飲盡亡其財脫身逰高安竟以責纍架之他日其父携孫來求亡子以父命召之不至父歸置其子崔氏久之仁卿以疾病來八日死架之為買棺以葬又教育昏娶其子焉嗟夫薄俗多藏厚積遺所不知何人而塗人視其親昆弟於其族之人與所厚昏友棄不遑惜者皆是也而况素不識人者乎架之豈不誠賢士大夫矣哉使架之蚤從州縣遍歷省臺當使所至風移俗易人人耻為薄夫鄙人豈不世道人材亦職有賴而卒以滯淹老死下位與架之同時共起在髙位者多矣能進退人材者無餘責乎孔子稱下展禽為不仁又為竊位可勝恨哉架之死元統甲戌某月日年七十有一矣非不得年也娶常氏封宜人先四年卒實賢內助子男二思誠國學生纍官至承事郎廣州路畨禺縣尹次思立女二壻鄭文煥張顔孫男四葬某所以某月日銘曰無不知已孰蔽其賢無不俾爾又假之年而止於斯於乎架之元承務郎江州路彭澤縣尹姚君墓表元統二年秋七月監察御史姚緩將㫖東粵道出廬陵過余衡門之下再拜以請曰緩之先人彭澤府君葬鼎湖祖墓翰林學士臨川吳公既為之志以賁之幽惟是葬十有六年而墓上之碑不刻立無以彰示子孫敢請序次而論之曰府君諱某字敬甫其先河中人有仕金為虢州某官者遂為陜人考諱某監陜州酒稅贈某官敬甫由廣東宣慰司歷南陵簿劉莊鹽丞長陽尹采石鹽引提領授承務郎江州路彭澤縣尹未上而卒于真州之寓舍初廣東富啇有被强盜而誣服其仇者因賄成之宣慰有入其語者所連三十人寃死獄者已十一人餘皆誣服然終無贓仗㑹嵗終改𨽻敬甫得其寃狀以聞于時廣東論囚不俟報宣慰命十九人皆致諸辟敬甫廷諍安有贓仗不具而人可殺者即死不敢奉命宣慰大怒愈益急趣則抱牘踰垣走匿僧舍後五日梅州械送正賊贓仗俱備敬甫引十九人破械而廷釋之十九人羅拜歡呼曰生我者父母再存我者姚敬甫也當時敬甫不以活十九人自多而以十一人不可復生為恨夫十一人者不死于敬甫之手明矣而敬甫猶恨之於是廣東之人皆知敬甫非沽譽真洗寃者也或曰五日十日賊不獲奈何曰五日而賊得天也茍惟不得敬甫遵海濱而處可也何以帥掾為自是廣東凡獄成必由敬甫先後所平反無所惜也彭澤之人不與被其澤而敬甫之施已狹矣敬甫之施雖狹而南陵長陽之人有隂受其惠而不自知者若劉莊采石受其寬分之賜者尤多士大夫茍為政何必赫赫之功哉此敬甫所以有後敬甫死時年六十有六矣紱之弟曰紳今為某官嗚呼為善無不報而敬甫初心豈望報哉天之報施善人在身者有顯晦在其子孫者有遲速未有或爽其應者嗚呼姚氏世子孫勿替引之哉倪處士墓志銘白下有處士曰倪君景和修于家教于鄉自其子若孫與其家之群從子弟其鄉人子弟從處士講說六藝四書人人欣欣然如得美食甘寢處士死皆悵悵如有所失如無所歸皇皇焉如不可一朝夕處士常語學者孟子稱堯舜與人同汝知所以同者乎知此則知性矣又曰孟子距楊墨不過間先聖之道佛者以其說鼓行於天下垂二千年儒者所憂不當在我乎又曰孔子稱志士仁人有殺身以成仁宋亡惟廬陵文丞相一人而已聞者悚然不敢自名讀書為士其子存逺與余逰方將從處士求一日之益而處士已矣處士其先自金陵徙歷宋崇寧靖康至渡江百餘年髙科膴仕知名者尤多處士浸灌于其家學也深故其論議絶去鄙俗亦無倍道其徒有楊景行者為延祐初科進士歷官有守有為今為宜黃縣尹尤能其官以處士族出學行求銘於余余謝不敏而再不獲則告之曰余不及與處士交際其斆學之詳吾不能知大者如此他可略也以是銘處士可乎景行復書曰是足以銘吾師聞於來世矣處士諱某字景和曽大父諱可功宋贈朝請郎大父諱千齡宋朝奉郎父諱韶孫宋咸淳庚午貢士娶劉子男一齊慶女二壻某某孫男四曽孫男二處士卒以至順辛未二月二十七日年七十有五葬鐡溪浮潭以十月十九日有文集三十卷講義十二卷隨筆録三十卷藏於家銘曰倪入春秋自犂來始去邑從人見公羊氏千乘者寬為漢御史淮海其裔金陵再徙崇寧良瀚八行之名靖康死孟死扞京城父曰師尹子曰求已倪氏世科莫盛於此灼守南康立身英德維二史君聲實輝赫至於處士成德道尊南康群從英德諸孫世美其家惟德之華成教其鄉于道之光亦有才子克濬其源亦有進士不辱其門天將報之俾厚其施施常恨少報豈曰小斯銘斯墓毋或傷其樹嗚呼倪氏來來無止彭齊叔墓志銘吾鄉先進惟安城彭氏父子兄弟自為師友能自致不朽鄉先生劉公㑹孟為端素先生諡崔君舉為魯叔碣既各取其傳者傳之於是齊叔死十年而前修逺矣其子彛始屬筆於余余固辭彛固請謹按端素先生宋江陵府教授諱應龍字闕夫長公諱絲字魯叔其學如古所稱博習修潔者殆過之齊叔諱長庚能繼父兄志業不茍同先儒不茍異流俗不茍難鄉曲無不及古之人已然未嘗以尚人余猶及一識恨無由極論獨從鄉評家傳倣佛生平忍不與四方學者知之其可乎齊叔不用世而學必不可為無用不學為科舉而科舉與必不可廢其學嘗稱父兄著書務明千古是非不徒觀衆人耳目恐不幸萬有一佚墜先父兄遺緒謂文公於四書集衆長而無我意權度精切矣然且更定猶終身不置其意豈無待於後之學者故其徒黃直卿真希元於其師說而有新意學貴知新以此非為異也作四書辨疑然後辨疑春秋禮記周禮辨詩易書下至諸史律厯太𤣥濳虛皇極參同隂符皆有商論名為萬卷莊日記又以春秋辨疑未盡復作春秋集傳槩謂漢儒以濟北王而稱春秋是蔡仲以衛太子而稱春秋是衛輒以昌邑王而稱春秋出襄王晋人附賈后誣廢楊后而稱春秋是魯莊絶文姜幾以懼亂臣賊子者為亂賊勸深著其非是以教世子為天下國家本作春坊百鑑鄉里節士烈女恐久遂湮沒作廬陵先賢傳後世用法徴例本吕刑上下王制小大漢律决事皆有比致吏胥所欲活傳生議所欲陷與死比定先定法尤先任人當擇守尤當擇令官吏不過三嵗而土人在官無祿者封建其間樹根深固窖刻骨髓宜痛斷根株絶之而定其録三嵗一易群縣嵗上計簿宜知户口滋耗占吏治得失其窮居憂愛至豈迂儒瞽生懵不通知世務者比哉平生說經有得其說者因而成之如向秀於郭象然未嘗自言戒諸子無敢言或畔去重來見之如初蓋惟恐不成人之美真古之人也古之人也嗟夫齊叔其所樹立可必傳無疑何以余為哉曽祖某祖某父江陵府君母某氏娶某子男某女適某生宋淳祐庚戌三月朔沒泰定甲子五月某日吾友真定范濟卿清白吏亟稱齊叔樂貧嗜學無毫分勢利意以厄藭終其身是甘心焉是宜銘銘曰有賢父兄吾難子弟成一家言以俊君子其鄉翔鸞其阡羅浮賢哉斯人樂哉斯丘立銘著其志以尚無愧嘉興路儒學教授俞君墓志銘延祐科興余往來塗學幾亡誦絃聲元統壬申浙俞鎮伯貞以教授來塗士稍集然每試得士又如未嘗廢業者鄰州縣往往亦響應伯貞與余遊間視余以其父嘉興教授壙志請銘乃伯貞以延祐丁巳魁鄉貢至治癸亥季弟鋭亦貢皆家教也俞氏以吳越睦州刺史稠世家汴至宋殿中侍御宗古始家杭曽祖宋迪功郎諱應龍從兄樞密文惠公應符尉嘉興府棠德縣始家縣南南津鄉通賢里祖諱儒宗考諱國梁君諱天民蚤擅詞賦尢工駢儷至元丙子大疫大父父不幸俱至大故祖母劉維卒君奉母梁夫人治喪終喪而家事益治始遷縣甘澤坊為奉親教子地翰侍講學士鄧文源善之其久交也君遣子鎮等從之學家素寒而喜賓客尤睦族姻下帷友教諸弟子以樂其貧歷主一永嘉兩書院長以嘉興路儒學教授致仕命未下而卒至順庚午三月也年七十有三娶徐氏先卒子男五鎮楙釣佳鋭楙佳先卒鋭衢州路儒學正女三壻葛瑛陸其楊祖孫男四女十二往嵗宋亡故家世族多流落君侍御樞密之後能家教不隨子孫與科俱興身教可知已鎮以至順癸酉合葬其考妣通賢故里銘曰繇汴徙杭繇杭徙越遷國以亡興家以勃侍御之世樞密之家通賢里第有韡棣華惟志尹甫教子世科我碣其藏華山其阿宋户部尚書贈端明殿學士宋忠穆公墓志銘宋咸淳德祐間士大夫有官守有封疆有師徒之衆委而去之者多矣不去者以媒其身國已破閩已潰而相從航海以身殉焉而後已非知其不可而為之者乎吾見罕矣故户部尚書贈端明殿學士諡忠穆青城宋公真其人也公諱遇字安序眉州青城其先唐宰相璟之後世居荆州廣明之亂扈從入蜀因家焉公登紹定壬辰第歷官黎州教授嚴道縣主簿監郡大司尤溪鉛銅埸官滿因家南劔知彬州宜章縣監行在和劑局提轄文恩院司農簿軍器大監司農少卿大卿户部侍郎福建運使權户部尚書兼侍讀終户部尚書常營臺池植花木扁老圃為終焉計詎家七里所劔津上洋為先世祠象築塋墓時乙亥嵗也明年閩建行都從行都閩亡明年行都航海從海上不幸以病終於于化州吳川縣之􅗠州實戊寅三月朔夫人杜氏同日死之行都命合葬于縣之浮流樞密張公世傑陸公秀夫奏贈端明殿學士諡忠穆方公之家劔也以都大司屬官嘗活饑民官滿民懷其惠而留之為宜章日有寇以强糴猖獗飛虎將軍不能支公單騎往諭之曰汝等以貧無食富者又不仁故至此當盡發常平以濟不足則以官㑹繼之既與約日又椎牛釃酒以勞之皆投戈羅拜而去既去發常平用官㑹如約嘗侍經筵盡心啓沃居從班盡誠奏對知貢舉籲天祈得士無不一用其忠志誠不忍荷國厚恩身被顯擢坐視國亡而家再造苟完且萬無完理决起携家夫婦同日并命荒洲之上與海舟俱淪沒以終嗚呼如公者可謂不欺其志矣生宋嘉定戊辰沒宋亡戊寅年七十有一曽祖申承事郎祖丙迪功郎父景瞻中奉大夫子男某宣義郎大社令女嫁某人孫男三大社以兵後理墓田修祠宇如初以世好逺徴銘謹論次其槩如上而銘之曰嗚呼宋德天而既厭誰從日月未光絶炎烈烈宋公桐鄉南劍浮海去之仙聖在念婦從其夫同日就斂朝有易名以死猶艷嗟時之人寧不有斂劍有土田洵也不僣劔有子孫祀也不忝我作銘詩以望公封音去聲慰我永懷公則何缺王遵墓志銘汴人王誠仲敬喪其兄子遵于廣文之官舍夫婦哭之慟耆老諸生不忍聞三日殯于佛寺哀動路人有不忍觀者始余聞遵讀書金陵學舉子業父母愛之諸父愛之仲敬尤愛之以廬陵多士使來卒業比及三年而歸父母見之何如其喜也而未及數月以喪歸將何以塞其父母之悲此宜仲敬夫婦所為哭泣悲哀不自勝者也遵將歸葬仲敬泣而言曰誠不忍吾兄見此子之生行死歸安得先生長者賜之一言是使斯子為不朽而吾兄為不恨也且不虛來廬陵不得誠不可以為人弟敢告又曰誠兄弟八人遵在諸子中最長且賢不肯一日去誠以㜐而乃從誠宦學以死也傷哉乎遵敢請余感仲敬克友閔遵不幸乃叙次而銘之王氏繇濟南歷城徙家汴考城繇歷鵲山徙葬城次岡贈朝列大夫同知汴梁路總管府事都尉太原郡伯諱興其曽大父朝列大夫廣州路總管府治中致仕諱或其大父登仕郎大平路總管府知事諌其父母劉氏聘劉氏遵字克勉生廬陵以大父大德丙午判安福州之嵗死廬陵以季父至順庚午教授之嵗十月二十四日也年二十有五以某年月日葬某所銘曰生於斯死於斯銘於斯其魂氣無不之也其死而有不澌者矣申齊集卷九
