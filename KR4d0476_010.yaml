body:
  text: 申齋集卷十元劉岳申撰碑誌廣西宣慰文公墓誌銘文氏繇成都徙吉之永和繇永和徙富川公諱璧贈太保邢國公諱某之曽孫贈太傳永國公諱某之孫贈太師惠國公諱某之子丞相少保信國公諱某之母弟也皇元混一區宇得忠臣孝子於一門公與丞相兄弟二人而已初公與丞相俱學俱貢俱第將入對太師疾病獨留侍丞相擢進士第一至開慶己未公始對賜第授廸功郎臨安府司户叅軍以致稱用京尹馬公光祖舉改官知瑞州新昌縣録大獄二十餘皆得其情正宗室子嬖妾殺婦之罪决盗牛訟乆而不决者縱牛牛歸故牢而盗服由是新昌訟牒不入郡青匱方議興學校救荒定役法而以言去簽判寜海軍通判臨安軍府稱治辨浙西安撫司升置制主管機宜文字司存改制置兩浙主管官告院仍舊職舉㝡丞相開閫江西奏以公為助得主差主管書冩機宜文字事無大小必由公議而後行丞相趨朝乞祠留侍除直秘閣主管台州崇道觀尋有㫖差知惠州尋升直寳謨閣知海州軍州復由兵部郎提㸃廣南東路刑獄樞宻使陳宜中都督諸路軍馬以將作監叅議其府事多所禆畫至行在所時暫兼權樞宻副都承㫖尋除秘閣修撰摳宻副都承㫖江西路轉運副使陞兼叅謀尤多宻議除權尚書户部侍郎總領廣東財賦兼知惠州丁齊魏國夫人憂還葬惠州誓墓終身尋累詔起復除寳章閣待制依舊任兼東廣招諭使叅讚都督軍事又除權户部尚書偪側兵間兼運籌給餉於危急存亡之秋所謂鞠躬盡力死而後已者明年丞相敗海上公始圖全宗及丞相北行公始入覲授少中大夫惠州路總管兼府尹尋改大中大夫臨江路授嘉議大夫同知廣南東道宣慰使司事改宣慰廣西分司邕管念廣民兵後瘡殘凡可以救民於水火與衣冠於塗炭者盡心焉以大徳戊戌十有一月二十有一日終于正寢初丞相賦詩有云親䘮君自盡猶子是吾兒又云三仁生死各有意至為文以祭太師之墓則云有姪曰陞我身是嗣公既命其子後丞相當丞相生死之際公所以為人弟者備極人所難為而曲盡其至自臨江即謁告之惠州改葬齊魏不獲則命其屬吏行不幸屬吏死循州有故吏總管循州者遣使間道䕶䘮以歸公適至自南安孫氏妺至自龍泉不期而同曰與相㑹值夏方孫氏妺母子俱北多方謀所以返之者而後得與俱還彭氏妺病羸齊魏尤鍾愛因迎飬惠州與俱夫家破亡得免則飬之終身經紀其季璋食其伯指盡復其所沒田乃已教母黨之子官其季明孺固其從弟妺之貧病與其䘮葬飬妻母杜及其乳母薦其兄子南翁官至大社令丞郡又教飬其子維斗自廣西歸日不暇給以丞相前請得加封三代買先廬之沒入者命子隆子稍倣古制建家廟祠惠國而上永國邢國齊魏國夫人而上永國邢國夫人以太師由伯祖而後太傅伯祖一子無後命子京為之孫又以太師本生梁夫人改適無後命為别室以祀梁以丞相常築别室山中又將買田創祠山中以方外人掌之教陞盡所以為人後者命陞迎母間闗萬里生還首丘而公已矣又求丞相遺文而傳之梓尊視事太師之先友如父兄絶甘分一飯必俱尤愛劉正伯之子以恭與倡酬以恭與之銘語正伯曰公百嵗後某為孝子家無宿舂囊無留帛親踈逺邇畢用其情四方來者各得其所願欲而去死之日族姻賓友四方㑹哭者盡哀如哭丞相之初娶曽氏繼張氏子男五長某某官次某為丞相後某官次某某次某女十有二趙良梓蕭米鄒止善廖璵燕璋胡桂周道某彭震龍鍾齊趙法保黄與愚朱元順其婿孫男四某某某某女某葬某所余從今集賢直學士受字都所述家傳徴余銘余惟公之孝弟為人所難與丞相大忠並傳其從兄盡力兵間易世盡心遺民還歸盡情倫紀皆可書孔子曰殷有三仁焉後有君子之論而將曰宋有二仁是宜銘銘曰東南道學垂三百祀科目以來孰厚待士厯數有終精一不已報以忠臣報以孝子猗歟廬陵盛哉文氏觧上舍墓誌銘觧氏族出鴈門繇唐同州刺史琬始以魏州先城著其孫隠為蘄州司户叅軍家于廬陵縣司水鄉叅軍六世孫盛始遷于今吉水古東門坊科第常不絶十六世而至公公諱夢斗字孔賜曽祖叔逹祖寅父谷宋淳祐己酉壬子江西貢士母王氏以公入學恩封孺人公生宋端平乙未弱冠䘮貢士君事母至孝事兄如父業進士有能賦聲尤以唐宋故家自持恂恂有士君子之行景定甲子貢於鄉咸淳戊辰入學庚午再舉子監名卿大夫皆愛其文而敬其有宇京學賦六月共武之服有以公賦中者賦傳相國賈似道取其賦讀之至四郊無徃以非秋六月不知其為夏惡其語有多壘之憂擲之地然賦益傳他賈其餘勇者尤多癸酉以母憂歸居䘮有聞終䘮代遷杜門讀書教于家必以身教鄉人子如其子二子謹飭能世其業申叟常教萬安縣學辰叟奉省檄教永安縣學公每飭之曰教然後知困此汝學時也又聞科復又曰吾家世科數百年汝曹無慮見黜於有司慮于鄉黨朋所黜爾聞者皆以為訓諸孫林立競勸於學公平居退然若無所有非賢者莫能識不為厓異而有所不為終不可奪寡言笑不妄交遊所與厚終無間言與鄉人處終身不失年垂八十猶不廢斆學及門之徒見其終始嚴重稱之莊山先生以皇慶癸丑十二月丙寅終于家死之日鄉族姻友無稱其過者娶蕭氏生女三繼鄧氏生男二應辰應申女一孫男八女三曽孫男一延祐乙卯十月甲午葬於鑑湖叅軍祖墓之側先葬徴余銘余惟代有陵谷則有負乗慮無不一蹴可致者惟喬木不可一日為自唐宋至今七百有餘嵗而譜不絶世不失於士祀田不易姓者惟觧氏非樹徳不及此使其子孫徒食舊徳亦不至此嗚呼鄉里孤白眎公何有由公眎之竟何如哉銘曰衆誇毗獨也静衆回遹獨也正歴八代惟一性世子孫無改行永厥垂鴻厥慶梁先生墓誌銘余平生老友梁君景行有雋材負盛氣年未二十以詞賦論筞知名塲屋未三十宋亡然科廢猶三十年不廢程文君以材雄馳騁其間者亦三十年而君老矣科興稍屈折從學顧儕輩少有存者嘗獨行踽踽諸老先生已逺悵悵無誰知已平生以學校為井田月費嵗靡亦可比百石由由然安之年九十以終君諱節自號高峯先生在宋可擢上第然由景定甲子至咸淳癸酉己巳不得志為鄉闈於是宋科終矣元興提學學官多用一時名士而君曽不可一奉檄於江西江西提學蕭禹道方欲剡薦君㑹禹道病卒廬陵太守杜侯元忠剡薦君矣而當其剡於家及明經取士不忍技癢猶一至豫章望世闈而返衆謂此行豈不可雍熈二年梁灝哉不過為鄉校博士訓弟子員以止豈命耶君材負恃傲倪一時余少君十嵗自叚禹謨晏鎬民先輩名士一見稱為我輩人君始與余定交又聞湏溪劉先生語始異視終始六十年君我二人君為文老而猶雋老猶不亂良由少年盛氣終不可除生宋己酉九月四日同年生者多富貴人或至二品而君以賓師終於家實至元四年戊寅二月二十一日四月某日葬廬陵青龍山梁氏由長沙徙西昌子孫屢徙而至廬陵余見君城中五遷而至今寓舍祖某父某娶曽氏子男三女三俱先卒孫男三女三五十年前君哭長子某去年及哭李子淳至是其孫蕭孫徒跣泣血請銘銘曰科廢恨蚤科興恨老老哭収子忽忽必死天之生材竟何為哉何以慰之銘告後來廣東宣慰郭公墓誌銘余徃來豫章四十年士大夫稱賢者必曰杜仲寛諸公稱長者必曰杜仲寛以至省若憲從事之良無不以仲寛為賢且能㝡後聞仲寛東歸宗為郭氏而人皆稱其孝又聞仲寛以其官終而皆悲悼其不幸仲寛何自得此為人人哉仲寛諱恕世家蔡州曽祖某祖某父某世與同里杜氏相好故壻杜氏由是姓杜從公襄樊下江南積勞為省掾潭州遷江西見知賢相呼都克特穆爾嘗慮囚廬陵而安福有紙得偽鈔官起疑獄多濫無辜者有告被刼掠官故縱賊乆而不伏反被困者皆立决嘗救一老儒生以豪右下石且死立出之嘗罪一吏一廵檢尤毒民者立罷出之時决獄數而放還者尤多永新有坐仇家告變兌死獄中百口垂沒入官者官繫羣盗耄倪數百日食於市民者踰年民尤不堪盡放還之自掾史歴照磨且十餘年以㝡聞江西遷廣東帥府經歴從家幕議其間蠻獠反側帥府暴怒幾危者屢矣由君復安遷浙東制用院都司以儉出薄入為本悉去苛細取嬴之弊能使公私俱羡除融州知州㑹中書賢相達爾罕選委問彰徳鐡冶淮東市舶等事設法除弊悉罷行害利能使冶鑄便益官民漕運不為奸人所欺舶貨市易逺人悅來功狀彰灼遷江西都事已熟江廣民情益順民好惡江粤始俱安升中順大夫廣東道宣慰副使僉都元帥府事始念本以郭氏後杜氏不忍杜民日昌而郭氏日㣲請復為郭氏如既得請益感激思効忠以報念粤民疲於征輸而軍用益乏稍務寛民力而師興亦不匱使君能待忠更粤人歌舞其賜者何限而以一疾遽不起君始積年著勞績江右稍敡歴東粤然後出幙府持旌麾庶幾行志澤物而來日已無幾不遇名文詞必可傳者以傳其姓名將遂湮沒而已豈不益可為痛悼哉君勇於為義而退避利禄乃其天性故亷不為刻能不為暴民受其賜士懐其徳猶有古循吏之風嗚呼賢矣君生丙午某月某日卒以延祐甲寅四月年六十有九葬其盆留祖墓之次實丙辰十二月娶杜氏子男文炳承事郎吉安路永新州判官之官永新道出廬陵徴余銘曰能以先人不朽者公也乃為之銘曰惟天生物使之一本而大報本在其衮衮君為杜氏不忍郭亡既貴且老弱䘮還鄉杜氏有後郭吾其宗子孫世祀吾祖其從維仲寛父克孝以忠粤民父老曰我郭公惟我江西猶稱杜母匪杜之思惟仲寛父嗚呼仲寛善無不報我銘好辭為來者告君子有子君子之澤庶幾夙夜永永無斁渤海郡夫人王氏墓誌銘江西憲使信都呉公繹為廬陵太守之日見其子鈞於郡文學為劉岳申曰鈞不幸無母且三年矣子諸侯賔客鈞不得為博士弟子耻也敢請岳申辭不獲命公始為言渤海郡王夫人之賢曰王氏諱某同里人未嫁為賢女既嫁為賢婦太夫人甚愛之從余中書省斷事官兼寜王傅遷尚書省移江福安余之儉薄使余不以過聞至治三年自福移杭十二月二十三日杭大火余倉皇馳救馬軼王氏聞已即驚悸不能語明日卒太夫人哭之慟為廢眠食初余兄寜王司馬早䘮余嫂王氏白太夫人請以其装更聘嫂氏至是嫂亦哭之慟諸妾媵䘮女君者皆行哭失聲男五人鐸内供奉其下三人皆先卒㓜郎鈞也女七人存者為次女宜同適髙瑞王氏死時年四十八明年正月三日殯仁和城東余不忍其不幸早世又湮沒無傳幸賜之銘以庶幾不朽惟夫人以邦君之妻而不知有富貴一聞其君子履危難即以死繼之其志節有過人者是宜銘以夫貴進封渤海郡夫人銘曰肅肅渤海爰自京都從官閩浙曰嬪於呉渤海之徳自昔罕聞為夫君死如伯姬燔姑曰孝婦不貳其志世短存長長於永世君子有子勿替以引以徴余文以垂永永蕭存逺墓碣吉水虎溪蕭氏繇宋修職郎監江陵府糧科院諱來新以景定壬戌奏賦南宫第一與一時賢士大夫交逰見稱長者教其子宗古孫甲叟俱為宋太學慱士廬陵劉先生高弟弟子宗古字如壎宋鄉漕貢進士甲叟字存逺科院季子予五嵗為貢士後七嵗江南内附先生避地其鄉竒其材曰如壎不死矣十嵗先生撫之曰恨汝不識江丞相以如壎為丞相客丞相嘗銘其墓故也又三年而廬陵鄉飲酒按察馬徳昌一見稱其不凡當是時逰先生之門者一旦皆出存逺下及徐子方叅政江西徳昌以郎中重來存逺從先生見兩公兩公即署為白鷺洲書院山長既滿除教授潯州路未至潯科院訃至馳歸終䘮調田州路自陳得改湖州路湖學復興授將仕郎湖州路歸安縣主簿嘗考試誠江浙得士監杭稅課得羡被檄委問得當然竟用當得怨浙俗以贓罪誣人者為賖告有豪民為僧者尤善誣工賖以為姦利用報怨避罪誣存逺又有疾存逺才名者顯為將直其事而隂實擠之盖深助僧者甚於僧存逺既受誣落職為袁州路平淮行用庫副使三年不得代以疾去及還舊職秩將仕郎潭州路長沙縣主簿而存逺以病請老未幾死死時年六十矣始廬陵先生為古文祖史漢而宗歐蘇其論詩為宋三百年間一人而已存逺既盡得其㣲又慱采佛老方技之書歴覧南北山水之勝而壹發為文詞其詩尤工然家益落身益僨坐視妄庸得志更用以資為嗤笑使人憤惋向㣲子能嗣業尚得為有天道耶余少客虎溪科院遇我特厚與存逺語面相質責不少恕然必極歡别乆移書亦然去年過豫章見存逺寓舍相視無言既去乃為余痛哭殆死别也娶陳氏子男二元秀元仁仁後其弟孫男二梓桂元秀求余文掲於其阡余哭存逺三世矣感其始終盛衰之際乃為之詩曰天之生材夫豈云易摧敗毁傷惟恐不至盛時恨少多才恨富既老而貧積毁滋垢乃知生世無用文章我碣其藏以永其楊猶有鬼神在其後之人亡室鄒氏宜人墓誌銘宜人鄒氏世為吉水士族父諱天濟以試選歴洪進賢贑瑞金兩縣文學嘗謂廬陵劉岳申同事鄉先生心逺聶公吉甫故鄒氏歸於我逮事先妣周氏夫人十有一年日飯夫人八十母兄殆及其老子童孫夫人鍾愛葉氏姊以姊婿嗜酒不念家館之别室鄒氏奉吾姊撫吾甥以志飬飬姑姊不幸蚤世鄒氏以嫁時服飾歛之夫人稱之曰孝婦既婚嫁葉氏六男女男斗壽年五十有六兒女四人而後舅氏於是夫人即世三十有四年矣昏婣隣曲之厚者皆曰鄒氏為婦孝而恭為妻順而正為母慈而教五十餘年家無妖孽雞豚狗彘無嵗不時醬醯酒醴無嵗不羙人皆曰冲和所聚也未嘗二日無客未嘗一語疾聲色而闕給家事常治死至元丁丑三月三日二兒一女皆不及訣年七十闕父諸弟姪皆哭失聲葉氏甥為服期以報余獨哀其蚤闕長貧晚又厭其多病不俟同穴而溘先有可傷心者去年以闕恩封宜人子男文昌文華女中婿藍王振孫女五季省八九闕適玉振之子思順八先葬二十七日而殤葬吉水仁壽鄉東山之原戊寅四月初七日銘曰是為孝婦之墓世萬子孫春秋霜露其罔有攸斁蕭象明妻李氏墓誌銘吉水水以東其鄉曰中鵠里曰太原平居人李氏世積忠厚至叔澄始大用儉勤起家身致鉅萬當路貴人聞其名翰林大老誌其墓有子十人敦篤淳龎皆保家之主其八子曰恒吉有女一人惟恭歸於廬陵城西蕭奎是為今福建塩運幕府之仲子南䑓御史之聞孫瓊管安撫之曽孫江西安撫之𤣥孫惟恭以賢淑稱於家聞於族姻相攸得所而不幸不得年父母晝夜哭曰自吾有此女鍾愛之嫁不離家今轉棄余族姻哭之哀曰此女歸於徳門宦族將以光昭李氏庇其宗黨姻婭而遽如許凡妾媵之老者少者無不哭失聲是何二妙之不相違而兩羙之不可長也生㤗定丙寅八月十六日沒至正丙戌七月十三日年二十有一葬其鄉和常洲以明年丁亥某月某日先葬來請銘銘曰錦衾角枕兮嵗行周松風草露兮幾千秋徃者不可及兮來者猶可聞嗚呼斯之闕處士郭圖南墓誌銘廬陵郭氏有隠君子二人曰靜山字仁壽曰正表字公進其先有受業宋袁州史君劉公予澄者其學務躬行心得不務虚髙談性命以資淫縱為物慾不幸無用世之日世亦不及用之以困阨窮獨終其身而不怨尤其宗人有得其傳者曰處士諱適字圖南能决去俗學徃從之逰身備五福一門昆季子孫俱有相道隂隲之何其逢吉也郭氏世家由汾陽王六世謫官廬陵子暉徙麻江又六世徙南林又十世至南村翁諱日正字士先為徳人君子夫人羅氏故名家有婦徳母儀處士家有嚴君難兄弟外有良師畏友以知其真知踐其實踐印岡又多君子母家在焉有别墅講業其中用師說補獲麟後六十年史缺文節要通鑑綱目删繁禮書註䟽集傳程氏胡氏為春秋五傳又嘗講業蘄之梅川教子授徒益廣進修㑹江西覈田議増賦處士上書廬陵賢守馮公翼極言増賦不便不罷且激變守為白江西幸而免然且贑㓂起三省兵興處士言益騐復上書言荒政宜鄉勸分以救餓莩官減繁以救流亡賦必從田役必從義而後苛横可寛吏知通儒民知教子而後訟獄可衰使其言行治平可待守嘉予之訪求五世至十世祖墓得十三墓於荆榛中割田以供祀事又割田立後闕仁壽於是仁壽死五十年矣方求余志如新建素心堂其所居之左求余記為箴夜深坐念平生無不可對越者旦起拜髙堂祖禰子孫環侍賔友就飬下逮童奴無不肅給與客語竟日皆可家教世範所至皆有花柳間意四時皆佳致卒嵗皆優㳺之日逺近望者皆曰神仙中人且死精神志氣無一語亂得年八十有五曽祖諱襄然祖諱三傑先後娶羅氏皆賢子男六長申孫先卒次虎孫虤孫復免生牛兒女三孫男十五女十七曽孫男女各一葬吉水仁壽莊山以至正元年辛巳十有二月某日徴余銘余嘗恨四書行世而士大夫不諱言利士君子不嫌􅎱疾有可傷心流涕者如處士胷次氣象可常遇乎友人周宗孟錢逺復為余言處士功行甚悉處士常過淮淮士多從之㳺貴人有遣余入學其後父子皆知名處士易簀時子姪前數月皆至自淮族里昏友四方賢士大夫走集㑹哭皆失聲行道咨嗟嘆息淮人聞處士死扶路悲啞有餘哀是可銘已銘曰善種榖者㓙嵗仍熟善種徳者百年不足是故世徳不同世禄世禄難培世徳難覆培有厚者無如其福伯夷之樹伯夷之築兹基余銘過者必肅既固既安以似以續張士正妻李氏墓誌銘李氏諱㓜貞世家永豐為歐鄉歸于吉水南湖張氏為故家張氏謨字舜申長者能使人分其富子諱淑字伯儀孫天陞字士正能無改行於其大父父士正以宋咸淳丁邜薦於江西轉運使宋亡家毁身死子㓜盗起師興官饕吏毒常餉軍不給而航海交征當此時有竒男子無所措而李氏由中制外以常應變以福勝禍能自立於亂以保其孤㓜余聞其公事畢而家事治田園不蕪而子孫不愚為外姪治装必使得所外弟有弱䘮而歸者既盡復其田廬又為之家室年八十有七以延祐丁巳某月考終子男喜孫明孫喜蚤世孫男文行女五又明年葬於某處又一十年文求余銘余感張氏由長者至見翁四世而復為豐家至文五世而尤為才子子又有孫殆天報之也是宜銘銘曰詩歌女士從以孫子家國之興靡不由此南湖諸孫有行有文銘彰母教以永于聞李英叔墓誌銘余聞西昌李英叔其鄉茶灘啁石二陂每嵗屢築已輙壊殆不可築英叔以錢二萬緡幕千夫鑿石堤江水陂成灌螺溪良田三十萬鄉人稱之曰李公陂又聞每嵗儉月英叔發廪數千先糴市榖一石而因其直為損十一其妻助之又益家量十一糴者石得榖百二十升以為常今五十年矣嗟夫以若所聞英叔又何惡斁於天與人哉英叔以至元丙子八月十二日卒得年七十有八其鄉人求余銘者皆稱英叔蚤孤母周年垂九十而終孝慕不衰教子孫循循謹飭善遇族姻鄉里賔友凶年勸分常過萬石得官承事郎同知栢興府事當上以母老辭行好施與如橋庵航渡觀壇塔寺皆不靳英叔羙鬚髯長拂地黒白分敷可數見者偉視所居佳花羙木法書名畫異時寳玩徃徃歸之逺近名園不能至也别治䑓池亭舘奉過使客大人至為促席移日家付予珍珍又能逺怨其家鄉使其親享優㳺之福者二十年余感昔人積善累功幾世幾年僅僅不過中人數十家之産終身曽無一日之樂英叔起家至鉅萬比封君傾其鄉里子孫賔客日奉觴上壽歌呼鼓吹彈繫為歡娯以壽考終雖乗時亦盛福豈非天哉英叔諱一蜚世家大和南岡娶胡氏子男一􅡋女某孫男某女某某年某月某日葬某鄉余又聞英叔書謂書生盡還其鄉舟人所顛越于貨者書生感泣請以為謝英叔大笑書生奈何教人受禦耶銘曰富國有經小者豐家生財有道大者無涯王侯將相何如素封為大夫種孰與朱公貪夫黷貨仍非巧宦墨以敗官始漸負敗史傳貨殖皆壽考終歴選其人亦垂無窮嗚呼英叔身致千金傾其鄉里豈怨是任沒而可思不繫其富沒而可傳孰銘其墓斯人斯志尚克永世安撫同知羅榮可墓碣廬陵平江羅氏其先由豫章徙六世至榮可值大一統起家逰輦轂下邅遇聖明一日輝赫向此平江遂聞于時晚以蜀閫掦名蚤知勇退親見真人勃興為龍為光念平生教忠有子能仕以君賜歸榮日與鄉人父老歌呼飲燕樂其天年以無忘明時大徳榮可可不謂榮矣乎狀稱榮可諱仁則方至元丙子故家巨室一日為墟已能自異其所扶樹極救或面數責誚讓無不當謂人心鄉黨是知四方誦之大徳中因近臣以布衣見見知延祐聖人於潜邸授分寜等處茶司提舉能執法杭郡守以貪饕毒民者茶户為復業上官亷得其才因極言當罷此司竟罷遂用為𣙜茶轉運副使以行其言至官以嚴自律不陵長不偪同而儼然不可犯下不敢為姦而得罷行害利如衆所欲惡九江大饑民食薇蕨㑹雪凍蕨且不可得食民多莩出私錢七千五百緡得官米三百石救饑民千七百二十餘家以待賑貨之至分司淮浙婺源官課已重前官創増萬三千餘緡提舉司又强委儘辨文引多至五萬餘緡因頓足大呼曰國初天下茶課不過五萬餘緡耳婺源一州乃七倍國初天下民何以堪幾何不為變盡収所强委者併罷前官所増比還計各路所収已過萬引同寮持不可且得罪則身任之曰寜我罷官無衆誤國用此名益聞以蜀閫奏有四川威茂等處軍民安撫司同知之命議建橋白沙河可嵗救溺死者無數意止蠻獠三百户與灌州民雜處者得不遷諸羗安堵如故出蜀蜀亂明年入覲賜金織二兩以歸又明年十一月十有八日以疾終於家年八十有二訃聞贈䘏有加哀榮備至娶任氏先卒子男三于岡玉坦于岡全寜府判官先卒玉以文學稱嘗迎駕龍翔獻所註孝經又嘗侍親入朝咸寜女三壻劉惟信彭以南劉廸存孫男二武孫文孫女三曽孫一嵗某月某日葬安平鄉之虎峯坦以季父命奉書幣拜稽首求之掲于墓余聞其鄉人云里有木源村民被誣者自言㣲羅公無噍類矣他如此甚衆如其才力時命能羣雄詘伏退讓由未足多惟壽富安榮雖名世貴戚大臣近侍有愧歸全若賢子孫蚤有譽能自致必不可為庸人以老則愧之者多矣使其先或有隠慝必不至此身多慚負示不及此是宜彰示後之人闕以勿替引之且以勸為善無怠元封濟南路同知濵州事嚴府君墓誌銘君諱慶字仲祥姓嚴氏世家滕州祖諱津始徙沛再徙碭考諱􅡋少孤稍長奉母丁避亂關中亂定東歸家薛水上母子儉勤為生稍有餘則多以貸人貸者多不能償因過孟嘗君墓喟然嘆曰孟嘗亦人耳獨使靖郭君稱有子可乎出所藏劵無新故多少皆火棄之鄉人皆髙其誼妻朱氏俱年八十五以壽終仲祥追念先志思廣繼述恐志不逹則學為毉既盡得其述則畢逹其志一視富貴賤貧而為之不遺餘力常恨不能生死人尤好禮自家之吉㓙賔嘉以及鄉族昬必用其志無徃不周人之急終不可一介苟取諸人生無一跡渉訟庭夜無一事不可對越有子五人曰忠以家學為檀州毉學曰信能力田曰敬由胄監貢吏工部掾殊祥院補外尹襄陵清池皆劇縣皆有能聲選為臨江路推官聲益聞曰訥由般陽路學録教蒲䑓縣曰義退耕碭之野女二人壻顔某方某孫男四以子貴封承務郎濟南路同知濵州事時至順元年五月也以其年七月二十卒得年亦八十有五娶賀氏有婦徳卒延祐七年二月二日年七十有二贈恭人敬以至元四年某月某日卜吉沛泗亭東北原自碭遷祖考妣考妣之䘮而序葬之命其子某來廬陵乞銘余感嚴氏積善三世矣敬又好學而文嚴氏其興庸可量乎乃為之銘曰漢祖歌風有芒碭氣一時和習千年風致嚴君有子真沛子弟君以毉隠功過良吏使為良相有不行志我亦沛人由長沙徙同自芒碭而我劉氏我銘君墓維桑梓故過而下馬以俟來者申齋集卷十
