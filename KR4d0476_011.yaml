body:
  text: 申齋集卷十一元劉嶽申撰碑志奉議大夫泉州路總管府推官周君墓志銘儀之豫章武寧人棣華堂周氏諱天鳯有過人之資負用世之材其博覽可備顧問其文章可為詞林史館其言天下得失利害可入奏疏施為皆有其方用之內外小大俱要治劇皆得其宜嘗逰京師翰林之老為文學者御史臺之執法知大體者中書之用人識治體者皆欲得儀之以為其屬一時之名士後來皆至大官者皆推挽儀之然不能集一吏議卒墮管庫困州縣老閩嶠坐視諸公衮衮終以無輦轂下之迹僅僅與俗吏循資正等至令四方識與不識皆稱周儀之嗚呼此有志憐材者所共憾恨也周氏其先會稽茂族唐末有名御史中丞鎮遏九江者曰勍始家九江入宋有明經教授鄉里者曰師教徙海昏其後再徙武寧纍世同居者曰世修曽祖考諱友賢宋寧宗御書棣華堂敕旌表其門閭祖考諱汝翼宋贈朝請郎考諱應合試别院第一以史館抗言忤宰相官至朝奉郎知瑞州軍州事國朝贈奉議大夫龍興路總管府治中驍騎尉追封南昌縣子妣王氏萬氏追封南昌縣君伯兄諱天驥以童子能文試中書第一在宋治於髙安宋亡元興有功德於廬陵官至正議大夫饒州路總管儀之周旋父兄家教五嵗能誦十嵗能文通春秋大義十五為吉州路太和縣主簿能官從廬陵鄉先生聶淳吉甫講學先生有師道教以古人學問即日去官侍親十七喪瑞州能執禮免喪事母萬夫人出則從先生卒業夫人寢疾革籲天乞致飬疾良已者七年然後至於大故免喪從饒州京師有怨家子誣饒州於朝儀之叩閽陳情舉朝動色被旨下中書直其事授撫州路金溪縣主簿未上行大司農燕公公楠薦授管勾架閣改袁州路分宜縣丞方議科徴夏稅儀之力言其不便始得免縣連嵗水災屢請賑濟至是民居多沒溺儀之以私財糴官米二百斛以舟載飯臨屋山而食之如是者環邑十餘里大家始相率出米以繼有朱某告李某歐死其徒弟者儀之亷問死者其母其母殊不知問其鄉鄰知其地多虎復得死者顔狀服色於其母乃率鄉丁入虎穴得髑髏缺二齒與遺棄衣服服色如母言母見慟哭命母刺指滴血其骨皆飲其血徐命告者刺血血不復入然後服罪李氏祠儀之於其里及代燕公以湖廣右丞掾儀之公捐館左丞李公世安留之會撫州路平凖行用庫提領命下李公以省檢校剡上之京師京師諸公喜得儀之交章推舉吏議持已除必不可改儀之至官盡心其職以便細民市賈行旅為先至大初鈔法稍變斟酌便宜民甚利之授邵武路光澤縣尹始嚴偽鈔枝蔓之禁盱撫饒信皆接壤始受其賜有來歸不忍去者包銀令下有田者不征而閩無無田之富民郡以一切應命儀之力爭不可則請分豁有田無田者定為式以上從之果報罷其不應征者為鈔九萬緡有竒邵武所征止萬緡光澤才六百緡在官七年種桑成林民不見吏選建寧路建陽縣尹初建陽包銀嵗輸六萬一千一百五十緡儀之纍牘援邵武例且為過使客力言福建瀕海依山近年經理與兩廣俱免今包銀兩廣免而福建獨重民將不堪變起不測會平章於公至儀之言之尤力公還朝為江南悉罷之嘗禁民藝蔗者使藝粟倡以奉復建義莊嵗積粟二千石復興考亭書院課朱氏子孫學選泉州路推官纍官至奉議大夫有德化蔣氏坐殺夫儀之察詳其夫坐殺牛不勝淹久謀其兄蘄速死其兄隂毒其飯而以蔣氏遞進之原情論止杖罪逆賊院風子脅從九人議當流戍儀之竟論免之先後凡為建陽泉州活江閩偽鈔枝蔓者為多泰定丙寅考試江浙獨稱儀之能得士天厯己巳六月縣君楊氏卒儀之以楊氏之喪歸殯于吉之鴣山未及殯而得寒疾以十二月五日卒得年六十有六楊氏有賢行宋四川總領伯兩之曽孫封南昌縣君子男三志禮志行志崇女許蕭憲孫而夭孫男三女一將以庚午七月某日葬鴣山巨瑞州墓一里而近志禮以余與父同門又深友宜為銘乃論次而銘之儀之材能逹志能逹事而不見聲色不拘小節而不可奪為政不好貨殖而不可儉於義嘗割田嫁兄子減米散母族喜賔客多泛愛而不為妻子明日計奉入常不使有餘退無田宅以居沒無資財以斂可謂賢矣惜也仕不顯而施已狹去京師二十餘年知儀之者非不多又非不顯而卒莫能以儀之顯者嗚呼其命也夫余聞尚書曹子貞恭政王儀伯舉儀之才可修朝廷任使久棄逺外又聞有安童丞相之後曰脫禾赤監泉州嘗稱一周儀之可勝俗吏百千輩嗚呼使柄用人者皆此儀之其不終老下僚也哉銘曰以世以才而止於斯亦奚以為彼何人哉而與之夷甚者過之祿不辭少澤苟在民猶樂其貧官不卑小任苟在身皇恤其勤我銘其藏以著其志兹山之良以昌其世元故從仕郎吉水州判官馮君墓志銘自余聞永新三馮瑞其鄉想見其人及科興大馮奬翁兩舉江西鄉稱馮氏有才子小馮翼翁兩科連舉登泰定甲子第歷官漢陽丞湖廣照磨上猶尹有能名然骯髒必不可獲上以非其道用齟齬坐困久之終不變衆謂有家學老馮諱魯初名希元長余二嵗晚就飬城西淨掃一室罕見其面時為余一出户融怡如春風爽朗如秋月有典有則無一恨事胸次意象靄如也有言其少之日嘗市故書得琲珠數十悉歸其人又嘗謂友人用金幣直數萬緡錢活之於死獄終不自名一錢師友鄉先生水忩劉公講習進修務實踐不為虛譽學者爭迎致人人為盡科興嘗一試有司即棄去曰老矣付吾兒矣卒如其言初至元丁丑鄉邑兵亂大父叔父未葬而父沒於是晝夜號慟積尸中既葬大父叔父尋奉祖母母避逃山中既免而祖母母相繼即世死喪原隰喪亂流離能於其間不廢問學迄用有成其天資仁厚為人師與人交篤於信誠終身言動無一不顧嗚呼賢矣其有子宜哉余嘉大馮為士君子小馮不為今之從政者使人不知其父而視其子以為至足矧余深相知者乎馮氏由吉州司理槃以官為家有葬其鄉登豐者曰琬曽祖諱世昌伯祖藤州僉判安國始大有豪家意祖諱宣子考諱文孫以韋布自藏益深密妣江氏公生寶祐戊午國朝封從仕郎吉水州判官設以沒至元庚辰十一月甲申年八十有三葬所居西偏竹林以其月丙午娶談氏有淑德配其君子生宋咸淳乙丑國朝封宜人沒以至正癸未二月甲辰年七十有九葬某所以某年月日子男四奬翁翼翁次增光為叔父誠孫後次可玉先卒女二顔某龍某其壻孫男四與耕某永寅賔永新多故家大族輕財利以為常士節俠有氣槩如老馮蓋四世守儒矣鄉族昏友皆曰是宜銘二子經稽顙再拜以請余誼不得辭銘曰其外吉蠲其中塞淵德邁其年子肖其賢其歸也全其藏也堅銘永為傳王母湯氏墓志銘廬陵宣溪王氏子斯覺因吾友交熙伯楊貫道踵門而見曰昔我髙祖妣湯夫人於先妣為曽祖姑宋故相江文忠公守廬陵日實銘其墓斯覺葬母三年而不得銘於先生不名為人子邵武令尹楊君伯學嘗狀其行敢藉手稽顙再拜以請余惟玉氏世德內行之詳見于文字者名賢如陸放翁章文肅公鄉先生如敷文王公忠簡胡公文節楊公近年歐陽都官劉太史余何人何足以與於斯蓋辭之辭之久而弗獲按江文忠公志稱湯本殷氏有為吉州刺史者因家禾川之遺直里稱殷使君家宋初避廟諱姓湯狀稱夫人諱聖師生而有聞於家在父母家為賢女歸王氏公塗為賢妻公塗之家事治賔祭必肅中更傷亂雖遷無常處而綜理有常法亂定始去故里一舍而居遭公塗之喪終喪葬盡禮潔已肥家歸女教男春秋無廢事族姻無間言王氏闔族稱曰難初公塗以兄子繼至是迎其私親周給其諸父昆弟復堂構於蕭􅀈故址重建吳丞相潛所書耆昌堂匾稍還宣溪舊觀而治家課孫賑飢恤貧飬老疾葬流殍亦惟日不足然猶以哭幼子斯受夫婦卧病而終辛未八月十六日也得年七十有六子男二人女三人壻胡巖老李尤壽胡定孫孫男女各六人曽孫男女三人葬其鄉周原口亭子坑以壬申某月某日惟王氏世科望族三太守先後相望蔚為三槐余猶及識潮州使君其風流文采晚猶傾動如湯氏以貞白起家中廢子孫不失舊物可不謂賢乎銘曰宣溪三槐百年雨露一旦忽諸􅉃莫知故肅肅湯孫守志莫舊歸視其家槐有三蘖于嗟女德興亡勃忽曷不觀此堂構突兀墓木森森槐隂鬱鬱過而式者無侮無拂桂楊縣尹蕭憲孫妻周氏墓志銘余友蕭克有以其妻周氏之葬求余銘為余言周氏征東提學長孺之女年十九歸於憲孫事姑二十餘年如始至友娣姒如同氣下逮妾媵皆有恩愛每循先世故規收飬棄兒必擇乳哺親在視而加廩給之多病特少歡趣獨喜得事太夫人寢疾有間則喜疾病則憂不幸至于大故周氏疾日革既葬遂却藥以死至元後戊寅十月二日也得年四十有一憲孫哀其不幸無以慰其死而塞余悲死不欲朽將在斯文敢請余聞蕭氏世積德而賢內助為多黃夫人相鄉帥以忠厚起家嘗謂人非甚不幸不至鬻田宅宜隂益之以照其羡費每緡錢必加十為百萬錢加千千緡加萬矣率用此市田宅以為常夫人生長名家嬪于德門能循法度為大夫妻教子忠孝為名御史聞于當時彭夫人喪御史方盛年而有柏舟之志撫三子皆異母而有鳲鳩之德故自御史之亡至于今三十有八年而家道如一日子婦又見周氏焉克有今為彬州路桂陽縣尹鄉稱御史才子子男二祖生次奎生後其季孚有女二壻劉觀次許賀鑑某年月日葬廬陵儒林鄉之尚禮銘曰惟婦德內實家之腴匪婦德由諸侯大夫是故召南其應騶虞惟茲蕭氏積德不渝高曽祖禰世濟其羭我銘女士輝于女史貽厥孫子劉一飛墓志銘吉水折桂劉氏其先見余所志萬翁墓詳矣萬翁有賢行幼孤善視叔父善睦族善居鄉其從弟謙翁自其父與余還往再世至是以其孫一飛年十五為殤子緣世好求余銘以塞其悲一飛自幼己見稱竒童至正甲申生十有四年矣請大父父必試鄉闈大父父不能止也比入院省憲逹官疑其年召而詰之應對不懾已竒其材又詰之曰孰使汝來曰聲教所暨聞風而來益竒其對試畢投卷讀者驚異出門有執其手而識其姓名者自是愈益力學明年乙酉重九後七日以一疾至于不幸大父父哭之慟母李幼受書吾兒復因外家以請其辭尤哀或疑殤子何銘余謂魯人欲勿殤重汪錡問於聖人聖人許之且曰能執干戈以衛社禝欲勿殤不亦可乎一飛能執筆以戰文場勿殤可也銘之曰嗟爾一飛吾銘其藏莊生有言莫壽乎殤張先傳墓志銘吉水堤平張氏自外固徙今三世矣由外固初祖十五世至堤平譜稱上距曲江十七世見趙儀可志伯修甫墓云伯修諱進德魁偉岸識度絶人機略尤深善言行必依于厚常拔人死地以為當然方內附初刑新用重鄉鄰而有鬪輒以寇論詿誤輒附死伯修所全活甚衆所完復民夫婦父子不知名其間毁家以當供億剝牀以奉誅求何限而教子孫禮賔師如承平愈益有又何裕也其子諱籌無改於父鄉稱景良者如伯修其孫諱務志無忝乃祖鄉稱先傳者又如景良於是堤平三世又自為初祖修之不已將復為曲江又可量哉余識先傳時年未二十許厥後東西南北不相聞去年獨聞其死今年甫識其子每得其鄉人之稱先傳者曰自其身以及其家自其家以及其族里昏友凡履常處變修好禦務一守大父成式以奉親歡以為家訓餘事為舉子業見舉於鄉尤嗜好古詩文招致四方名勝惟恐不及用是生計不踈而子孫不愚每儉月常以貸為賑嵗儉即以賑為施鄉鄰惟恐其蕃衍盛大也方景良北歸寢疾左右卧起十五年身積憂勞以至病憊及四年而竟致大故又四年而棄老母弱子以死臨分母子父子語訣又何悲也余讀王君吾素所為狀使人廢卷孰知生斯世為斯民有不得以天年終者多矣是家世積忠厚為豐家而方來未艾又在其後之人謂天夢夢何也人有常言墻薄亟仆繒薄亟裂酒薄亟酸凡薄未有能久長者是故玉長短大小價同惟厚者價百倍厚固當貴重如是耶娶蕭氏子男四欽鉉鑑銓女一壻王貫孫男女四生至元壬辰六月十八日卒至正壬午四月六日得年五十將以某年月日葬其鄉某里欽來請銘曰欽之先人嘗及門矣其季弟銓之婦翁李直又助之請銘曰惟地持盈海晏河清惟地載重不戁不踈厚德者長順德者昌厚德以殃逆德以亡惟兹張氏曲江尚矣匪胄遙遙惟富無驕惟堤之平如月哉生又如居諸與嵗俱除來日方將以莫不臧子孫孫子富於文史銘揚其美自今以始蕭熙明墓志銘廬陵在宋科盛時通藝者抗四方工詞賦者抗三山詩學最盛吉水吉水推文昌蕭氏余受詩家庭辱知衡州推官與其弟甲戌進士一門興詩如漢匡韋衡州有子當宋亡科廢教子孫不廢學故科興而子孫世科亦不絶於是世為通家君諱如愚字熙明於衡州為季伯兄早世與仲兄采熙績元其家學仲亡君尤自強終身不可一日不競平居退然一臞儒應門獨立天姿強明必不可為弱而昧者此其所以興也君事親無不自致其所當盡者事兄如父不辭難嘗曰弟有子職弟子職當如是身所率先惟敏於事勸於學日孜孜焉雖賦役無寧嵗而從容有常雖幹裕無虛日而講習不輟故家事治家教肅而外禦給客至傾倒雖盛寒暑不變又不獨應俗出至談迂濶尤加禮貌所與平生深交館轂不出其門所甚愛故人子甚如其子老友劉實翁晚貢於鄉其子震早登上第君喜過折屐遇羅氏兄弟亦然其天性彛好也延佑初科仲子立夫為伯兄後者登乙卯第授南豐州判官孫霽天厯已巳舉於鄉一門彬彬雖科暫廢常如興時鄉人父兄子弟至今敬教勸學以君為法嗚呼如君可不謂賢乎君嘗捐田三百石助里人役費未死然由欲擴而充之鄉黨宗族皆稱曰賢使君用世世亦用君惠且施族有政矣曽祖諱日躋祖諱深見鄉先生楊伯子所為迪功志銘考諱符世衡州府君也娶王氏先卒繼孫氏後君數月卒子男五鼎孫立夫道孫壽孫宗孫立夫從孫先後卒女一適王氏先卒孫男九女十一曽孫男六女三君與余同生宋景定庚申沒以皇元元統壬申七月年七十有三諸子謂余宜銘銘曰學如力穡是名學殖孰有不學而家不落惟兹蕭氏世有肅心夙夜競勸以莫不欽天之所啓莫能閉也子孫孫子尚勿替也元故三公府掾鄧克順墓志銘鄧氏由汴徙家撫之金溪五世再徙吉之吉水鄉為中鵠里為小陂里孫氏世積善為甥舅家君諱愷字克順由孫氏子繼鄧氏以親親長長聞於其家善事王父母父母無一飲啜不盡勸比及喪葬祭無一節不盡禮於其私親又無一不用其至自親昆弟至於堂從無一日不咸自族里昏友無一語不讎皆曰難弟克順其順矣乎天性倜儻一言可以立棄千金終身不可苟取一分其中心嗜好誠乎為善甚於酒色貨財使人人皆如克順天下平治不難諸公貴人聞其賢爭辟為三公府掾明日以疾卒臨終正衣冠如常顧謂左右今日必雨兩時吾當逝矣已乃果然蓋至正乙酉七月丙辰也得年四十有一君雅好逰嘗泛海東至于日本南至于交趾廣河北至于京又北至于上京胸次意氣故不可齷齪不能五十又不可延數日之命卒以客死上京聞者皆哭失聲殯之日巷哭道祭塞路出都門送者千餘人行道神傷曽祖如海祖應和父貴文妣戴氏娶曽氏子男三鏞鐔鐸女二季釗壻彭明恕次叔真孫男一源女一蠟娘余始與克明莫逆君諸兄也晚與君有連甥孫為其子舍兒子文華又同客京城多倡和讀書常過夜分葬仁壽鄉上槎厥富山以十二月三日銘曰一鄉之士可友之以為善三公府不可得之以為掾男子四方子何非死所遊魂濕子上京雨歸斯復子薑吾土嗚呼順甫將仕郎韶州路知事蕭府君墓志銘禹鼎諱瑞姓蕭氏世家吉水虎溪嵩華山之下蕭氏世科故家至禹鼎始遷廬陵之馬塘距忠簡胡公丞相文公故第為近蓋擇而處之遂為馬塘蕭氏鄉先生須溪劉公扁其室曰嵩崖示不忘禹鼎嘗逰京師集賢以其名聞省部定從江西水補江西復從憲司試選始用為學正封州興學歸田一日必葺封州還教授梧州如封州梧州還授將仕郎賓州行用庫尋除韶州路總管府知事見知宣憲兩司方被遇而以病卒于官至順辛未五月二十二日也始死郡長二率僚屬往哭之比喪還賻奠有加其子逹觀以其喪歸而請銘於余其詞甚悲余少客其族里時科院蕭公獻可以風流厚薦為鄉丈人一門群從多知名者禹鼎二父際南北初混方逰秦淮北窺中原始盡更其故所居以科院領客而落之屢造焉科院即世群從相繼淪沒盛年以主簿死曲江者余友周逺也今又哭禹鼎焉禹鼎以别業起廬陵為豐家以三仕死曲江為中壽余銘禹鼎孰知余悲祖仲貴從事郎淮東轉運使咨議父曰敬張氏子男五逹觀逹胡逹章逹玄止敬女一壻文寀丞相諸孫也孫男女九葬某所以某年月日余聞禹鼎早孤事季父如父昏嫁庶弟妹如一分財利必均二弟安裕至今日者禹鼎力也銘曰嗚呼曲江奪我良友嗚呼禹鼎竟隕中壽嗚呼此碑亦墮吾淚嵩華峩峩歸來無棄劉母黃氏宜人墓志銘宜人姓黃氏諱德順追封承事郎同知太和州事劉君諱時明之妻文林郎韶州路樂昌縣尹中孚之母也初至順壬申宜人拜命感泣承事不及見語子姪曰吾家事處州司户府君夫人歷六世而後乃今復見之嗚呼尚矣狀稱劉氏系出定王二十五世孫義徙吉陽場之億田以進士第發身者十四人而廣西提刑諱鳯最著廣西從弟諱鏜上遡四世祖處州司户參軍諱洵為進賢里梅南初祖生太和府君宋亡家廢宜人相府君起家教子力能昏嫁其群從周急其踈族屬同㸑有三世者賓親旦暮至鄰婦倉卒乞貸以為常終身蠶績必至夜分子能仕初任曲江簿曺謀奉親就飬不許曲江闕府君喪居喪有聞終喪改新會簿歷象州判鐔津尹皆稱亷平至鐔津二十有七月棄官乞便飬及樂昌命下將行而宜人至於大故族姻鄉黨知其平生者無不追悼痛惜生宋咸淳丙寅十二月十二日終元朝至正壬午十一月二十二日得年七十有七明年十一月癸酉葬廬陵儒行車鼓之原子男一中孚孫男女各四曽孫男女各一先葬中孚請曰臨川先生吳公幸銘太和府君若不得先生銘吾母是重不孝也敢泣血以請惟先江陵府君與廣西同年樂昌又辱與逰三仕不辱其先嶺海不欺其志讀奎章虞公所序梅南詩受其文詞故為之銘銘曰夫也良士子兮良吏賢妻賢母斯丘斯志過而下馬無傷其拱把承德郎武昌路推官馬君墓志銘馬氏其先幽州薊人宋樞密正惠公知節判鎮州一子留家鎮之藁城縣廣楊里其後宋去汴南徙子孫不仕金金末有諱增者魁岸雄竒有勇略尚氣節鎮將檄為禆副不就盡以祖父資産讓其兄子進而已之鄰邑鼓城縣買田築室焉遂為真定路晉州縣人鼓城者春秋鼓子之國也有子四人其季諱良善事父兄是生武昌府君諱忠信家順卿君自兒時鄉里皆稱其有祖風至元甲戌江淮軍需繁急侍郎無極楊公某以時名來為晉州君被謀選其供億最先辦而鄉人不知楊公入朝首以君為賢而薦之會建閩省為閩掾見知參政史公弼公以治法征謀自任然必咨訪而後行居閩二年力薦君材可大用君將之京盡以鄉人之喪至自閩而各歸其所親會省部例降嘗任江南者授君浙漕鹽司管勾君不較至官修其法去其弊盡給民工本而鹽課自足先是鹽司裹鹽以誣民為私鹽立破民家至是君悉禁止之竈户有嫗衣濡裳而訴其子下之於水者君視其履襪俱燥怒曰汝不墜水而以惡逆誣而夫之子不仁嫗退果繼母也史公宣慰浙西置君閫幕時權臣姦黨肆為凶虐君退吳山之下至元辛卯旨下浙省鞠訊其黨史公為右丞左丞董公仕選舉君治其獄有西域僧領江南釋教者其罪惡最大而繫援最強爭欲釋之君略不少貸而盡得其情未幾其子以行宣政院副來取嘗訟其父者殺之而終不敢一語及君明年以兩淮𨽻汴建汴省申書移選浙省掾奉圖籍於汴衆舉君至即為户曹有蒙古軍人訟其富驅背主議下所屬以驅還之君視牘其父已放之為民矣詰之曰子安得背父抑良為驅有官族子訟其季奄有其兄若弟絶户財産君命均分之而共其役師伐南交諸路當供鎧仗有宣慰淮西者勳巨之胄素驕蹇議以君董其役至即語其屬曰誤軍需者法當死敢不畏死翼日來見且饋蒸糕君盡以食衆工鎧仗立具授承事郎蘄州蘄水縣尹蘄産竹嵗貢簾條官役民負竹詣郡吏因為姦則請降條式而縣為條以進諸縣得以為例每勸學邵農不為文具置社學由先風化嘗一新公宇而民皆不知此滿借留者數百人改潭州路推官有少婦誣其繼母昔毒其父今與奴私因殺男妾以滅口在繫又嘗生子宣慰司趣其成獄乃與繼母爭家資不獲父死後母嘗誤殺妾因取他人兒為母姦生子君得兒父母所言故所與兒褓證之婦然後服他所訊獄多此類官滿貧不能歸留潭州以至大己酉五月二十八日卒於潭潭人哭之哀其秋授承德郎武昌路推官至治壬戌六月某日歸葬鼓城升平鄉祖塋之次君通經史熟唐律性剛正不畏後禍嘗許當世以馳驅然官止六品年五十僅過二所施狹矣娶耿氏同郡萬夫長之女有婦德中外百口稱其孝敬祖姑李氏尤愛之教子孫有法後君十有八年以泰定丙寅六月二十一日沐浴更衣而終某年月日合葬於君之兆子男六欽吉安路總管府照磨銓桂陽巡檢先卒鎬鋭鎡釗女四壻百夫長汴梁鄭某河內牛某承務郎攸州判襄郡趙某幼早卒孫男一女三欽讀書知大體有長材善論事與余遊求余銘余惟正惠公歷事宋太祖太宗真宗以直聞面折王欽若丁謂輩於上前子孫義不仕金待聖朝而後仕仕雖未顯其將在欽與後乎乃為之銘曰天之將爽必先以昧物有顯時中必甚晦侃侃正惠直聞天下子孫在金終無仕者世有偉人在晉仕國待時休明歸於有德當官無畏故不卑官臨事無畏亦罔後艱惟其不疚是以不憂惟其憂悔是以寡尤不逹不年則不敢知有子而賢天實報之孰厚其積而閟其光斯銘斯藏世世其昌張氏墓志銘余友許有孚可行誦其妻張氏之賢由其家訓父母身教故為張氏賢女既嫁見愛於魯郡太夫人友於其伯仲叔姒為許氏賢婦惜也有四三年離憂之懷而無終嵗室家之樂以死誦荆公一日歸行有可傷心者焉張氏生十有四年而許嫁又七年而始昏其冬有孚將上春官明年蒙恩賜進士以歸明年五月魯郡太夫人不幸終于仲兄維揚之官所有孚奔走南北因二兄克襄大事終喪從有孚提舉湖廣儒學檢校行中書乃由力疾哭太夫人甲戌忌一慟失聲而疾病以八月七日生一女而卒後十五日女亦亡孚感其契闊而遽有死生之分也先生以父兄執友幸而賜之銘張氏死且不朽余與許氏通家再世天厯乙已及見可行以新昏歸寧其後出處無不與聞又安得辭乃序次而銘之張氏世家大都檀州祖某贈某官父某奉訓大夫茶陵知州張氏死時年二十有六可行為之齊衰期銘曰憂樂違行不可齊而樂是違死生契闊不可知而死是期我銘如史以永之子生者之思來者之垂張元英墓志銘平里子姓張氏諱俊大字元英世為蘄州蘄春安平里人自號平里子宋故兵部尚書晏然之從子通判江陵軍府正大之季弟也少孤依江氏娣南徙渡江家於湓水季蘄為清野湓户口日增江閫建景星精舍以飬淮蜀士平里子繇精舍始知名宋亡用寡時自振能不落其故家壻蔡氏蔡制閫幕屬也蔡死不忍更娶蔡氏義以假氏女繼其室凡二十有七年與蔡氏同居如一姓義不分蔡氏資産蔡氏必欲分與之而終不忍言平里子不逮事父母悉推讓先疇以與其親昆有竊據蔡氏田者有謀取假氏田平里子皆悉心與力助之歸田至蔡氏誼以田償更棄劵與假氏其平居赴人之急有甚己巳未衣食念人寒飢義不先已後人其素所蓄積也衆謂平里子逮事二親有不為孝子者乎使平里子與親昆弟同居顧肯出張公藝下耶平里子如得志於時者仁其三族不難也又肯取非其有乎平里死十有一年矣其子鑑能繼其志與蔡氏無間言至今能揚其父之美使不遂泯沒鑑始來廬陵翰林學士臨川吳公以書遺余曰吾徒也至是以景星書院山長滿改葬其父以吳公命來徴銘曽祖權道宋鄉貢進士妣項祖祓宋迪功郎妣許孝武子妣袁子男四鑑鉉鎮銓女二孫男五師道履道首道觀道升道女一平里子死時年六十有二葬吳源今與蔡氏合葬鳯岡銘曰士有隱德而顯維時其身已矣其子逢之匪其子逢隱德之功孰顯是者惟臨川公公實命我子銘其藏嗚呼平里猗歟鳯岡元從仕郎同知全茗州事賀府君墓碣故友江西提學蕭禹道讀書工詩有節俠氣骯髒不可諧戾契取自致平生四海惟燕國材右丞間居鄉評物論嚴如史筆間為余歷選群從之良諸孫之盛亟稱賀性翁余知性翁始此性翁諱士貴系出永新良坊賀氏由唐洪州史君泰天祐中死封疆廟食象牙灘至今有賀使君廟子孫散處安成衡陽夷陵為世科巨室去良坊三舍而徙龍田者諱辨以詩賦稱其鄉世為守儒玄孫諱宋武字憲仲娶蕭氏生二子長曰公武季曰震亨以季為母舅後而公武死憲仲不嗣震亨有大志負其材能自拔興以大其母家而以季子紹賀氏是性翁性翁嘗遊都城歷十餘年多識諸公貴人多贊其材嘗一再被命司知州事由將仕升從仕順隆改全茗嘗以近臣薦典中心閣久之又嘗從近臣見延祐聖人於便殿雖特旨不奪吏議亦久客倦遊念逺道多致異味時蓄善藥常急足馳寄奉老母至是浩然賦歸日奉甘脆跪起歌呼上壽為娛恱自父族母族富安周急飬老慈幼一用其至及門必盛饌痛飲必至釂别去贈賄必盡情奉客尤謹必盡歡遇儉嵗必賑貸其鄉凡耕其田者動以萬計至順庚午募入粟與流官固不待勸而分隱民食其粟者數千家郡議以聞則以老母辭省部定以孝義旌其門其鄉龍溪為江西河南要津每嵗為浮梁輒壞尤病朝涉復捐錢數萬緡伐石為長橋壓以大木蔭大屋度可支數百嵗江湖兩界實利賴至一不與外事不侮奪人不閔有司教子恂恂讀書應門無或險危其大人死之日棄老母不終飬又恨未割田為祀田為義學屬其子必繼其志娶趙氏故宋宗室賀州同知某之女子景文二教曲阜次迪官學湖湘女四孫男四女三性翁嘗為祖父母父母及其私親建龍山寺供佛飰僧又為雲峯寺捐財歸田作新寺還舊僧凡費楮弊萬緡寺有羅漢逹奚為永新上剎其用甚逺余讀性翁所録賀氏家譜愛其考核謹辨證明得其族屬繁世科久又見鄉先生自歐陽都官劉太史鄧禮部諸公所為文字蓋忠臣逺孫文儒故家其所由來者漸矣性翁起豐家芳年京國熟世情偽晚更夷曠歸老醉鄉以天年終其見逺識微類古所稱蚤知之士禹道真知人哉余友揭曼碩既銘其墓貢士馮子將復敘其事求余文揭之墓上使世子孫無忘來者有考云申齋集卷十一
