body:
  text: 申齊集卷十二元劉嶽申撰祭文哀辭附吉安路學仲丁先賢祭文惟我廬陵奮自歐公文學節誼為天下宗後公出者為忠為節後忠節者無如信國真知實踐取義成仁向無文忠安有斯人歷數後先學文政事功名氣節有同有異皆鄉先生咸列於位後之學者曷敢不企仲丁修祀匪薦彛儀庶幾來者有之似之吉安路學仲丁五賢祭文維此五賢遭而不同同不幸者顔李二姜公余及江相業亦異而江不幸亦當宋季俱以宦逰祀於學宫庶幾來者仰止髙風祭歐陽文忠公文祠在城西街維年月日具官某謹以清酌之奠致祭於太子太師楚國文忠公之祠惟公千載六一天下歐公矧是桑梓敢不敬恭上聖龍飛禮嚴祀典爰飭有司潔祠以薦尚饗祭顔魯公文祠在螺州驛左維公大唐忠臣異代彌章天下魯公仕國此邦聖皇御極致祭有嚴恭修祠宇邦人所瞻尚饗祭忠節文祠在城南門維公異代忠臣禮嚴致祭惟茲鄉邦風教所繫聖有明詔敢不欽承以厲天下豈曰廬陵改葬鄧禮部祭文宋禮部侍郎鄧光薦嗚呼宋祚既終公筮其凶香山之禍盡室蹈火崖山已矣公復蹈水家國既盡焉用一身求死不得有甚求仁魯連之志我則行之連也以書我獨以詩誰將千載序此東海誰能古處載之集杜嗚呼同時出嶺有未招魂公今改葬有子有孫孰謂天道而果無知天之報施寧不在茲昔我祖父世接芳鄰而我小子嘗黍薦陳惟此佳城我昔住營薄奠一巵以寫我私祭草廬先生吳公文嗚呼臨川天挺人豪在宋盛時尊道術者無如王氏之䔍尊德性者無如陸氏之髙之二氏者其視勢利之在天下曽不如泰山之秋毫皇元肇興先生時超道程朱之問學參王陸以遊遨談經於雜亂紛紏既解之後若易而實難析理於毫釐千里既辨之末宜逸而反勞蓋議禮者易訟而難决學易者易割而難操惟得子路之折獄惟得意如庖丁之善刀其博學彊記在前史為獨行其善教不倦與後出如同袍望古之人以汲汲遇不知者而囂囂不媢疾以為貶不諛恱以為褒是故尊爵兼天人之貴而榮名極一時之遭進而啓沃大者誦伊傳訓命之敷陳退而講習小者為菁莪棫檏之薰陶伊川康節有其名而無其祿申公轅固與之壽而迍其膏公之存也自南自北皆知恱服公之殃也識與不識皆為號咷嶽申曩緣末屬辱視同曹由延譽以知名如拔尤而譽髦恨及門之遲暮忽聞訃而哀嗸望山頽其己已感川逝之滔滔惟公之門生弟子在天下如吾徒者殆雙兔乘鴈之一毛甫自今而越弔恨誰昔之魯澤感病軀之嵗晏寄薄奠於春醪蓋將為朝野之永歎非徒效閭里之長號祭熊天慵文嗚呼如公年輩尚論才美大江以西一人而已在宋髙科于今名士莫肯蔽賢而誰薦禰嗚呼記問之學靡不有聞我獨懷公小畜懿文閭巷之士皆附青雲我獨懷公大雅不羣公無嗜好惟不捨瑟餘事八分他無玩物公在豫章孰非知己惟有籃與門生兒子昔科未起我童子師忝從公後謂我鼎來公之校文巧移銖兩析理之微有如指掌公來廬陵為我捧檄念我親亡流涕太息我來决泮惟公焉依公曰子來慰我所思公主文衡于漢之廣賀公得人弔我獨往如何今者遊白雲鄉使我踽踽獨行武昌嗚呼風流已矣文采誰論豈無他人匪我思存公有驥子未著祖鞭從公遊者雞犬亦仙孰銘公者起公九泉公不可起我涕河懸祭周如心維年月日戊子契家弟劉嶽申謹以清酌之奠祭於近故中順大夫湖南道宣慰副使周公之靈嗚呼美周必復周而復始重建至元重建丙子彼一時也棣華有煒此一時也湖南不起愾我思公文學法理咸精其能難并具美南安之政猶在人耳爼豆軍旅見稱能仕至今建昌廣譽未已耳目所及罕見其𣲖晚為歸州人皆易使使公未老龔黃可擬公死八十不二以俟方公仕嵗仕何可止公於吾文叙事最喜從政有祿公命之矣棣華堂堂其有其似九京可作敢告史氏祭范德機文嗚呼德機而遽止斯葬母幾時遄聞示疾曽不終喪而疾已革將死深悲惟及其子亦云海內自足知已序詩銘墓不患無人獨懷之子父死誰因君少孤貧依有熊氏師友淵源實始諸此一日詩名震感京師諸公衮衮皆欲得知始離翰苑來海北南髙堂白髮孰知我心江西四載繼以閩海閩海之微沿檄竟歸我從湖廣握手文場相問契闊太息江鄉孰知君歸尋哭老母孰知㑹葬遂革終古嗚呼自昔湮沒何限髙賢君晚遭遇又以詩傳如君何憾徒我深傷平生故人未老方將韓公有言是謂受祉有弟有子庶幾不死嗚呼尚饗祭張夫人文維年月日文母宣慰張夫人葬於玉兔山先葬劉某以清酌之奠祭於夫人之靈嗚呼夫人盛哉文氏方丞相以狀元歸葬太師惠國公鄉部歸葬梁夫人彼一時也及宣慰以總管歸葬齊魏國夫人丞相信國公彼又一時也方縣尹葬宣慰學士葬信國夫人此一時也今縣尹以平陽歸葬夫人此又一時也六十年間每葬愈盛送車愈衆未見少衰維哭死而哀非為生者而四方來觀必有繫於孝子慈孫所自為者矣道路流傳山中故老莫不感歎而歔欷咸曰狀元宰相之世方興而未艾又曰忠臣孝子之澤雖百世而可知嗚呼此可以觀人心矣某來遊相鄉從先交拜丞相於祠堂既登相門從尚志拜夫人於南莊當時復本猶未有屋今春暉煌煌矣當時諸孫猶未就學今兒女成行矣夫人之福其在身者固不可量夫人之德其在文氏萬子孫其可忘哉某俯仰三世每見階庭日盛賓客日稀自惟昔者最少今者亦非升堂再拜哭奠一巵嗚呼惟此華堂世世綵衣惟此華堂萬古春暉祭偰監郡文豫章五桂邑偰氏公來廬陵有如昨日我記公堂如初下筆去日如至我胡不􅀢今我聞訃而死生分憶昨江西公時為理升堂奉母下堂教子文運既開如耕者穫六桂迭興又如六慱髙昌偰氏為燕山竇里巷歌之為升平侯廬陵之政晚節彌髙光於江右悉我民勞猶聞髙卧終老溧陽曷不少留使我涕滂公今已矣我耄云何長歌痛哭哀莫如歌緘情千里以寓一哀猶有鬼神尚鍳茲哉祭周儀之文嗚呼交友之誼垂五十年其間離合竟如使然昔事逺翁携我上謁瑞州饒州遍贊不絶君我定交實始於此號為同門相思千里平生山浦稍稍從容云何鄉曲竟莫與同自君入閩别下六年一見鴣山泣涕漣漣曷不信宿以盡底裏别君竟去遄聞不起君年志學已聞製錦君將告老猶官五品澤不下民責不在己壽不可延誰不俾爾嗚呼已矣痛獨在我嵗晚論心於誰云何逺翁身後儀圖惟君我也不力君亦不聞遲君來歸歸止於斯有酒不飲奈何乎儀之嗚呼尚饗祭龍麟州文元統三年春正月陕西提學麟州龍公卒於齊安之寓舍越九月二十有二日里契弟劉某至自武昌謹以清酌之奠祭於公之几筵而言曰嗚呼公以青原之英挾赤壁之豪盛年馳譽而逺中嵗定價而飬髙文章望古人以切切意氣陋餘子之滔滔鯨吞衆口之雜㳫蟬蛻一時之老叨其為諸侯賓客也以師道自尊而客道矧可勞其為廣文先生也以正氣自負而客氣不可遭蓋其髙足以壓妄庸之僣其雄足以戰流俗之鏖彼論卑氣弱者固不足以鱔舞而狐嘷也是故講學南北之交獨擅江黃之譽其精神足以感召其意氣足以呼號及退老孔山之上逃潜顔巷之中亦偶然之邂逅豈執著為堅勞四方來者或以公為河汾或以公為東坡而公於其間從客酬酢又未嘗厭楚而效曹逃蓋公之學貫穿理數出入王霸迀儒瞽生固不足匡略其萬一而逹人大觀亦何一許析於秋毫其裹從鄉校同時並起公久去鄉我獨永曹久闊絶於桑梓之離異忽遇合於清碧之遊遨湖廣浙江並主文衡方將鼓元化為槖籥安得與流俗而桔橰雖議論不可曲合而音調未始殊操猶傳著論尚想風騷云何疾疢已隔蒼蒿豈清風不可以常聚抑物論不能無永號惟盛時之不再匪天命之不褒慚謭材於楚些慨薄奠之魯臯嗚呼尚饗祭先室鄒宜人文維至元丁丑三月壬寅朔越三日甲辰先室封宜人鄒氏考終于正寢越十日甲寅服始克成劉嶽申謹率次男文曅婦鄒氏髙氏孫女季省八九十藍氏女中壻玉振外孫思順女惠定葉氏娣外孫斗壽婦蕭氏曽孫女閠再滿以家釀庶羞之奠祭於靈柩之前嗚呼吾妻逮事先妣辛勤鞠育以有二子長貧多病而家事理二子在側無疾不起云何今春或逺或邇俱不在側而遽及爾不使吾兒以奉檄喜天實為之人不至此數則有終感何能已余年八十置於後死後死幾時胡以不俟平生之言猶在耳愾我思君君真死矣嗚呼尚饗祭葉氏甥昌文文至正元年辛巳二月二十有八日乙巳葉氏甥斗壽客死于廬陵城山之舟次越三月三日庚戌老舅劉某以家釀家饌祭於吾甥之靈嗚呼汝不復能就飲食數載於我矣汝不復能效奔走扶助於我矣而更以死纍我老可不可耶汝去我時才隔一宿耳而有死生幽冥之隔欲使我不痛恨不可也汝未死曽有一語話一舉動稍迷謬類將死者否而倉卒急遽乃如此以死欲使我不驚呼不可也在嵗庚辰吾娣初嫁丙戌嵗晏為汝初生汝生十有二年吾娣不幸吾時奉母就飬永豐來汝伯娣置吾母傍飯汝兄弟如汝母未亡永豐來歸嫁汝娣子王氏童汝妹子范氏鄒氏吾終母喪携汝娣妹兄弟同家於洪自洪移臨汝之仲子許嫁而死葬之臨江既歸自臨汝之弟觀文死城中葬之城西吾復為汝昏聘及吾為鄉校汝父見汝兒女四人亦來就飬如吉水初癸酉汝父不幸吾始以汝遷居巷西以便汝朝夕臨汝去吾家今甫八十每侵晨來或深夜歸何曽一日不如往時汝去深溪曰二日期歸即如洪念汝載馳安知行盡而死及之我昔望汝哭我送我今我哭汝顛倒莫可八十曰耄既耄且悼悲無幾時此語可悲一觴酹汝老淚如雨哀哉尚饗翰林直學士曽益初哀詞嗚呼自余哭益初而失知音自余哭益初而不聞過自余哭益初而不聞善自余哭益初而不識時務蓋余識益初未冠昏時其頴異異昔人所稱竒童逺甚既冠即如成人既昏益有大志余交其兄復初晚頗厭世而益初已復頴脫間酬對倉卒或老或愕眙君恬不知怪方共客棋陸觴詠事當敵或解講立决行逺近車船糧扉已具即就道而棋陸觴詠遊不廢客竟不知比其細者以䕃補靜江務使而不就以薦補常調某官而亦不就與諸公貴人名王貴戚近臣尤親幸者朝夕富貴可立取而能不茍合在京益久所樹立聲譽益彰徹而必擇所從不徒自重恐纍南士與俱輕嘗過上都遇近臣就君同止宿因極論當時世語傾竭近臣聞君名久得君大喜益竒君凡所建明多出君即薦君才可大用近臣素惡俗吏嘗與君期十年可空其群使中外布滿盡為士大夫君為言國族天性淳原不宜與他族並宜加教飬以别屬籍益重本支仍抑他族以防僣冒其大者如端本以正宫闈勸善以化都城興學校以求人材行科舉以變俗吏定考功以核官政用泉貨以通鈔法而尤以美教化厚風俗為急一時謀議略施行矣授翰林直學士代言有漢制之風雖老於文學者或愧之㑹尚書省罷復用中書官君例以廢歸力田灌園以給公上奉老母凡八年而竟以一疾不起間嘗謂余今之士不過盜名欺世以為髙持祿保位以為貴談濓洛性命固未易求漢儒名物度數亦不可得皆無預人家國事思得博古誼識時宜者與之共論其庶乎其所憂類如此談天文地理農田水利禮樂刑政財息耗官沿革其利弊於今宜所興除者何先皆可舉而行有條而不紊家居奉已疏食萊羔而賓庖豐美無虛日余嘗評君結知當路似黨而歸於忠顛倒豪傑似俠而歸于厚出入老釋似雜而歸於正尚論博古通今明逹治體者闕使天假之年尚未可諒而棄老母弱子為可恨然家事治如他日其母之賢妻之令益見君之所以刑家者至身後而不替要未可少也余感君知余文今已矣乃為之哀詞曰為人臣兮能憂其民為人子兮能憂其親有聖賢之智慧兮不乘勢其安從茍余行之不謬兮又何沫乎危衷躬孝而不終兮亞上聖以猶然命有不幸兮行不辱以昭先君之壽兮過價生君之官兮髙荀卿誠親古以無憾兮獨無今而不平遵何德而壽兮修何行而臧思九州之博大兮何淺陋兮鄉邦之君者以為教常何兮不知者以為附徑文棺可闔而論不可定兮在前史以猶云恨形神之兩失兮遺俗間以然疑世已無工畫兮徴畫史兮為誰嗚呼君有知兮無知余悲幾時兮不悲申齊集卷十二
