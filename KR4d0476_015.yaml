body:
  text: 申齋集卷十五元劉岳申撰雜著筞問三史唐虞三代吐辭為經經不自名然自二典三謨伊訓説命無逸立政諸書七月文王公劉卷阿諸詩為千萬世經筵之祖後之談經有能近之者乎唐虞三代左右前後無不有史然謨典禹貢訓誥誓命之為書二百四十二年筆削之為春秋為千萬世史舘之祖後之修史有能近之者乎皇元開經筵以來天子日親儒臣朝夕不倦臣子得近清光其為啓沃陳善閉邪宜若易然也皇元設史舘以來天子親督史臣務成信史臣子恪共乃事其為紀録為萬世法程宜若易然也或曰漢諸儒傳經至宋洛建大儒而至當歸一精義無二矣宋視漢唐内無女色閹寺之禍外無彊籓外戚之變經學不為無功而國勢不免積弱然歟否歟或曰漢司馬父子班氏父子相繼為史至宋歐陽公司馬公朱文公而史法經意始無遺憾矣宋非無權臣而終畏清議非無朋黨而終尚氣節史筆不為無功而士論幾于太横然歟方今學主程朱士用明經修行或曰時無甘露石渠同異之辨事異建公武鄉郎將之講經筵史館可謂兼前代之徳而無前代之失矣然歟否歟或曰修遼金史當如歐公之五代史修宋史當如歐公之唐書以司馬遷班固之筆力而用司馬公朱文公之法程然歟否歟或曰經筵以飬君徳正君心與務為儒者章句訓詁不同當如禹臯益稷伊傅周召之為臣而後可此其道何繇或曰史舘以法祖宗監前代為重公天下之是非定萬世之得失當如書春秋之制作而後可此其要安在諸君講於斯也熟矣必有以俾益聖世者願悉聞其説書崖山碑後皇元混一天下盡有華夏蠻貊之地及至元乙亥命丞相巴延下江南而後大統一越三年戊寅命元帥張公平崖山明年崖山平而後正統定議者以為元帥之功不在丞相下盖是役也元帥親奉聖謨以大事付之而卒伐功成武烈者元帥也當是時江南已定崖山雖存焉能為有無然漢亡而章武興正統固在以曹氏父子雄傑師武臣力終身不能得之庸禅而以閏位死此元帥所以功盖天下而名冠古今也惜也崖潰而元帥已疾還朝而元帥不起官不至極品年不及中壽然元帥且死而如生死而有子為不死於是天以不賞之功報之其子孫今翰林承㫖蔡國公以忠清直亮歴事累朝抑權佞誅奸宄討亂賊為時名相元功第一聖朝始贈其顯考官太師謚獻武爵淮陽王以報之其身後今廣東亷訪使以文學政事世濟其美為公卿王之聞孫也因刻石崖山於先生所刻石之傍以記三爵謚以與南海相為無窮罔極且以彰示子孫嗚呼自古有大功徳者無不報而報以賢子孫者為尤難故羊叔子峴山一碑使人堕淚而叔子無後尤可悲杜元凱自為二碑一置峴山之上一沉漢水之淵而其子孫未見有能訪求其遺跡而顯掦之者孰若王有子為賢相有孫為名臣而天下稱頌之也哉嗚呼海可竭不可阞而王之名不可滅張氏世萬子孫讀此碑者尚其念諸詩不云乎子子孫孫勿替引之中書叅知政事耿公徳政頌上臨御之二載慎選中外執法大臣以肅清天下耿公文叔繇省䑓歴掦聲實擢為江西憲使于時憲長以亮直清彊董正憲綱其要使其下不可犯而公尤務靖共簡肅宣上徳意益厚風憲大體要使姦偽昬暴畏服其中心甚于誅伐戮辱實與憲長相濟以相成明年春叅預江西大政當四方連嵗兵興之後方數千里饑饉流亡之際緩和鎮撫慰止賙救無一不用其極凡而賦弊餉調之必不可緩噐物饍羞之必不可損多方以奉上裕下者必使肅而給從容而濟集公於是雖不動聲色而竭其心思亦云至矣然方其為憲府不必有所施張可以震動戁竦而人畏之及其為省臣又不必有所建樹比于摧䧟廓清而人服之又明年夏擢為南䑓侍御史如在憲府而益務大體正大綱使南紀為之肅然召為户部尚書進為中書叅政如在江西而宻贊大猷議大政使天下為之晏然於是公去江西且逾數年矣而為士者思之曰公于士類未嘗樹一私恩而藹然下士之意真欲為國得人所以長飬成就之者何其優且渥也為民者思之曰公於吾民未嘗施一小惠而悠然愛國之心惟恐傷其國本所以休飬生息之者何其頎且到也若嘗執吏事以事公者每語及公始終及公退食嘗獨立之時又未嘗不愛之如父母畏之如神明也嗟夫難矣公在南䑓江西引領而望曰南䑓領江南諸道公不我忘庶撫我乎頌公遺愛述公盛徳者所在乎有之而皆相與屬筆於廬陵劉岳申曰是能言而能不以私相譽為悦者宜求必得余辭不獲則士民合辭以請夫為政而不可以一事書者皆善政也為政而不驚世駭俗者無所為而為之故也是故得神武不殺之意而奉行之者可以為天子賢執法得財成輔相左右民之意而擴充之者可以為天子賢宰相兼斯二者惟公有焉在國家宜著旗常勒金石以傳不朽在天下宜善頌禱求歌謡以垂罔極雖徳慚吉甫才乏與人敢惮修辭以乖彛好乃為詩以誦之其詞曰聖人在上天下無妄君子在位庶人不議惟茲江右自昔民勞饑饉疾癘仍嵗荐遭惟皇仁聖爰命䑓臣由憲而省曰惟吉人其人伊何文叔耿公道不干譽義不計功暴有豺虎公如祥麟百獸率舞易暴為仁衆為鷹鸇公如威鳯群鳥畢随以一服衆衆佐䑓綱不競不絿公預政本不剛不柔惟公徳威威在不殺惟公聼明明在不察知公之亷莫如天地天地知之甚於官吏好公之賢莫如鬼神鬼神好之甚于士民士曰休哉載謀載惟何以遺之我有好詞民曰樂哉載興載寢何以諗之我有羙錦維此織文自彼天孫濯以河漢晞以朝暾大江沄沄天下訢訢孰以乆聞不在斯文書黄彌高所藏其先孝友故牘巽齋先生初為里巷趙徳善教子每食輙持歸以奉其母趙有賢妻日必置饌二而致其一於其家曰先生之母食矣先生樂為盡㑹有十趙氏嵗幣以請者先生不顧竟以趙氏三子卒業成名及客郡齋家報母病馳歸則母仆眩良乆已醒矣即為書郡齋云計守道食頃正母眩仆時也母眩仆於家而子安食于外守道尚可為人子乎自今跬歩尚可離膝下乎時郡守古心江公也先生天性孝友少孤事母終身孺慕以為常事兄如父愛兄子如子為文章由衷罄竭無有人心者亦於焉變尤樂道人之善不啻如已有里巷黄和卿孝友一事先生以其發於真心足助政俗凡一再言之先後郡守郡為給榜嵗時置饋和卿拜受其饋以奉其母而藏其榜於家里巷竟不可一見又得葉氏終娶盲女事實以告先生而聞於郡郡守為附郡志世易代遷其子發始從故牘得先生當日劄狀郡守書判以求題䟦其孫仰復以示余余惟此書不待䟦而傳而和卿有可傳者二非此書則世無知者余不可不傳之盖和卿之孝可能其不求人知不可能也志不沒人之善尤不可能也和卿有鄠人之孝而無鄠人之旌門復賦使有旌若復和卿必不受之矣何以知之以其却郡榜知之榜里巷猶不欲而况樹宅里者乎此和卿與鄠人異者也雖韓公復生猶將許之若葉氏子有劉廷式之名而無廷式之位使無和卿則雖郡有先生足為坡而無由信於先生與郡守又何以聞於今和卿能使鄉鄰不知有鄠人而知有劉庭式已有善惟恐人知人有善惟恐人不知是心也非無所為而為之者乎此宜先生所深與也此事在孝友之外余故掲而出之以為世勸而亦先生本志也和卿死今三世矣三世有寳藏此書者難矣又求發揮者愈難矣此又不可不書者也嗟夫為善何負於人哉是可以勸矣箴廬陵劉高仲邂逅蘇昌齡淮海之上風神秀甚論辨偉然覧元學士為党居仁書時習朋來四字愾我無聞因述聖訓箴以自厲云學以進徳難在始入謂鳥數飛如鷹學習所貴習者由外契中由生入熟理到深融昔與我二今我為一學茍在我動罔不吉是故講習易繋之兊以言乎悦無出其外於是乎時習是謂日新後時廢日天之棄民右時習學有始終斆為學半惟知與仁聖以一貫明徳新民均謂之學以後民迷孰云先覺盡人物性乃盡其性有道無教豈天之命朋爾逺來均我受中朋之不來學亦罔終我日邁矣而月隨之聖有明訓欽哉惟時右朋來銘廣陵高生名齋自得求銘於廬陵劉子乃為之銘云民皆有道不可使知所以君子必自得之禹臯伊萊不在堯湯周公上聖非待文王萬物在我反身非遥故曰顔子非樂簞瓢素行者四而逆境三自得我樂人自不堪九夷可居孰曰陋邦而况陳蔡又况宋匡於乎小子自求自趣師友父兄理不能與銘汝自名我銘汝思汝自得矣何以銘為申齋集卷十五
