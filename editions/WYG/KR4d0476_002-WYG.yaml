body:
  text: 申齋集卷二元劉岳申撰序送郝右丞赴河南省序上臨御之初中書左丞郝公天挺以召入賛大議加賜宴勞拜江西行省右丞其秋七月公至官一以民莫為已憂其所罷行害利灼灼在人耳目如浙江嵗饑公在中書嘗謂以江西代其海運至是論當罷還江浙不當為例西蕃茶提舉司設官不便當歸有司廣東惠州等處採珠得不償費勞敝赤子當罷諸當戌龍南安逺南恩潮陽嵗嵗瘴厲殺不辜者常数千人當移南安肇慶潮州善地撫州千金堤成便漕當脩小曹銀場無銀當罷宜黄樂安分武寕新城廣昌地衣民輸官負擔六七百里當折納錢尉吏貧無藉不當祗待站當用各户餘糧而復其户役尤惡不肖子孫發冡者為重禁其買賣皆著為律凢大者以聞立報罷小即便宜皆可為乆逺他便民不可悉數明年春奉命與僉院數軍實至臨江臨江軍多亡逃而官利其利則罪萬户以下倉官多取於民而不禁亷得其羡三萬貫中統鈔有竒則罰郡將以下郡服其神明而安其仁恕余時以諸生拜公見其公餘手不釋卷過於寒素爱民下士有古者賢相之風軍民官請置酒效一驩於前一不許所過無秋毫擾其尤不便民者立為禁止余方以為江廣賀亦自賀夏四月命下遷公河南從河南省臣之請也平章公驚恚曰我獨不樂有同寅邪奈何争吾寮都曺有泣下者曰奈何争吾公百姓相與失色士相與短氣口塞咸咨嗟嘆息曰天遂棄江西耶奈何争吾相以私彼汴也彼汴之人何脩之至也嗟夫使公遂留江西所施豈止如前所陳而已推公之心所欲為民便者何限或蓄而未施或施而未竟公在汴江西不被其澤公在中書詎忘江西哉江西自有外中書以來其間豈無賢相而材不逹志力不終事料力有餘而又不勝欲惟公踈通練逹足以行志獲上信友足以遂事本之以寛仁發之以剛毅始終之以無慾而又輔益之學問故天下之民争欲得以為父母士爭欲得以為宗主為方伯之長者爭欲得以為二雖以聖主知公之深愛江西之至而不能從河南省臣之請莫非吾民故也余聞公世將家其先有徳於兵間而公又以仁厚昌子應官有功於國有徳於民甚衆富貴夀考宜未有艾余獨著公所施江西與江西民所不釋於公者非以為公譽將以告夫君相使知江西未嘗不可治而如公者不可遇而又可暫不可留為可惜也送李總管赴贑州序章貢太守李侯未至章貢而先聲廬陵廬陵之士多其賢歳六日過余敝廬乃一不知其太守之為貴余亦忘其為太守也有頃南安監郡繼至禮讓乆之南安叙通家章貢云平章叙在丞相下南安云以平章公貴介弟余敢若是班乎章貢讓愈益恭詞愈益辯南安叙如初語極雍容又乆乃定觀兩侯揖讓余兩賢之喜章貢得賢守又喜廬陵士知人昔者夫子之論人曰為國以禮又曰能以禮讓為國乎何有郡守古諸侯國也於是可謂能以禮讓矣平章為延祐聖人舊學之臣又為賢宰相其相業在國史輿誦在人心太守其有聞於愛民下士者必有素矣太守嘗知澤潞理問浙省别駕寕國各以其官聞其於章貢必有餘矣章貢與廬陵相依倚為郡國唇齒之國也章貢有賢守廬陵與有焉余又聞猛則民殘寛則民慢繼猛以寛斯為得矣繼寛以猛其庸可乎善為政者用剛柔之中以去寛猛之弊則畏愛具而父母神明兩得之此侯素所蓄積者也余奚凟告焉詩曰敷政優優不剛不柔古之誦詩者以逹政而賦詩者亦以觀志敢以為獻送馮翼翁漢陽縣丞序泰定甲子廬陵再貢而第者二人馮翼翁其一也於是翼翁擢丙科授漢陽丞以歸余嘗備員湖廣試官識漢陽太守許君於院中太守質直信厚君子人也出院過訪秋興亭於漢陽郡治之後徃謁太守焉亭有獨江漢水之勝有大别山郎官湖在其後山有禹廟其登臨之美殆過南樓唐賈至碑在焉恨匆匆不及留文字其間然念慮徃來常有之以為幸得徘徊臨眺當盡前願而不能自必乃令翼翁有三年淹於此視余匆匆至今有餘恨者固已相絶而翼翁以盛年髙科方吞雲夢而納江漢登髙能賦文章特其餘事又非余衰朽者比漢陽之幸秋興之遭也雖然漢陽幸有賢太守翼翁徃能不負丞又科第之幸也士民之遭也豈徒文字而已使余他日重逰得竟償前願又將觀贊府之政成而賀太守之得賢屬吏也豈不美歟故於其行也序以為贈洛陽楊友直家譜序今南雄路總管洛陽楊益字友直余五十年前友也初友直掾江西憲司知名余時二洪泮辱與㳺别乆隔闊惟聞令名日起為南雄始有聲問相及至是徴余序其家譜譜自其曽大父中京府君始至其父𢎞農郡侯三世余問故則曰中京以上譜亡不可考矣楊氏世家洛陽曽大父諱某仕金為中京酒使大父諱某遇紫陽先生為轉運使佐其幙贈亞中大夫河南府路總管輕車都尉追封𢎞農郡侯父諱某以承直郎南陽府判官卒於官三贈階由奉訓朝列至嘉議官由禮部郎中秘書少監至刑部尚書勲由驍騎尉騎都尉至上輕車都尉爵由洛陽縣男𢎞農郡伯至郡侯可謂榮矣余嘗謂宗法廢而族譜亂以偽亂真以賤冐貴以凢陋襲穹華槩不能以其身自樹立以求顯揚徒以其先謂他人昆以取譏笑其有幸而出於喬木故家者又不幸不能守身事親以辱身辱先其不大可羞愧哉友直方其在江西時已能自㧞心不可為南陽府君辱五十年持身玉雪兢兢焉訖能以再世贈官三品三命封侯於以光逺有耀而顯其親可不謂榮矣乎友直所以自樹立何必減闗西又何必冐遥遥而後可稱世家傳曰立身揚名以顯父母孝之終也如友直可不謂立身揚名矣乎世之人不自貴重願藉忘其身以及其親上以險危其大人下以愚不肖其子孫甚至覆絶有可悲傷者如友直光昭其先君式榖其後嗣使中京府君世為楊氏鼻祖其世祀豈可涯哉楊氏子孫尚􅅷戒之送葉審言歸浙東序江南内附三十有八年而科興科興又十有七年矣而江西為盛江西莫盛廬陵廬陵莫盛吉水提學江西自浙東來者曰縉雲鄭公潜昭近年稱金華柳道傳教授吉水自浙西來者錢塘盛公元仁近年稱金華葉審言鄭公文學清修稱其世家余時為洪泮辱相知盛公愽學工詩兩浙知名士皆尊為先輩余辱與㳺道傳矜持有識鍳自負恃不可下古人余時為鄉校辱相聞審言胸次氣象威儀文采賢者也余辱交焉是四人者先後相望垂三十年皆相與而各有深淺若鄭與柳皆嘗為之屬而逺近戚䟽異矣盛與葉皆在五里而落落不相合夫以相望三十年間僅得四人而又若此然則交際離合信矣乎其不偶然也於是道傳别已三年審言今又告别余昔者既恨不得與道傳劇論以求一日之益而今又失審言也嗟夫余乎其無復可以求有益乎余之過遼陽也道傳意若有以贈我者審言去吾鄉而歸將羽儀乎天朝也其何以處我哉贈蒲學正序蜀蒲閬州望族也閬以宋尚書左丞宗孟顯蜀亂子孫㪚處四方余嘗校文湖廣得蒲紹簡魁多士多士稱得人紹簡世出於閬者也今年又識廣元學正蒲君子新子新距左丞九世嘗録叙學為制釋奠禮樂噐於蘇蘇杭至是廣元議制噐如叙而以江西冶鑄為良㑹成都重慶保寕議如廣元皆以屬子新盖省憲以舊勞選而使之子新留廬陵再見夏五而後四路禮樂噐之範金者始備將之蘇杭取磬材焉告行於廬陵文學汴王仲敬倡為歌詩而謁余為序余聞釋奠釋菜皆祭之畧者釋奠有樂而中廢所謂畧者又不備焉當宋盛時歐陽公猶以為恨逮宋宣和大成有樂止於汴京而又中廢至是郡國始備尚論厥初自文翁興學而蜀為鄒魯歴代不乏人至宋而蘇氏父子遂聞天下宋南渡蜀被兵最甚宋亡又甚時絲枲織文之富衣被天下今皆不可復識矣况衣冠禮樂之盛乎今世所傳漢成都禮殿圖象猶使人想見文翁之盛皇元混一亘古所無興學崇禮又為一初釋奠得通用樂又宣和所無此天下太平蜀文學將復興人物將復出之祥也其事雖微而所擊甚大余方為世道人材賀故為子新逹亹亹焉贈李生歸蘄州序夏仲善見其學者李玉與所業易對義一篇玉家蘄春常貢河南聞湖廣之風而起者於是罷科命下而講習不輟勤求余一言如不知科已罷又如未嘗罷者余感其千里求師不隨俗化則告之曰科廢學不可廢上不以賢良方正直言極諌取士士可以為䜛謟面諛巧言令色孔壬否乎上不以修潔愽習取士士可以為頑鈍無知不學亡術否乎秀才異等今不復舉士曰吾不為秀才異等可乎孝弟力田今不復舉士曰吾不服田力穡孝養厥父母大不友于弟可乎夫學者之於五經四書事非為應舉而設以應舉之心而讀五經四書已非矣而又以科廢廢讀尚得名為士矣乎玉乎子必勉之自科罷而有喜談樂道之者其人固可知亦有言之而戚戚者亦未為得也昔者科廢四十年而復興謂有其廢之莫敢舉不可今者科興二十年而復廢謂有其舉之莫敢廢亦不可或曰屈伸徃來易之常理則應之曰我不敢知惟科廢學不可廢如是而已玉字徳潤盛年有志仲至順庚午進士以建昌判官終更而居憂授業於家云送王員外廣東録囚序至元四年戊寅秋九月大宗正府員外郎王君録囚嶺南京師賢士大夫咸為詩文以送其行道出江西以視廬陵劉岳申惟王君將命之肅諸賢贈言之忠至矣盡矣而猶有待於余言乎余聞先漢有女子上書救其父母者其詞曰妾聞死者不可復生斷者不可復續漢文感之為除肉刑而幾至刑措焉夫言豈在多哉聖主如天萬物皆春天下獄成而孚輸而孚矣不留獄矣而猶審克之合於有虞氏與其殺不辜寕失不經之意真徳刑也王君讀書知政讀書則不為徒法知政則不為徒善嶺南之囚凢至吾前者皆死獄也其不幸而寃者其罪皆在有司然而未録以前猶皆生人也既録以後萬有一不免於殺不辜則不可復生不可復續其寃作皆不在有司而在我矣其悔恨可勝道乎歐陽崇公有言求其生而不可得則死者與我皆無憾也夫求其生而猶失之死而常求其死也斯言其庶矣乎敢以為獻贈髙師靖地理說序古今地理察於伏羲井於黄帝奠於神禹而其說聚於九丘尚矣又不獨公劉之豳周公之洛衛文之楚丘始見也若古之𦵏親者自溝壑蠅蚋始由是而宅兆有卜古之卜者真能知後世必不為道路城郭溝池井陶耕鋤所及勢家所奪此其術殆非今之所及而迂儒不通古誼妄諱其說以為古不擇地不知古人擇之尤詳今人併水蟻不知避是溝壑蠅蚋之也不知未有甚於此者郭景純得古人遺說以為書而儒者不能知尚得為儒乎此非儒者學問所當察詳者乎此吾所以有感于髙師靖此書也使仁人孝子之𦵏其親者得其說而求免於溝壑蠅蚋不庻乎於人心能無恔乎師靖其父故愽雅君子丞相信國文公所為書山雲者鄉稱山雲先生師靖槩有聞於家學云張仲舉集序張翥仲舉北方學者始來江東江東才俊皆稱之余始相見豫章愛其踈蕩有竒氣磊落多豪舉急義如飲食男女聞上有賢者輒以身下之常恐其人不先已而蚤逹未嘗見其有所不臧於人人或有短之者終不以為惡聲必終譽之有不幸厄於時命必多方拯㧞之而後已不然如已負之餘事為詩賦之章極才情所至無不輸冩傾竭其意欲者使人望而知其為非仲舉不能而仲舉未嘗以自多至順壬申余再見之江浙校藝後仲舉亦且老矣其氣充然其才情沛然其中心誠好義愈益汲汲然余方恨主文而竟失士愧見仲舉而仲舉如未嘗試者豈徒不知有得失日與余買船下湖長歌痛飲盡興而後别今又八年矣書来廬陵留滯維揚猶江淛也獨求余序其集端夫余何足以論文哉田光先生有言徒識光盛壯時感仲舉行誼至髙殆非今世人故為私論其人品大槩若其詩文固不待余而傳顧仲舉自有必傳者東坡所謂非斯文亦莫之傳也送西忩宣差赴都序今天子嗣登大寳之明年以天厯左丞相仲子前侍儀舉禄補外監南安郡郡當江西上流與章貢壤接南振交廣西距湖湘官吏士民道廬陵過余者其人言監郡族出髙昌有中州賢士大夫之風生長相門有被服儒者之意真愛民下士賢長吏也余聞而異之去年始相見於吾廬然後知聞望果不相悖聲寔果相符他日見其二子皆文雅温厚恂恂有父風又知其教行於其家至是告行將之京師余至大中嘗拜丞相於江西瞻望其閎深慱大魁壘竒傑誠非位正中書不足以展其材畧及天厯登庸天下之士皆曰丞相功莫大於翼戴而不有其功志莫大於肅清而不自滿其志皆以為恨不知其蕃祉老夀得之於天而不盡有諸躬者盖將以保有其子孫孫子以為天下國家建無窮之基垂無窮之聞穹穹厚厚厥有深意凢民彛好罔不同之余既辱知丞相獲交南安喜世禄之家子又有子於其行得無情乎自古定大難者無赫赫之全功履危機者有容容之厚福是故保安世禄者無如恭儉而恭儉必由内心以生是故教子孫者無如義方而義方必以一經為尚此南安素所蓄積何待余言而余言之不置者朋友之至情也丞相有如語及江西人士為言如余者年已八十無所用世矣至元五年己卯四月日劉岳申書羅中徳詹詹集序通齋羅先生蚤以文學知名晚尤宿於理而鬯於文庻幾正而葩者今不可作矣其猶子中徳從家學槩乎其有聞後客分寕分寕是其諸父兄讀書故處中徳於其間徃復唱酬無虚日其友文采蔚如也今年相遇於紫淦類深自晦匿其中所有欲使人不可少見其端緒者與之語澷不可否又與分寕時如二人者嗟夫中徳所謂深藏若虚者非耶一日出其稿視余凡古賦古詩又若干首余讀至盡如主人盛服肅客每門而讓如韓昭侯效古人愛一嚬一笑如季平子養闘雞如張踈不可効陳遵程不識不可為李廣何其嚴也余為之竦然曰幾失子矣盖戰國辯士有以辭勝理而詘者而晋人亦有俊傷其道之譏由是而以文辭為無取以才俊為可薄孰知易謹修辭書貴俊徳其言不文者其行不逺故有俊士俊民皆所以浚明理道而翼張之者也其誰能去之中徳於家學槩乎其有聞矣故余嘗謂文章韶潤不如骨氣而韶潤亦不可無思致不如淵源而思致亦不可少嘗試以家學叅之禮記貫義序須溪先生劉公嘗謂余言小學進業進學廣記甚有功小學先生沒始見其書而先生之言信比年進書惟王天與尚書纂傳出蔡氏後使學者有之為有益恨先生未及見若禮記固未易讀傳文有似經者得䟽而後明此古注所以不可廢後來注者益衆方氏應氏為著最後有衛氏者盡得諸家之說而取其尤長者集為一書然後罕有見者吾鄉曽聞禮以立盛年力學懐明發之思感揆錫之義循名責寔取禮書晝夜誦習之先注䟽次諸家次先宋大儒慱采其尤善者而折衷之名曰禮記貫義盖自有此書以來所未有諸老先生所未及須溪先生至今無恙猶將取之况如余者余嘗言此世著書者無之無損乃他多爛熳者誠可厭而不可以槩貫義是有之有益者也余以衰年媿以立盖逾邁之感愈深而弗去來之憂已决徒願刻成使四方學者爭先快覩無如余之悵然以止也送劉良用秩滿詩序余年十三程教授試二之日其同四句置第一其後蔡教授試有饛簋飱三句亦置第一又後屡試不一試皆然蔡公命之曰子年甚少而文甚老更成何也毎見驚異惟正録未嘗少假以辭色須溪劉先生撫而教之曰鄉校慱士弟子員銖積寸累以序升以望取二者備然後得亞於正録如天子之宰相然鮮不六七十者有老死不能至者焉盖鄉里公論僅而在此此一時也嗚呼尚矣余為鄉校之歳學正劉良用始至未數月余愛其盛年機智警敏可相與以有為而於余所不為亦能無所不悅也其間監郡郡守之相知過使客之相聞者常相接踵而群不逞之滋不悅余者亦不少良用去而攝官吉水既獲人州之長官稱於州之士友以有勞績於學見於余文者多矣至是而後以代歸歸拜其親而榮其鄉無不可喜獨余感年嵗之不與復欲為初試鄉校之日而不可得也有可為太息者昔鄧禹年二十四拜大司徒其後以將相封侯為功臣第一嘗自言臣非際㑹終身所至不過文學慱士夫以將相封侯之與文學慱士也逺矣孰知遇則為將相封侯不遇則為文學慱士也哉然則文學慱士者固不遇之將相侯也由此觀之豈獨顔駟有文武老少之憾而已悲夫此古人所以貴乗時也歟良用行矣無自菲薄於是代官以下學之士友皆為詩屬余為序云送徐子謙赴湖北憲副序太史公書稱韓非引䋲墨切事情載其所著說難有顯為名髙隂為厚利此與内小人外君子色厲而内荏何異故曰不以人廢言類此嘗謂士大夫至公無私而行之必以恕至清無底而用之必以明其中心誠信於忠君報國愛民下士要可以結知於天地而不可以求知於世俗自余所見惟濟南徐君子謙他盖未之前聞也君始為湖廣省郎憲副東粤吾兒父昌候迓之於武昌既已熟其大畧及事君於東粤毎長二僚寀間議論有異同必反覆至盡曲折至當於是而後止盖君之隂顯必不可為兩途心口必不可持兩端始終必不可為兩人故能舍已從衆逹勢從理然終不可為典要惟是之從此君所以大過人也至是君以東粤移湖北東粤之人咸咨嗟悵望曰上遂棄東粤何召公之遽也湖北之民咸歡忻鼓舞曰我輩之傒公重來乆矣何慰我民之切也君子曰是可以論人心天理矣湖北之民徳公也乆東粤之民徳公也新乆者固其孚而新者尤難舍此人心之真天理之正也雖然我公之心豈有彼疆此界之分也哉使君即日升朝為内中書内執法亦舉斯心而措之耳余年八十有七何幸身親見之送李一初江淛儒學提舉序進士得人尚矣使皆如李一初科舉何可廢選法得人多矣使皆如李一初常調何可忽提學得人有矣使皆如李一初學官何可輕於是學官積輕甚矣一初何以能使所居重也哉一初其文學行誼有過人者固宜其於政事無過不及使用之百司庻府必可觀用之親民為尤切今以提學為江浙固所優為而於學校興除利弊恢恢有餘矣學校至近年大壊極弊不可復支獨江浙以能官聞則進士得人之效也一初亦幸際其㑹耳夫以兩浙而遇一初以一初而遇兩浙非天時人事不及此抑今嘗謂士大夫學術不可以不正不正則掊克多而娟嫉興將偽言偽行無所不至苟可以用其深中多數肆其雄猜隂毒必且勇徃而力行之矣此其於士君子為何如也每讀杜詩好心事真顔色兩語常恐此心不見似人乃今於一初得之安得使人不驚喜於既見之後而憂恐於重逢之難也哉余嘗以校藝三至湖廣一至江浙長沙固湖廣之仕國而茶陵又長沙多士之淵藪如一初又其尤者也余既以為江浙賀一初徃無負江浙不亦善乎余耄且悼為我多謝西湖遲君歸榮猶及為君賀且賦之贈采詩两生嘗讀詩至芣苡三章愛其和平悅樂無惡無斁以為此采詩法也使采者比如卷耳頃筐之寘則倦矣又嘗讀中庸大學表記坊記所引詩愛其融液貫穿得言外意以為此觀詩法也使觀者皆如髙叟之為則固矣觀於風雅然後知古人作詩之妙當時采者要不可及觀於夫子說詩然後知古人興觀之妙後世傳註皆不能到采者如蜂之取花觀者如人之取蜜其殆庻乎方今政治之得失民情之休戚上之有闗於徳化大之有係於家國獨不可因民風以上逹其於為上為徳為下為民不尚有補乎永新陳天衢張文淵以采詩告行故為定其大者書以贈之以待其歸贈安成劉玉成赴都昔者孟子稱湯執中立賢無方故詩曰商邑翼翼四方之極昔者孟子稱武王不泄邇不忘逺故其詩曰鎬京辟廱自西自東自南自北無思不服盖古之論聲教者稱朔南論王化者稱自北而南使夫子薄南國則二南不得為風之始使夫子薄南士則㳺不得為文學之先又使聖世終薄南士則㫪陵周氏之學其傳於河南者不足尚而建安朱氏之學亦不足行於天下矣方今聖人以天下為家而南海實為龍潛之所為南士者可不知自貴重願藉乎於此有名世之士猶將退然自處於常人之列於此有大過人之材猶將闇然自晦於衆人之中苟區區以浮華自衒以小有自負豈不益自菲薄羞鄉里輕當世哉故夫士之屈於時非時之罪也罪士而已已之詘於人非人之罪也罪已而已故曰衣錦尚絅又曰藉用白茅孰有良賈而不深若虚者孰有君子盛徳而容貌不若愚者此貴重願藉之道也吾鄉安成劉玉成將之京都余雖不能贈人以言而竊附於愛人以徳於其行故忠愛焉亦古之道也至順改元之九月某日廬陵劉岳申序送楊賢可宜黄縣尹序友人楊賢可既第而官㑹昌官瘴厲地俗又險惡賢可終三年淹而無天時人事之患其政行焉其歸也貧如未第時調永新去其鄉孔邇而民俗有甚於㑹昌之地氣者賢可為之未數月而憂去良民思之横民服之其愛存焉其歸也如㑹昌服除遷江西照磨其官為省幙而位在底僚諸逹官之長日臨其上制其左右賢可為之不謟不援無惡無怨其職修焉其歸也如永新至是有宜黄縣尹之命宜黄無㑹昌之地氣永新之民俗又無㑹府尊官之壓得百里之地而為之室於以為政行志恢恢乎有餘力矣或曰宜黄善地縣尹正官足為政行志固也而無圭田之入野人之養賢可積三仕之貧以不取為不與將何以安其位哉愛賢可者能不為賢可私憂過計乎曰賢可之誠身信友足以獲上治民乆矣過使客有不知之者乎有不愛之者乎賢可能無疚於志無惡於民而已若所遇非所知也君子曰惟賢知賢以賢待人而以不賢人應之是所感非所應古無是理也賢可以暇日徃從呉先生而問政焉其所以告賢可者必非余言所能及也以是為贈辨囿序易言學聚問辨中庸言學問思辨盖嘗歎孟氏之辨矣其辨惟善義内不遺餘力辨楊墨至於無父無君辨鄉愿至於無舉無刺所謂差之毫厘謬以千里者辭㫖殆如酷吏議法畧不少恕而究其初心本非好辨後來公孫龍諸子曼衍横潰四出益信孟子所謂不得已者宋洛建諸賢講明聖學究極藴奥語詳擇精弗明弗措古人問辨之意學者從可識矣舍是復何以辨為哉宜春桂可取莊氏語名其所述曰辨囿以視余余讀至盡槩與人意合者多然後復於桂可曰文王之囿方七十里民猶以為小以其猶有所局也莊子好辨之雄者至篇終而以公孫龍為囿於辨之内示不足也明矣子之取義豈亦有所不足也耶近年夾漈鄭氏辨駁古人窮詰至盡夫辨若是亦可以已矣其於囿也宜不可以廣狹計矣子之是編屬事類辭無論雅俗必窮本始不苟同衆然且自以為不足由此而夾漈不異矣又以為不足而窮源至於聖賢之所謂辨又豈難哉余故與之談夾漈以充其辨又遡莊氏以循其本然後使由孟氏以逹乎子思孔子以易中庸之辨終焉盖充類至義之盡此辨之根祗也此荘子立言之㫖亦桂可名書之意也贈談命熊景仁昌黎嘗言我生之初月宿南斗坡公自謂其年生者無富貴人而與馬夢得為窮之首自昔大賢槩乎其有是言也故有晚知前定而悔不讀書者惟韓蘇二公乃無是悔耳余生宋五庚申為景定初元天朝中統之初也年十七而德祐為至矣科舉廢而不知學為聖賢之學章縫賤而不能去為農賈之業盖不擇術與不知命合而始為棄民始不能以饑渇之害為心害於是可畏之日為無聞之境矣又何止不讀書之悔而已哉毎遇江湖談天者相從問命未嘗不内熱汗下也儒者不能自求性命之說於經孔孟而必待星翁日者之說而後暫息乎其僥倖之心則是星翁日者猶有功於為儒者曽星翁日者之不若也余徃來歐鄉識熊景仁景仁善言命余所愧者也歐鄉之士類多稱景仁傳言天道逺人道邇以景仁觀之逺乎哉景仁至是求余言以信其術余惟不能自信其命而取信於景仁也景仁又使余言之以信於人其待余言也耶余言其果足信也耶景仁行四方又曰仁山云趙氏族譜序嘗讀唐書宰相世系以為兼史記王侯年表蕭曹世家之體此歐公新意也世之升䧏家之隆汚可考察焉後有作者不能及已自春秋譏世卿而勃興暴貴不為不祥故嘗以為使漢如唐人貴氏族重門户必無衛青尚主之事宗法廢而族譜存猶之可也西洛趙氏族譜司馬温國文正公所為序引者宋叅知政事贈太師中書令兼尚書令魏國文定公諱安仁之世系也譜自唐孟州温縣令貽孫而下十三世文定而下至前進士夢雷九世按序所稱有藝祖與為布衣交者焉有藝祖自言嘗識其祖其父者焉有真宗所稱為萬石君家有仁宗所稱為忠孝者焉有洛中稱為顔子者焉盛哉富貴人所可致而帝王稱其世濟家榮鄉里比之亞聖大賢此不可倖而致也帝王所稱鄉里所誦猶可致而有多世立言者垂之不朽又不可倖而致也夢雷不忍其先緒之遥修其譜詳其世將以遺來者而以示其交廬陵劉岳申曰子盍為我言之某何人而敢賛一語於前序之後乎惟欒郤䧏於數世房杜敗於再傳有不忍言者而九世之後有如夢雷難也此文定而下之所積也夢雷而下復有如文定未可知也夫有名祖父者有幸不幸子孫賢使人稱之曰幸哉某為有後否亦使人疑之曰惜哉此為某之後此之不可不謹也夢雷字長公以殷遺老自號靜虚云送蕭太玉教授循州序天厯元年冬十二月江西大雪於是吾鄉老者乆不見三白少者有生三十年未曽識者明年大雪加凍大江有絶流者小江可歩又百嵗老人所未曽見者今年六月多雨恒寒雖百嵗老人未之聞也吾鄉有嵗一至大興開平者曰兩年之雪大興所無去年之凍中州不啻過也六月之寒則近開平矣有自五嶺來者皆云連嵗多雪於是新喻蕭太玉被命教授循州今憲使魯君子翬贈行以言具述其言世家之盛而深慰其南行之苦翰苑諸賢相繼有作槩未知朔南氣化如此其變而今昔推遷如此其殊也太玉以世濟之才襲世家之業際王化自北而南之運今之嶺海非昔之嶺海今之循州非昔之循州矣雖然太玉世家亦知夫人事之推遷有甚於地氣者乎地氣以漸人事以速故有勃興暴貴者自其子女玉帛衣服車馬宫室苑囿無不可一日二日為之而有餘無不逺過夫幾世幾年之積者而幾世幾年或愧之豈徒愧之有不忍言者矣至於喬木則終不可一日二日而為也而然後愧於幾世幾年者而然後内熱汗下而然後不敢自比於人嗟夫太玉無亦自貴重其所以異者乎太玉徃教以其家世之業益修其身踐其行以及於人將使循之士文學行誼由我而丕變如地氣之變可也又豈獨循而已東粤之廣人物之衆將必有賢者出乎其間世道人物尤將頼之可也夫如是則人才與氣化俱一新於以大闡朔南聲教之盛又自江西故家始豈不愈幸歟此則所望於太玉者也以是為太玉贈其可歟今年為至順改元之九月某日廬陵劉岳申序贈日者劉寳翁太史公為日者立傳著司馬季主之賢與宋忠賈誼辨論古今天人之際要終反覆熟爛之極使二大夫惘然自失盡廢其生平與其高論何其言之快氣之晟志之尚也然季主所自譽不過忠臣以事其上孝子以飬其親慈父以畜其子視嚴君平與人子言依於孝與兄弟言依於弟又何相似也烏乎季主君平不可尚已抑余嘗疑先漢聚占者曰五行曰堪輿曰建除曰叢辰曰厯象曰天人曰大乙各有不同言某日娶婦或可不可或不利或大小㐫或小大吉各各相反論辨不决制詔避諸死忌以五行為主而然後定故曰未必然也使人拘而多畏自先漢已然矣况去漢又千有餘嵗者乎余里隂陽家有劉寳翁得通天竅之書其法以方位定隂陽以干支分順逆以叢辰取多吉而大槩主五行生旺本郭景純五吉六㐫之說合於孟子天時地利之意此儒者不可不知雖秦火不可存盖娶婦嫁女制宅祭祀葬埋古今必不可廢又安可以穿鑿支離而妄議厚誣之也哉余耄惽學恨不慱記恨不强竊謂隂陽家與古卜筮意本不異是以論著而傳之所謂以利為本違諸不利者其殆是乎贈音無聞至元後己夘夏六月余來豫章避暑市林院有僧音無聞大明人也莊嚴佛菩薩羅漢皆現金身諸相皆具足寺有山田十一畆豊嵗不足支半月日飯寺衆遍十方不下四三十人徒仰日所乞食又與徒作佛事以補不給寺衆皆知勤苦修習又嘗遍叅諸方究竟本性證悟囿覺有超然觧脫意㑹童子擊鼓余問音聞否又問鼓自聞否徐云聞鼓頃之鼓鍾余又問音聞否問鍾自聞否鍾鼔相聞否徐云聞鍾余聞至人始於聞而能無所不聞由無所不聞而能無聞是故無所不聞可能無聞不可能今且以鍾鼓求之未考擊時無聞考擊而然後聞吾將聞鍾鼓於椎椎無聞也聞鍾鼓於童子之手手無聞也且未有寺時無佛無僧安有鍾鼓何處求聞是故以聞聞不如無聞聞嚮者以不荅各盡之矣故謂音無聞無聞亦無音陳母魏國太夫人壽詩序揔管陳侯為廬陵之明年二月以元統甲戌南北諸賢所為魏國太夫人壽詩視余子曰盍為我序之惟陳氏自武宣至侯再世自毅敏至侯三世毅敏當宋亡元興之初武宣當至元元貞大德之間遭時遇主榮耀備具毅敏奉新安郡夫人來家泗水而貴顯於南無絶裙之恨有禄養之榮此宜如何其樂也武宣早失安化郡夫人有陟屺之痛而以富貴夀孝終此宜如何其憾也此存本所為作也侯承祖父之業際隆平之運所至奉魏國太夫人厚禄孝養有毅敏之樂矣而無武宣之憾焉又何其盛福之至也於是夀有詩而詩有序矣復何以余言為哉惟陳氏有三世之孝孝為百行之先所宜稱道不厭載稽古昔史克頌魯候必稱夀毋杜甫賀陽城郡王必兼鄧國太夫人惟我廬陵嘗建行省相國鸞旗所嘗弭節夫人魚軒所嘗稅駕侯又嘗讀書其間今以朱旛皂盖重來是邦明發有懷能無情乎余以壯嵗瞻望相國馬上今聿既耄猶得執筆以叙此詩雖不敏亦不敢辭申齋集卷二
