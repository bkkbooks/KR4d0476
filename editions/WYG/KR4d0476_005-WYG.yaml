body:
  text: 申齋集卷五元劉岳申撰記褒忠廟記廬陵城西有古廟曰褒忠是為宋贈徽猷閣待制忠襄楊公之祠公諱邦又字希稷吉州吉水人登宋政和五年進士第通守建康城陷死之建炎三年十一月也初女真入寇宰相杜充以重兵降户部尚書李稅以緫餉降守臣陳邦光以城降公獨不屈血書衣裾誓以必死衆擁之拜烏珠不可烏珠命其酋致書許復其故官公以首觸柱石求即死金人驚懼亟救止之公復書死且不畏利可動乎幸速殺我明日宴稅邦光堂上立公堂下公大罵稅邦光朝廷以汝扞城賊至汝不能扞又爲降虜於賊與賊共宴飲何面目見我乎金人相顧失色明日再見之烏珠公大罵汝欲取中原耶行磔汝萬叚矣尚欲污我乎烏珠命速殺之公罵不絶口以死事聞贈直秘閣官其二子賜田百畝立廟死所紹興七年髙宗幸建康贈徽猷閣待制賜謚忠襄官其二子加贈田三百畝廬陵舊祠公於學宫端平甲午金亡之嵗始建今祠地故顯敞而祠幽邃門廡嚴翼中爲髙堂又髙其中爲肖像之室守以闔閭饍以祀田宋亡豪奪巧侵僅存像設至順癸酉真定劉侯原仁來守廬陵修顔魯公歐陽文忠公祠於是天厯進士劉性以褒忠爲請曰廟故祠宋死封疆臣楊忠襄公爲侯誦之侯慨然即曰命有司修復其舊既成性求文記嵗月余辭不獲則記之曰惟我廬陵自歐陽公以文章氣節爲東南倡鄉里聞風而起者曰監丞歐陽公以不奉使命割兩河地與金人死深州城下同時相繼而死者公也其後有忠簡胡公上書乞斬秦檜王倫孫近金人購其書千金得而讀之君臣失色喪氣然猶坐忤檜竄新州十九年其後丞相益國周公以忠文耆德老三朝安撫楊公以文學節操名一時實忠襄從姪孫宋亡丞相信國文公以光明俊偉死燕市聞天下有光忠節無不及者此六七公皆發身科第不出廬陵吉水間尚論淵源文忠之澤逺矣忠襄之烈實抗同時以開來者其可没乎公未第時有以尤物移之者公明燭危坐旦則焚其衣冠謝其徒其平生大節已定於此我國家列聖御極累詔天下凡忠臣義士在祀典者致祭有嚴猗歟盛哉盖褒忠者所以勸忠非以忠義在人心者乎在人心者本不繫祠之興廢記之有無而於以繫人心厚風俗亦不爲無助者昔歐陽公以王彦章死節既列其事於史而爲之傳又命工完理其畫像於鐵槍寺而爲之記盖拳拳焉公豈不足於傳而猶使人拜其像識其面目則公之意從可識矣鐵鎗猶然况忠襄乎雙桂堂記相州以􅎋王河亶甲所居故名其縣湯隂又爲周文王演易之所歴代以來名世之士多出其間故人㑹福院照磨許君獻臣家焉君有子四人仲子有壬登延祐乙夘上第累官爲兩淮鹽轉運使季子有孚登天厯庚午上第初仕爲湖廣儒學副提舉官樹雙桂堂其鄉以顯其親以勸學方來甚盛舉也初㑹福官臨江時嘗爲余言長沙有書數千卷教子讀之吾将老焉臨江别去而可用擢髙科登膴仕前年武昌别可用而可行明年遂踵武其兄余見㑹福歴官中外不過幕府而亷能欲過大官又聞其冡子大理君善治家敇其弟曰家事一不以累吾弟弟讀書應舉一無憂家事幸乃俱第堂以雙桂名吾堂弟勉之大理之言至是而信堂成而大理不及見之可用逺徴余記余惟斯堂固可記而許氏所可書者不止此爲許氏所可願者亦不止此余著其大者始㑹福生七嵗而孤母宋夫人年二十有八自警誓靡它㑹福既長爲綵衣堂以奉夫人畢盡所以爲歡者以養夫人守志四十七年而後以考終㑹孫婦趙當封讓爲湯隂院君進封髙陽郡君余見可用居大理之喪㑹福髙夫人晝夜哭爲少衰又見可用有妻之喪髙夫人哭之慟曰是孝於宋夫人嘗讓封者又善事我善友娣姒賢婦也率冡婦以下喪之冡婦以下皆慟可與可行爲位而哭曰嫂善事余母余何以止余母之哀可與可行皆慟嗟夫許氏孝友再世矣今之雙桂皆以孝友稱於鄉者也而孝友豈徒此一鄉擢一第效一官以止今之雙桂固昔者綵衣之積也於是斯堂爲世綵之堂矣可用立朝有大節濟世有大志光明俊偉能以令名始終之者也可用自此而升毋忝㑹福毋負大理毋下兩淮以蚤有譽於天下以從其兄衣綵而登斯堂然後使天下之爲人子者莫不以許氏之榮其親爲勸然後使天下之爲親者莫不以許氏之教其子爲法将見許氏孝友行於天下矣此豈可與尋常青紫拾芥者同年而語哉又豈不爲大理名堂之至願官樹宅里之厚望國家設科目之良法美意也歟傳曰故人樂有賢父兄也余既許氏父兄之志有成又嘉其子弟之才皆有聞也故樂爲書大理諱有恒字可乆至大理路知事可與名有儀嘗爲筵檢討其孝友尤著於家云尊陸堂記永豐游仁翁自名其堂曰尊陸尊象山之學也求記於廬陵劉子劉子謝不敏者數年而勤求不已則告之曰陸必不尊子尊陸何與人事雖子亦何與焉如余者固不暇尊之而又何暇記乎仁翁曰是可以記吾尊陸矣則重告之曰子知陸氏乎自有文字以來孰不尊易詩書禮樂春秋而陸氏未嘗尊之自有聖人以來孰不尊伏羲神農黄帝堯舜禹湯文武周公孔子而陸氏未嘗尊之子之尊陸非陸學本意也有不為陸氏罪人者乎然則陸氏果傲羣聖歟曰非也萬物皆備於我而我不知人皆可以爲堯舜而人不爲而方且求萬物求堯舜於堯舜甚者徒求於紙上此陸氏所深悲者也而子方以尊陸號於人豈不大可悲乎且嘗試與子求之吾與子各自有可尊者各自尊所尊而知行之不暇而何暇尊陸乎然則如之何曰尊德性而已此羣聖所以爲羣聖者也羣聖與我所同尊者不過此耳此學問之大本大原也子能如陸氏之尊德性而又能如古人之道問學則羣聖所以爲羣聖者不在羣聖而在我将尊我之不暇矣而暇尊陸乎仁翁土木形骸不事修飾至論説古今人物談當世事不覺復有餘人嘗所交游以爲一時節俠士自爲死友終不以成敗爲是非里豪猾少年輙以口擊務爲不可勝晚更折節得陸學而尊信之其天資有過人者余故以仁翁反求於仁翁將有尊於陸者存雖謂斯堂爲尊游可也此善尊陸者也此尊陸也玉清觀記臨江有閤皂玉笥諸山道家號爲洞天福地而城中老子之宫自天慶外無聞焉蘇文忠所謂雖非事之損益而理有不當然者或曰此臨江所以近古也又曰此玉清觀所爲作也余嘗愛郡治清江而渝淦二州事得専决其至於郡者盖無幾是故訟簡其上爲淦州其下爲樟鎮舟車皆輻凑而郡治在百里之中如不與知故其俗朴其市少喧多寂其官府蚤休其民不事豪横故吏之至者類無所貪暴或曰此臨江所以洞天福地也又曰此誰之賜也玉清觀雖欲不作不可得也自余見全陽道人趙某乞貸於城中故家買地爲觀爲民祈禳爲臣子美報盖謀惟之者數年矣至延祐庚申玉清告成至是求余文爲記余惟三代以前見於詩書者有昊天上帝之號皇矣惟皇之稱當是時雖無延康赤明龍漢之紀玉清上清大清之宫民之疾痛不過乎呼天天之聰明不過乎求民君臣上下不過畏天命閔人窮使其民不犯乎有司其君用五福錫厥庶民然後其臣用天保以報其上自日月山川凢髙明悠乆者悉以歸之焉雖後世長生之説何以尚此使今之遊玉清皆以上帝臨汝毋貳爾心爲主上無以偏黨爲政下無以回遹爲德横政之所不出横民之所不止即無徃非玉清之境無徃非洞天福地矣不然惟天地之無窮哀人生之長勤此屈子所以開天閽排閶闔而有太微清都之境無爲太初之想也又豈待方士言而後爲天皇太乙紫㣲北極之祀也哉嗚呼六經以前凡言事上帝者其道皆出於聖賢六經以後其術皆出於神仙方士盖宥宻肆靖之功不自周召而清寧静一之效又不自盖公則長生不死之術不得不自安期羡門亦其理也於是玉清爲超氛埃遺衆患矣余雖欲無記可得乎許氏祠堂記新安程約我嘗爲余言其鄉許氏子汻既爲祠堂以祠四世又於其旁别祠汪氏父母嘗以爲後者汻願求記因約我以請余問故則曰汪氏母姑也姑不幸無子又不幸汪氏子無可擇者始將汻焉而汻父母以異姓辭辭之不可而後許之姑夫媍甚愛汻不啻如已出嘗曰我死非汝祭必不嘗不幸姑夫媍俱亡汪氏族争利其貲而奪之汻不校幸母存即日告母歸復於許既歸汻不忍汪氏恩勤之意而卒以不祀此别祠所爲作而記所以不可無也於是許氏諸父兄舉范文正公别祀朱氏之禮以爲證而新安諸士友又發禮縁人情之説以爲之辨其説既已詳矣無以余爲也以禮請之不置則告之曰孔子射矍相之圃使子路出延射曰賁軍之將亡國之大夫與爲人後者不入其餘皆入釋者曰與猶竒也後人者一人而已既有爲者而徃竒之是貪財也夫汻以父命爲姑後時汪氏未始有爲後者也是爲人後非與爲人後者也非貪財者也夫汻以汪氏子有與爲人後者而已去之復於宗焉非貪財者也夫汻以不忍汪氏姑夫媍不祀而别祠於許氏之旁是爲義者也以財則不貪以義則爲之是不倍不貪讓也不倍忠也不賢而能之乎是可記也若夫大恩一本而禮由義起者情也非二本也汻字元思許氏汪氏俱世官云三節六桂堂記三節六桂堂者前廣西元帥偰文質豫章私第之名堂也曷名乎三節曰尚書夫婦父子忠貞孝三德具是宜名曷名乎六桂曰延祐科興以來乙夘至庚午凡六科偰氏五子一姪接武聨登是又宜名此天下同倫所罕聞而一家積善所獨見者也初至元中國家用師南交尚書以東廣榷塩都運督餉至惠之慱羅清灣市遇賊衆刼以兵而强之爲渠即大罵賊以死死猶有見其乗騅力戰者猶有聞空中金鼓聲者卒大破賊事聞謚忠愍夫人韓氏盛年守節誓必教子顯揚下報所天㑹疾病元帥方十歳聞古有刲股能已父母疾病者出其至性聞斯行之夫人疾有間享年七十有二嗚呼忠愍生能捐軀死猶討賊一念之烈上通於天天以貞婦報之未也則以孝子報之猶未也則以聞孫報之使之逢時有聞科興而登右榜擢上第躋膴仕焉此豈人之所能爲哉大德中元帥理問江西入奉太夫人甘脆出領諸子就外傅書聲琅琅東湖之上晝夜不絶余時貳教豫章嘗從衆賓後親見元帥奉親教子當時豈知後有科興盖十年貢舉始行貢舉行而偰氏一家兄弟如拾芥此天也余惟古者死事之孤流轉失所多矣越有納官之令漢有羽林之制其後卓然知名者幾何人哉偰氏爲天所祐過人逾逺良由其樹德深故取數厚君子曰忠愍之忠韓夫人之貞元帥之孝皆不欺其志見知於天所謂修其爵而人爵從之與科興而後讀書教子者有徑庭矣是宜六桂能自致青雲如古進士爲國名臣意者天將昌偰氏以扶世教殆未有艾也元帥鷹揚虎變常許當世以有爲在淛右有汲長孺之風在廣西有馬伏波之志此世道生民之幸也余既樂道其事以風厲天下益勸爲忠孝又爲之記使後之登斯堂者世世子孫恒無忘其初云王員外東粤慮囚記世祖皇帝以不嗜殺人一天下以不忘逺丕冐海隅蒼生故議獄緩死之意常重於不留獄而待盗賊小人之法或仁於議親議貴凡黎民赤子有不幸麗於辟者各路訊之以推官各道審之以司憲至再四矣臨刑又加審焉何其仁也嶺海去天逺愚民輕犯重刑固其理而近年奸民有爲不軌累平民死詿誤死亡者何限則其勢也先是有㫖定三年五府官一出分行各道處囚至元戊寅秋七月大宗正府員外郎王道一以選當之東粤論死獄五十有四而輕繫有三爲囚百八十有三人以聽於五府之命計其間有寃者亦無幾矣員外既至五府列坐獄卒百餘人擁囚至庭員外以爲責在審録若施行有寃則審録有罪今五府畢集囚計必死加以麾呵叱咤之餘魂飛魄逝安敢訴寃必有寃死罪當誰執始命推官盡去獄卒止留一二僕扶囚至前禁亡敢呵叱者囚各得吐實有異詞而同寅輙命加刑以訊員外止之曰今當審録不當鍛治命有司以囚退命推官務得其情無輙肆榜掠有獄與辭異者員外復命詳讞同寅欲據成獄論死則靣命推官以朝廷内遣五府外遣甲書臺憲爲七府事不輕矣獄與辭異者不可處斷推官亦以獄成爲請員外語之曰肅將審録法當詳讞若違制用成獄則諸君自决之我不敢署用是囚死無寃如循州有坐從强盗刼獄放囚刼財殺人者凡三人渠盗未得而三人坐不原則以從父從叔脅從議減死南海有坐竊盗拒捕殺傷主人而以强盗論新㑹有廵檢殺死拒捕人而以故殺論則議之曰竊盗拒捕傷人竊不可以爲强民拒官而官殺之官不可以爲故清逺有以子盗牛殺人而連坐者曰是可以子殛父乎新㑹有從父争田殺人父死而子繫者曰是可以父孥子乎有晝掠民財因殺庶弟以拒人者議當遷不當論有婦人主謀刼殺而身不行者則曰婦異男子不當以爲首論東筦有殺二人而賄捕盗者置二人於逆黨則明二人非盗正行賄者之故殺凡决遣二十九人釋六人議以上聞者五十有九趣具成獄者八十有八惟處死一淫婦之與殺其夫者咸曰殺之宜又曰是足以清瘴海而去淫風矣君子曰仁夫員外異夫殺三人爲亦足以反命者異夫發乗矢爲不廢君事者仁夫員外其先審録重違制也後平反重失刑也有優優之政而無近名無赫赫之功而有隱德敬慎之至也員外其庶矣乎其於世皇有天下以來仁心仁聞其知所欽承者乎余昔者送君入廣以歐陽崇公求其生一語爲獻今送君還朝喜君能求其生而可以得生故樂道其事書以爲王員外道一東粤慮囚記蘭雪齋記廬陵蕭孚有以鄉帥之孫御史之子當國家鄉用文學之日讀書槃中逺跡塵外有蟬蛻富貴渾脫聲利離去世俗逈立幽獨之意然時時取髙人世外所未能亡者數寄意焉其間居誦李太白諒魯仲連詩有曰獨立天地間清風灑蘭雪意欣然慕之取以名其讀書之所曰蘭雪齋余友范君德機爲作大篆三字筆意髙古孚有求余文爲記余惟魯仲連髙風勁節自太史公後惟太白可稱知已太白詩慕仲連之爲人者多矣獨此兩語如爲仲連冩真數千載之下如見仲連此不可以尋常言語文字求也盍相與言仲連乎仲連齊人也當是時天下之勢在齊山東之國能制秦者莫如齊秦取天下所爲逺交而不敢加兵者齊也故齊最後亡昔者孟子嘗欲用之矣而不果用仲連者有孟子之志者也夫蘇秦張儀其才足以識天下之大勢而皆汨沒於利欲計二子之在當時炎附臭逐如蛆蠅之在糞穢終身沒溺不可悔悟仲連不肯帝秦一念已足以葢世而吞秦矣使其受平原君之封爵與其千金即與二子何異後來遺書燕將徒以世齊人誼不忍父母之國見辱於强敵爲齊取燕復齊故地而田單者不知其心亦欲以區區名爵而覊縻之此與平原君何異夫仲連視六國之人皆甘心老死奴虜六國之人材皆甘心暍死臭腐此仲連所爲横絶焱舉而不忍顧者也是意也惟太史公推見之惟李太白嚮慕之夫以一言而郤秦軍殺燕將使仲連得志秦雖有席卷囊括包舉并吞之勢將無所施而能使趙勝田單終其身不得復覩其面此如幽蘭之在空谷大風飛雪灑然過之自知爲已山中之人有垂老不見者而况䙝玩之乎而况市之人乎此仲連之髙風絶俗而太白神交千載者也余故取太白詩意傾竭言之雖有善言蘭雪者無以尚之矣古之賦詩者以見其志孚有於詩獨取此其志可知也延真宫鐵柱殿記豫章鐵柱延真宫祀晉許旌陽有年數矣道家以鐵柱爲旌陽所鑄以鎮伏妖孽入宋祥符爲景德觀政和改延真宫嘉定加鐵柱二字中更建炎兵火至景定庚申如建炎國朝大德癸夘火其僅存者惟道士徐希真之廬越四年丁未宫成㤗定丙寅又火宫以次修葺其左有殿巋然者其下鐵柱出井數尺與江通江漲落髙下爲出沒豫章環四面皆水獨至今無水害皆曰鐵柱力也郡有玉隆宫宫本旌陽故宅道家載旌陽事本以忠孝積功行以正直驅物怪柱出旌陽理必不誣余嘗謂自開闢而有懐襄之禍此後世所不及見者向微夫子定書則神禹之績猶將疑之劉子曰美哉禹功明德逺矣㣲禹吾其魚乎吾與弁冕端委以治民臨諸侯禹之力也當時趙孟號爲賢鄉且惑其言今之知有禹績者徒以孔壁書存故耳孟子論三聖之功以驅蛇龍爲首猶書意也使是説而非孟子則且衆咻之矣自漢以來河決之患載之信史者不知其幾每讀瓠子之歌而傷之方决河時天子自臨决河沉馬與璧羣臣從官以下皆負薪置决河中亡藝甚矣豈惟逺績禹功之不敢知使遇旌陽何憂河决難塞至取欺方士爲世笑也哉傳記載鎻支祁事世以不經見而怪之鐵柱與支祁事頗類彼鎻得之流傳此柱徴之目擊以鎻支祁爲不經以驅蛇龍顧不近歟蘇子瞻謂今人不復見古事反以所見疑古人見古人之不可望而今人之益可傷也祭法曰聖王之制祭祀也能禦大菑則祀之能捍大患則祀之若鐵柱者非能禦菑捍患乎宫屢燬而屢復其復也常不旋踵人心之所向有物司之矣自景德而後有建炎景定之變此宫之所不常有者也當是時使旌陽臨睨舊鄉其無有城郭人民之感乎嗟乎雖有標杵不至滔天城陷之禍未必如陸沉之甚也雖以宰物者為生民擇禍亦莫若是矣柱者洪濤巨浸之所不能衝刼火之所不能燼宫有燬而柱無虞如砥柱碣石之在水中其為連城乆逺計慮豈可涯哉吾友集賢直學士文遜志嘗大書鐵柱二字并求余記未暇以為清江徐鑑與道士羅嗣周及門勤求又十許年矣余老且耄竊伏嘆周處為長橋下去一時之害晉史書之以為偉績旌陽為豫章捍連城千餘年之菑患而未有書之者欲使余不記鐵柱可乎故樂為之書至元五年後已卯廣福寺舍田記嗚呼余讀廣福寺舍田記見二王所為文辭未嘗不慨然深悲其志也寺不知創始何年而寺僧慶與其徒榮墾寺傍土為田肆畆餘者則唐光化三年也宋淳祐八年始有曽氏舍田五畆餘咸淳六年始由南安史君王氏盡得寺前之田凡七十畆於是廣福僧飯始具至元中李始欲以子孫霜露之所不可知者寄乆逺於廣福而曠氏以李氏甥承舅家志益加廣焉嗚呼朝陽史君所記稱長陵抔土與王侯将相功德寺其言豈不深悲至痛也哉而李氏曠氏方且相繼為之若真可托以乆逺者其志豈不尤可悲也耶余嘗聞丞相文信公宿半山寺見寺僧有為明日舒王忌日者公嘆曰舒王一飯乃托浮屠氏耶信公所為自致不朽者固不在此而於此不能無所感則夫曠氏之孝思有得於先志者益又可感也於是明伯之子既於寺西徧經閣後作堂以祠其父又爲屋以居所渡僧供洒掃又買田以給晨夕香燈忌日飯僧等費夫曠氏子其事如事生豈不如僧而必若此此其慮逺矣而又求余文以記之嗚呼悲夫余文豈有乆逺過於佛者哉昔者朱邑之𦵏桐鄉也曰子孫奉嘗我不如桐鄉民至今桐鄉民祠朱邑不絶夫朱邑固自信其所施於桐鄉者未易没故也曠氏豈亦冀望其所施於佛者如邑於桐鄉民哉非也朱邑盖與孟子論君子之澤孟嘗君問𤣥孫之孫其意正同而曠氏輕好施槩得其意夫寺更唐五代宋至今買田有曽氏王氏李氏曠氏而曠氏子孫方盛為其祖父計乆逺愈切曠氏父子亦不可謂不逹也故不辭而為之記南安路重修廟學記南安自宋慶厯丙戌為周程傳道授業之邦是開闗洛以啟建安實中興五經四書之道及宋亡元興修道設教天下學者復知尊信朱氏之學學校修舊起廢至是無不輪奐一新者南安前監郡舉里禄信厚公子也亟稱郡守母侯珌克修其官用學正景文之言倡率士友爰飾新廟作新學是不可不記余惟蘇文忠公記兹學矣其誰敢嗣之盖辭之辭之而不獲則告之曰文忠前記稱儒術之富曰等閔蜀稱學宫之盛曰甲江西今去之二百餘年意其甲江西者未必常如一日惟等閔蜀當亡恙耳不寜惟是元公志伊尹之志學顔子之學固當進於洙泗矣閔蜀云乎哉抑余嘗謂元公學問其在太極圖與通書者當與經傳相為不朽而光風霽月在人心胸次者尤當與天壤相敝使學者處􅅵畝而皆有堯舜君民之志在陋巷而皆有禹稷同道之學一旦志得道行将天下復為唐虞成周泰和之盛而闗洛建安以姒以續丕承丕顯益開萬世太平之基豈非五經四書本志元公素學安有俗夫世外使後闕生問學本末俱舛以語録為文字以口耳為心胸甚者談天理以奉人慾至為聖賢罪人視古閩蜀尚愧耻之况洙泗乎此學者所當深懲而力救之者也不然學校豈直為土木觀美而已南安學計素簿以春秋祭祀師生廩膳常不給其於修完也難是役也用鈔九千餘緡由郡守倡以俸而學正繼以廩膳南安之士争出力以成之故不勞而集士之藏修逰息於斯者其益務志元公之志學元公之學以無負賢守修泮之意云思民堂記思民堂者廬陵郡守治事之公堂也堂扁宋故相葉夢鼎淳祐壬子守郡時所書厯二十五年而當皇元丙子又五十有四年而爲天厯己巳有欲更之者始下其扁又明年為至順辛未監郡顧謂僚佐曰民可近不可下扁可下民其可下乎又曰民為邦本為民牧有乆不思民者乎始復揭而張之於是廬陵士民更相賀曰廬陵其庻乎則相與踵門求文字以記歳月余辭不獲則記之曰昔蘇文忠之説逺景樓曰吾州之俗有近古者三惟我廬陵其俗之美者亦有三大者好文學而尚節義其次好治生而尚敦樸其次好奉上而尚慤愿盖自歐陽文忠公以文章氣節為天下先而廬陵忠節相望至亡猶有大忠大節聞於天下者國朝科興得士常過半江西其志節髙者常自負必有聞於時終不肯負朝廷羞當世其民勤儉有生産作業之長有舟車水陸之利然終身不願入官府有徴呼則短衣草履即出門不辭賤辱以為當然其號為倜儻者遇太守縣令或佐貳寮屬過其鄉輙奉事如子弟事父兄臣僕事君長遇禮貌則誇詡以為榮耀遇賢者則稱道以為美談然終不敢有所夤縁以為奸利且死猶語其子孫以為戒此人皆良士民賢父兄既富方穀為身謀家計乆逺慮者若亡賴子弟為不軌之民以自速禍敗則雖三代之隆漢唐之盛所不能免在千萬人中纔一二耳豈可以一夫而累一鄉且以厚誣聖世也哉余聞監郡始至遇烖盡捐公田歳入以興民然後冨民乃肯相繼捐財與粟今年六月不雨獨捐俸錢齋宿以禱然後四郊次第以雨民曰有如倡率之者不至富民終不聽天終不雨安有今日哉此非思民者可乎有奸民架空誣害其鄉人以熒惑聖聽者方事之殷與判官共訊奸民俱吐實供詞服然後良民歡乎如獲更生民曰有如不得其情則奸民逞志亡極且流毒一郡矣此又非思民者乎余自有斯堂以來逺者未暇論若五十年間郡守長貳之見題於民者㮣可知矣其賢者民至今思之其不賢者民至今怨之詈之孔子曰斯民也三代之所以直道而行者夫以郡守長貳之賢否皆去之已逺而人心公論常存非所謂直道者耶夫余言之及此所以固賢侯思民之意亦以繫邦人無窮之思云監郡托果齊治中王貞判官伊嚕特穆爾真樂堂記河間本漢獻王封國有大雅之遺風故其州有獻州其故家有劉氏其土少瘠而多稼其民勤力而惇禮今江西檢校劉君天爵居之君嘗謂余言去州五里所南直滹沱北有趙村為劉氏别業負郭田可十頃畊稼之艮桑麻之盛畜牧之富可歳時伏臘春秋蒸嘗男女嫁婚親賔燕集可肅給有宅一區為堂數仭榜曰真樂可虞自聞古之建事立功者必以其英華果鋭之氣聞其光明俊偉之材今吾年五十有餘矣志不在於奉已而功不足以及物将歸隱焉愧不能為淵明工自道又不能為李愿有所托而傳願求一言以記斯堂可乎哉曰君發身學官試吏騶虞嘗掾集賢掾中書中書政有害利當罷行必盡其心所遇或從或忤或竟或否或違心而稽於衆或違衆而稽於禮必盡其力又嘗為河南府推官盡心其職獄有疑滯寃濫必得其情府事有不容眎者必極論而力賛襄之秩滿為今官官以察糾稽謬為職而君以振職聞此豈不能使居大官者又曰君孝友忠信有古人之志負當世之才而恬於進取與君同時而出有仕至宰輔者矣而君壹不以動其心此又豈卑小官者余惟前史所載文武智能之士乞身於强健而卒老驅馳幸乃獲全晚節如復得此身而日不暇給矣其下者自蹈於危機又下者至盡喪其平生此人皆抱恨終身永為世笑豈不大可悲哉今君曰蚤晏坐朝視事徒見義必為當仁不讓而言有不必聽志有不必行雖終日開口而笑無一出其内心之真者孰能退而耕於趙村之野坐念平生粗無虧缺憾恨即吾田園而樂我朝夕者乎此知幾君子所以不俟終日而不知進退存亡者所以為可悲也抑余嘗有聞於蘇文忠公之言曰古之君子不必仕不必不仕必仕則忘其身必不仕則忘其君有味乎其言之也故得志則以澤加於民為樂不得志則以修身見於世為樂審時措之宜而吾之樂雖聖賢復生亦不過此以是記真樂可乎君曰此吾志也乃書以記至順壬申龍泉江東廟記贑水東神有祠尚矣廬陵邑故未有祠按郡志惟龍泉昭靈王廟在縣東巫村濵江宋治平所建神贑水東名固巫也呉封昭靈宋嘉祐賜額顯慶建炎封廣澤崇惠顯慶紹興益封昭烈又益忠祐而去廣澤龍泉廟仍呉封乾道丙申中更水圯徙福勝院今延祐戊午王叔材倡衆建祠橋南南䑓閎偉壮麗於是邑人前不知有昭靈後不知有福勝矣廬陵所至有祠又不獨龍泉為然而未有推論昭靈之舊者志稱紹興中冦李毒龍犯空邑遊逃北望旌旗戈甲蔽江而退他水旱疾厲嚮應不可數又稱龍泉靈山以石名者三十餘所状類仙佛龍馬獅象牛羊倉廩室屋者徃徃有之人傑地靈固宜為聰明正直者之所依耶嘗試論之人神一也長吏受天子命守封疆牧養小民治境内而止雖賢牧無越境而治者不賢者境内且不治甚者淫縱其欲毒其民民夫婦男女辛苦墊隘無所底告以為常神廟食贑而治民以來威靈著於兹土歴建紹間禦火捍患以及宋亡越至於今今所至皆龍泉矣雖有神應無方而人靈萬物何獨不然豈民事長吏有不如事神無亦人實不職而聽於神也邪水旱疾厲人實召之而既求於神矣民有寃抑宜得直或遇𤯝災宜得釋皆求於吏宜響答而有不得直與釋者又相與求於神而後直與釋如響斯答焉是神自為政也是幽明皆有鬼神也是哉吏禄民之賦與神歆民之祀一也豈民以祀則歆以賦則不恭耶是邦由宋治平至今二百五十六年廟三遷而祀神如一曰凡邦人答是貺者無不畢用其至孔子曰斯民也三代之所以直道而行之者也使長吏知愛其民去就其欲惡罷行其利害則民事長吏有不如事鬼神者乎叔材求余記其成余旣辭之矣則相與奉邑大夫劉侯之命以請且曰大夫有恤民之心與民一無還徃而悲傷之賢長吏也余聞部使者治廬陵不聞龍泉曰龍泉有令尹真臺官也夫民神之主長吏民之主也夫慢神者必先虐其民尹能深愛其民以無困乏神之主敬共明神之至者也余将書前之説以為牧民者告復書尹之賢以為牧民者勸可乎将見民事尹如事神神之德尹亦豈有涯哉詩不云乎靖共爾位好是正直神之聽之介爾景福君名檝字濟夫存存堂記鄉襄文信公之故里有世醫魏氏曰某字可立者余始從里第識之又從公猶子故貴溪縣尹隆子得其為人故友劉恭叔之子愿每為余言愿之家貧愿多病危欲死者數矣生我者父母屢生不一生我者可立也愿即不幸今日死為已後矣愿里人如愿者不可數然可知也貴溪嘗大書其堂曰存存先生幸賜之一言愿死且不朽及愿且死又為書曰愿死矣以二子為累以毋忘存存為請余執書器哭槩有昌黎祖子孫三世之感自是每過貴溪輙以為言今貴溪又已矣嗚呼安得復起吾友而共讀吾記哉夫為存存之説者非易大傳乎曰自書固存而已然矣昔者秦越人起虢太子於已死曰越人非能生死人也此自當生者越人能使之起耳善夫越人之言也方虢太子死未收豈獨越申庻子與越君死之哉微越人不收之者罕矣豈惟虢太子方齊桓侯疾在腠理在血脉在腸胃皆生桓侯也皆越人所欲治者也在骨髓而後為死桓侯而後走越人然則起虢太子固為存存雖桓侯未骨髓以前而幸從越人亦存存也夫為天下國家者亦由是也夫豈不知興之必有亡也哉而自昔聖賢所為禮樂法度綱紀文章以制治保邦者皆存存也非是則爽鳩氏之説也古而無死則爽鳩氏之樂也嗚呼有是哉使夫人知越人不過起當生生者又非獨可立使人存存使人知聖賢為天下國家無非存存又非獨越人僅能起當生者則庶乎其為天下國家者皆知保邦而無爽鳩氏之樂為人子若孫皆知衛生而無秦越人之恃非存存乎可立醫也於醫國不由是推之乎不可為天下國家計慮乎或曰信公非欲為存亡者豈信公不能為越人走哉曰在越人可在信公不可是為記白沙書院記吉水文昌張文文先創白沙書院其鄉教其族里俊秀子弟余愛其有近古者一有古人所無者一有異於近世者二其用意公平乆逹而不近利要名有不可不書者此余記所為作也余嘗謂州縣立學而黨庠遂序盡廢自四大書院開天下書院日新月盛家塾愈廢無他科舉興而學校為利禄之途故也然則科舉學校不可並行與大比賔興俊選秀造之法莫盛於成周何嘗一日廢學校哉宋初湖學興後來白鹿嶽麓最盛又何嘗廢科舉苐古之科目所以取士非後世比古之學校所以養士亦非後世比方今科舉取經明行修而孝悌忠信必取於鄉黨所稱朋友所服者此古選舉遺意使人能欽承明詔雖比屋可封不難至也文先延名師與族里講求聖賢之學将以為天下國家育材此近古者一也古者田皆井授故黨庠遂序不聞有田今文先捐良田入書院内歳入租賦於官使師生廩膳可終歳此古人所無者一也近世書院間有田而捐田者先有長書院之意既得一檄則次苐而進爵禄可指而立俟文先既不為其身謀而謀及其族里與其子孫孫子甚逺此其所以異於近世者又将以開來哲而繼先志則此田與書院相為無窮必不見奪於世家壊於有司此又其異於近世者而人皆未之知余與文先游舊矣故知之為悉知之可不書乎張氏世有隱德宋秘書歐陽公所書舜申平糶事其髙大父也歴五世而世科愈益聞世修德愈益盛世數其庸可計乎文先其家塾尤嚴盖親及踈由家及族里循序而有本又如此其弟行其子復相其父兄於書院惟恐後此興家之禎祥也自古世禄之亡有倐忽而世德之興必浸漸盖勢燄短而淡味長張氏其積也厚其閟也深其發也閎未有不光逺而實繁者也故曰悠也乆也元統乙亥湖廣鄉試題名記皇元德配天地教暨南􅃋貢舉學校行乎四海九州之外開闢以來未之有也惟兹湖廣以荆衡著禹貢之疆以江漢表朝宗之義世皇六師於焉駐蹕天下一統於焉定命聖人有作於上而萬物先覩於此名王世子恪守忠孝爰鎮南服實為山川形勝之邦宜有文武志能之士然自延祐甲寅貢舉已歴八科而試院未有題名兹非闕歟元統三年賔興之歳愽採譽望遣使奉幣招致能文之士六人余忝居一焉惟省憲大臣欽承休命省憲元寮謹遵成式中外大小凡在事者咸秉德一心以爲國得人為重如余六人者敢不夙夜敬恭庶幾報效萬一既畢事以題名請惟我國家混一之盛選舉之廣敷天之下至於海表而天道所在楚國之舉亦有氣運行乎其間非人力之所能為者是興大任以開來哲諸君無忘今日無負所學是為明天子賢宰相望治之心省憲選舉之意余六人者亦與有焉是歳九月日廬陵劉岳申記申齋集卷五
