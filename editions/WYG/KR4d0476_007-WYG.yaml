body:
  text: 申齋集卷七元劉岳申撰碑永豐縣重修三皇廟碑皇元廣土衆民配天其澤嘉與海内咸躋壽域爰著令式郡縣通祀三皇外暨遐方僻壤軄守小臣罔不以宣徳意崇明祀為重自唐以來於斯為盛惟皇開物成務徳並天地功施古今自易大傳推論制作之功在堯舜氏上千萬世考古者折衷焉其後月令以著於少昊顓頊之上其尊且嚴如是未有如今日郡縣通得以醫家專事之者夫豈以三墳無傳而獨據本草素問所借重儕聖智於方技屈大道於專門也哉盖嘗思之天地之徳莫大於生神聖之功莫大於好生醫也者以天地父母之心用神聖工功之術厥初道術未裂毉卜種樹皆生人之急務上聖之能事末世輕生庸人妄大胥賤藝命之其徒亦妄自菲薄棄聖哲而祖妖滛甚乖古誼孰知天以隂陽五行化生萬物三皇開隂陽五行之妙以惠利萬世凡今之林林總總者皆三皇之子孫也自天下郡縣通祀孔子而二帝三王之祀已如親盡乆矣世俗口耳有不能習知堯舜禹湯者而况能有尚論皇墳之邃者乎向非昭代追古醇龎求民疾苦使生民尊祖之意徧滿天下幾何其不以迂濶廢則以尊嚴廢也哉永豐自大徳庚子始建廟至是兩星終已敝陋出入委巷縣尹何侯仲温披圖考籍得侵疆於民間者四畆有竒始復舊觀改築故殿基而加髙廣改為今肖像而加嚴餙自東西廡逹於外門皆一新又浚池種蓮其中樹松栢其上耋老歡呼咸願刻石謂是役也信為侯功又謂余宜為記余惟侯始能以美化善政治其邑又能以明徳卹祀佑其民顧瞻廟貌使民懐書契之初而思耒耜之功想衣裳之化其君子學道愛人其小人農力事上將見年穀順成而疵癘不作相與詠歌侯之遺愛以無忘聖明之澤豈不羙歟是可歌已乃作銘詩曰於維三皇開天建極創物之功生民是力去聖既逺以殺為嬉所貴功利而賤農毉於昭聖代視民如傷天下郡邑通祀三皇豈維毉師亦示群牧庶幾子民克勤庶獄於穆新廟何侯所作新廟奕奕民罔不惟此邑願見皇風兵寢刑措時和歳豐佃漁耒耜衣裳室屋天子萬年永錫五福臣拜稽首作此銘詩以鴻厥愛以永厥垂東阿縣銅城鎮夫子廟碑皇元混一天下自開闢以來帝王正朔之所不及學校貢舉之所不行今皆奉行如在畿甸之内矣於此有天意行其間聖謨運其上人力不至於此若自古聖賢過化之邦聲明文物之地宜無所待而後興者及其興於乆廢之餘乃亦如開闢之初惟兹銅城以鎮𨽻東平東阿縣東平禹貢兖州之域春秋時為魯須句國奉太皥有濟之祀東阿為齊柯邑曹劌盟齊桓公之所縣今四鎮其三已建先聖廟學元貞初銅城始建於道南鎮人河南總管任某以延祐丙辰始遷之道北今江西僉憲任蒙古岱繼其父志始來廬陵範金為簠簋尊爵玷勺罍洗凡四十有一薌鼎七仍竹木為籩豆二十有四以鄉人父兄子弟春秋釋奠其中於是東阿之人初見諸生雍容進退揖譲升降之儀節如曠古未有希世之遇已不知前日為齊魯之地固詩書禮樂所自出之國矣向非聖元配天其澤安得有此汴人王誠以僉憲之命來請記夫以釋奠釋菜祭禮之備者簠簋籩豆有司之事也而於學校之興廢闗世道之理亂則不可忽昔范文正公書環州馬嶺鎮夫子廟碑隂稱廟為故兵馬監押殿直張公藴所見張嘗有守禦功於馬嶺其後二子皆以文學節行為顯官以馬嶺邊部不廢聖人之祠其澤如此况如銅城者乎任氏子孫詎可量哉吉安路高明宫璇璣閣碑皇帝於天下養之初元命以廬陵益奉興聖宫湯沐聖人仁逹孝愛自昊天上帝日月星辰山嶽海瀆與仙佛之宫布在天下者凢所祈天永命寜􅄌壽者慮無不一用其志壹不敢以天下儉薄海内外壹是興孝翰林直學士曽徳裕身荷國厚恩當追先帝殊遇忠報陛下顧臣駑鈍臣母王有篤疾乞骸骨歸飬臣沐浴聖化耕鑿聖世為太平幸又幸生廬陵實出􅄌仁覆燾之下顧臣子事君父雖越在草野乃心罔不在國臣所居郡有瑞華雲騰之山近城名山也東粤高要簿臣林浚棄官因山為高明宫祀晋許旌陽爰以祝􅁵臣徳裕建璇璣閣其上以與浚朝夕祝兩宫萬年臣徳裕敢不昧死以聞皇天后土實鑑臨之郡民劉岳申實聞斯言竊以為天保報上惟福禄壽臣虎拜稽首曰萬年壽是共盖自昔人臣當國休明宇宙寜謐無以効犬馬微報惟以天之所以仁愛人君者使其君高明悠乆配天地日月是䖍是禱矧惟神母聖子千載一時聖孝純至度越古今以天地祖宗之靈使三光全而寒暑平五穀熟而人民育普天率土無不有仰事俯育之樂是為天下純被聖人之澤以為廬陵百萬生齒凡為人子者永依兩宫萬年之慶臣徳裕所祈乆合右誼宜紀其成敢拜手稽首而獻銘詩曰聖人在宥方敦孝理文母萬年從以孫子天佑聖人亦佑文母及其赤子罔不黄耈老者不獨少者不孤我祝二聖億載怡愉二聖之福與天齊壽二聖之壽與民同富矧是廬陵􅄌仁所覆維此璇璣維天其右凡民有母亦俾壽康臣母君􅅅一飯無忘我作銘詩神之聴之玉華宫碑客省副使額森布哈為廬陵劉岳申言其曽祖母塔掄王姑姑事顯懿莊聖皇太后多歴年所其徳為保傅甚高舉聖神文武皇帝彌月不遲其功贊化育甚大太后嘉其忠愛之至世皇懐其保抱之勤爰即真定創玉華宫以曽祖母學道其中又即玉華搆孝思殿以皇太后侑食睿宗皇帝其間然後賜之冠服錫以土田為萬億年無疆萬子孫永保是祝是祈爰立豐碑求記其事竊惟皇天上帝將興上聖而為之啓運必有文母以為之發祥其保佑命之必有人力所不及者雖人力亦天命雖有相道亦其福履也是故玉音追慕徽音在天之靈原廟逺依太廟日月之光作宫示天下以正母儀搆殿教天下以廣孝道一舉而兩羙具焉是宜聖子神孫繼繼承承於萬斯年永永無斁雖逺方下士不知宫殿創始嵗月之詳而昔者嘗聞禮官有罷遣太常禮樂之議顧無以慰答孝子􅄌孫之望謹拜稽首而獻銘詩其詞曰殷祖𤣥王維帝立子周人初生帝武是履維我皇元前無上古以天下母毓萬世祖維我世祖古無帝王萬方一統罔有遐荒言念斯毋如古師保抱施携持功贊天地爰作新宫于湯沐邑土地人民常嵗賦入於穆新廟春秋烝嘗其從與享子孫無忘天子萬年世徳作求有秩斯佑無疆惟休我作銘詩以永孝思孝思無窮相以金鍾萬世閟宫滕國武愍李公廟碑皇元以一徳格天以不嗜殺人一天下大臣宿將皆知欽承上命所過城邑兵不血刄故太保滕國武愍公之下廬陵也雖以忠節故邦文丞相鄉國又當忠勇偏師挑戰之後公不疑不怒按甲入城城中老弱不知革命於反掌間其所活廬陵之人不知其幾及文丞相檄江鄉士大夫舉義興復公盡得其所檄名籍而焚之其所活廬陵江西之人又不知其幾於是五十年矣廬陵夫婦父子長子老孫且四世安之有當日若江西宜愈逺愈隠矣向微泮宫前碑其誰知之天地之徳莫大於生而功莫大於隂騭自古天吏有烈於猛火雖以上聖至仁不免於流杵後來尚首功動經數十萬以為常故曰爭地以戰殺人盈野爭城以戰殺人盈城嗚呼尚矣此有天地父母所不能全而風雨雷電所不能恤者而公能之蘇代有言龍賈之戰岸門之戰封陵趙莊之戰秦所殺三晋之民數百萬今其生者皆死秦之孤也死者之孤其怨毒如此則生者之子孫其徳豈有涯哉公有大勲勞於國而公不自知所以隂壽國祚者固不為其家也而天且厚之矣公之冢子世安以賢相聞于江西公之仲子世雄以賢帥聞于豫章公之季子世顯以賢守聞于廬陵此天報之也人豈能報公也哉人之所能者惟廟祀而已天之報施以天理人之報施以人心人心天理一也語曰活千人者必有封公所活不知其幾千萬人矣其後庸可計乎於是廬陵士相與議於學庶人相與議於市或曰生我者父母再生我者李公也不立公廟無以報公乃得學地於興賢門外起泰定甲子十二月明年乙丑後正月廟成衆志始定父老請書其事余以後死讀前碑如傳凡碑已具者不悉書書嵗月如上且作詩以遺鄉人俾歌以祀公其詞曰嗚呼廬陵代有忠節邦之生靈甘死殉國我公撫之來如歌舞不獮不劉去其死所豈無背城公義其敵豈無羽書公焚其籍既獲廬陵復完江右惟公功髙惟公徳茂當時遺老為黄為綺當時襁褓抱孫又子青螺之山白鷺之水何以報公必百世祀新廟何地荒城故基昔公躍馬凡幾過之今公燕坐以享以怡子孫孫子罄無不宜維天高高維地厚厚活人孔多是宜有後公乗白雲招摇四方此邦之人謂公我鄉佑我鄉民五風十雨疾厲不興多稌多黍皇元億載天地同流我公世世與國咸休江西和卓平章遺愛碑天厯元年冬十一月今平章政事托歡以勲舊忠良簡在上心㧞為江右用懾豪勢惠和小釁不數月而江右震動小民歡呼鼓舞如嚄得伸如蟄得奮乃士庶耆老相率以請曰今上都留守換住江西賢相也政有遺愛民有去思而碑又未樹非缺典歟惟賢知賢宜伐堅石樹豐碑以彰彛好以永垂勸敢請於是平章作而言曰留守昔為江西爾民實隂受其賜而不知今去江西而江浙去江浙而上都愈逺而爾民愈不忘此真好徳之民也好民之所好不當在我乎則相與推論留守在江西所以得於人者或曰泰定甲子救流民水旱之灾不知其幾萬人明年救飢人疾癘之厄又不知其幾萬人始見議准戍廣者一嵗終更而士馬得完始減蒙山銀課三百定改屬興國而一路地産民力得寛禠富民蒙山提舉之爵徴􅂍五十餘萬緡而民恱斷廣東潮陽滛蠱之獄流廣憲官吏以賄成者雪潮陽官民以寃死者而民服此其利澤之大者也或曰留守在江西其利澤可知者少不可知者多舉一而廢百可乎於是有學士大夫相與言曰留守歴事累朝先後如一日出入中外夷險如一致未嘗有一事一念先謀其身與其家而後朝廷之急忘宗廟社稷之憂者留守處貴盛之餘而聲色常不見其不足享禄賜之入而貨利常不使其有餘未嘗一語及人之貪未嘗一念嫉人之富而躬率其家人婦子中心安其獨樂留守惟疾苦不及知或所知者少所不知者多惟恐政有利害不即罷行或罷行而有所不當或當而有所不免切切焉常以為憂而寢食常為之不遑若無以自容留守遇細民如親戚子弟必身慰撫之遇寒士如貴人必身禮下之惟恐失一民一士遇僚佐如朋友遇屬吏如僚佐惟恐不得盡其情嗟夫此真相業也此豈獨江西之所不私雖上都不得而乆留也其將入為天子左右輔弼之臣將天下之民皆被其澤又將國史書之天下誦之豈惟是碑而已乃為詩以慰我民之思以復平章公之命以備國史之採擇云其詞曰元徳如天萬物皆春公如時雨膏澤下民大江以西地大物衆公如天神聲色不動惟公之心惟恐負國忍使一夫而有弗獲昔公在位民有不知公將入相天下望之我作好詞匪曰我私惟民彛好夫豈好暴維令之相以仁好仁好民所好是謂仁人刻詞於石以永無極好是正直清江王縣尹去思之碑臨江故屬縣三自淦喻為州獨縣清江清江比二州田賦户口俱下附郡治為治其租調常五分二州之一政令下當其急先有如不幸不遇賢大夫以臨其縣人民不堪命郡遂以不治初至元新附所至民不習官府危疑畏或徴求所不夙戒急索責必得不俟終日無不立破家者不幸濫起亡賴稍或群伍剽掠即傳致大􅊇盗常不捕而亡辜死者無數及盗既得益以盗為市蔓連大家悉取而甘心焉比盗死大家亦空大率藉盗以資為大盗甚於盗愚民不愛死以死尤人為官歐官利以為竒貨惟恐民不死每嵗差役爭破家求免幸而免家破不免家破盡而不足身僇辱死亡故貧富俱盡而官滋益不辦事大名王閏以至元庚辰尹清江始至一以寛民力為急去其尤不便民者首變役法定從雇役明年當造海船幾又明年當造糧船幾胥不及期而具而民不擾水後盡括手額號軍軍無或敢逸而民不知盗殺掠民男女連嵗不捕為設方計悉獲而殱其渠根株連逮者不治而民亦不知尤不聴以死尤人者民知死無所利爭相戒無死他善利於民不可悉數然與尹終始獨雇役行之二十年無或敢輙出見以議之者以其公私俱便而民貧富俱利故也尹所為政無驚動人耳目者而人至今思之清江父老方畫像祠尹立石祠下求余記其事余問父老尹去是幾年矣曰二十又六年矣今為某官乎曰不知也世俗徳政始至用佞去而仆之以待來者尹去是二十又六年矣不知今為某官也而民方立石頌其徳非去思論定真有徳於民至是哉天下平必自郡始治郡必自縣始尤近民故也雖有姚宋郡無龔黄天下不可治雖有龔黄縣無魯卓郡不可治夫治民非徒亷吏所能也亷者所以自為非以澤物也故有以亷濟酷而貧者見思有以察致苛而憒者見思非樂是貧與憒也以為民猶有所措手足也詩曰豈弟君子民之父母傳曰平易近民民必歸之使民不飢不寒以不犯于有司其惟豈弟平易乎余友倪㓜學遜志嘗為余言尹堅苦自律公退妻子躬操井臼疏食布衣人所不堪類甚刻峭自然馭民至寛如恐傷之奉法循理不為名有古長民之風是宜為縣者也宜父老念釋之不置也盍使來者歌之其將有所勸乎是尹去清江而清江常得尹也此父老意也乃為之詩曰維兹清江政和且平民之父母有聞無聲彼以察察而為斤斤如革之韗如火之惞此仁而明善無近名盗去其鯨民保其嬰役法既利貧富不避更二十載衆莫敢議莫大天地維簡與易亶俟長吏孰為撫字其字維何視民今歌安富恤貧政用不頗清江政成宜公宜卿遐不眉壽以昌厥後我民思公其罔有終不見公乆時怨時恫昔公去此孩未毁齒公來顧之累累抱子清江之清載其榮名以啓其殿以甸此縣吉安路總管府呉侯去思之碑泰定二年春三月信都呉侯繹思可自杭移守廬陵未幾遷海北亷訪使未上尋遷兩淮推塩都轉運使於是廬陵之民相與怨咨曰兩淮竟奪之海南北而廬陵不得奪之兩淮也柰何士相與嘆息曰上幸嘉惠廬陵既畀之賢侯矣不數月日奪之去遂棄廬陵矣乎將廬陵遂不復望治乎郡幕長與諸曹史咸曰侯遂去吾等其終無由自㧞矣乎每相與可否一事竟莫敢堅是非者衆謂呉侯在官不及五月其施於民者淺矣何以得此於人人也方侯之未至也廬陵之賢士大夫良民相與引領以俟而惟恐其遲遲者自城邑市井以至深山長谷皆不約而同若奸民黠胥相與狙伺侯之果來不來以為欣戚者又所至如一及侯之既至也未能竟罷行一利害又安能去一泰甚未能一事直遂其本志安能每事大快於輿情然而屬州縣素暴鷙者皆震動悚恐始知有綱紀僻逺小寡有所怙恃群豪大猾有所忌畏何也監郡李侯世顯顧謂郡文學劉岳申曰呉侯始至未施威於民而畏之既去未施恩於民而民思之是皆可書予如書之以為來者勸不亦可乎或曰無一事可書柰何余曰漢史稱河南守呉公治平為天下第一豈有一事可書也哉凡亂生於不平惟政故治而平最難惟治平故無一事非無一事不以一事聞故稱第一今呉侯有賢於人者三外敏而内寛一也讀書知治體二也好謀而善斷三也其先聲足以畏民志其後實雖不必盡如人意而人亦心服之此豈容易得此於人也哉李侯作而喜曰是可書矣乃刻詞於石而系以詩曰古人為政如甘雨露所貴澤物物不知故不善治者為疾風雨枝葉未乾而根已去漢守第一功在治平治平無功在知賈生豈惟呉公文景亦然紀無可書所以稱賢維我廬陵嵗乆失治天惠呉侯不終厥惠其施也淺思之者深何以思之澤在人心維我監郡嘉此邦人嘉其好徳刻在堅珉右顧神罔左顧雲騰兩山倉倉東為青原洞岩在焉千年五馬輝映後先凡民有欲天必從之嗟爾淮土寕乆得思我之懐矣待侯重來在省西江在臺南臺慰我民只偕我士子匪直我里維此南紀峩峩此碑以繫去思以待來朝亦永厥垂陳太守劉竺廟食神岡山唐刺史呉世雲廟食雲騰嶺宋太守閻寀入洞岩仙去三人者皆有惠政于吉事載郡志永豐縣令王侯新廟碑至元庚辰十月二十日汴人王侯諌以選為吉安永豐縣尹明年辛已改元至正六月二十八日以憤懣死在官凡二百七十有八日監縣以下惶惧憂戚不知所出百姓相顧失色道路相弔有哭失聲者有中道棄其所求如遺空歸者士飲泣吞聲有甚出涕者有如䘮其私親者先是有以巫蠱聞侯曰邪不干正尚矣置之群巫舉酒更相賀群卒日殺羊為酒更謝巫鬼嗚呼悲夫盗憎主人民惡其上有是夫始侯未至庻人在官無禄而衆􅗜害民者有二或四五百人分據各官謂之祗候或百有餘人分據各吏謂之貼書其黨最盛其毒更􅃤其根穴最深其奸利最大其名號最不一凡奸民告訐者常多端其無根而滋蔓不可治者莫如偽鈔而他不法次之尤莫甚于以死尤人自身及妻子又甚至輕犯惡逆而借屍於親隣買屍于椎埋又次之逮一夫而破一家逮一家而破一鄉有未到官而家已空未出獄而身已殘未受刑而骨已枯皆輕係無􅇳而禍者無瘦死有天幸良民怨死無愬姦民日富無憂侯始至盡空其羣定設祗候有常數必用良户子弟貼書亦然必用良家子其六百餘人為失業之民始相聚為奸矣此巫蠱所由興也侯為政不陵長不偪同不億不信其差役至公而必不可移役户必無妄費催科必不擾而辦早逺鄉必從折納常數十年不一至官者皆雲集子來賑施水旱必得實困傷始漸甦流亡始漸復居民始漸有生之樂而侯之死期且日廹矣侯未死前有暴卒至持府帖至縣者縱其徒歐傷人垂死侯詢問辭伏群不逞因之謀刼侯以縱卒徒侯不可奪則升階將㧞侯所佩刀不利於侯百姓皆升曵卒下而収繫之群不逞謀刼獄百姓夜舉火自獄户以至縣理所火逹旦謀始寢事聞府帖下逮卒于府文置之理而實愛其事民持不予侯竟予之侯死而卒生嗟夫侯始不便奸民其私以甦良民而不能持循其志氣以愛身愛民而卒隨其奸便資口實棄良民中道使覆出者愈益大肆其奸為人上者及好民所惡惡民所好滋益長奸而怠為善人之無禄天夭是㭬豈不可為痛恨太息哉永豐故歐鄉其士君子好文而尚氣節其細民敢而知畏義類不可折辱以官府使縣令丞常得賢者豈不皆可為良士民何至使此數百人擾擾至此哉於是邑士民既祠王侯于學以一衆志而徴余記余不能拒也乃為詩以哀之俾歌以祀侯其詞曰河之水兮羙洋洋西門君兮政難忘天不雨兮民皇皇魯先君兮榮最良雷砰砰兮吼怒風號呼兮㧞大樹水有蛟兮山有虎孰投畀兮而不取吁何􅇳兮今之人九京可贖兮百其身惟兹土兮歐鄉丹原逺兮恩波長侯廟食兮孔墻秔稻熟兮九里香節春秋兮薦芹藻佑我民兮順彼長道信都呉氏世徳之碑代國子祭酒富珠哩翀作冀州之信都呉氏繹字思可既位三品以其祖若考之封贈請㑹其事罷上聞其母行年八十不忍拂其孝情延祐六年春三月制特贈其祖偉亞中大夫廣平路總管輕車都尉追封浡海郡侯祖妣郭氏追封渤海郡夫人考謙贈嘉議大夫真定路總管上輕車都尉追封渤海郡侯妣趙氏封渤海郡太夫人遂以世叙徳羙來慶之源謀刻之碑以示來葉筆屬於翀按呉氏自泰伯以來讓去與弟仲雍立國君其後以國為氏季扎讓遯子孫居齊魯間中州呉氏盖延陵季子之裔也繹曽祖安負粟惠貧疾其蠧妄不事異教娶王氏子男二人廣平公偉字傑之娶郭氏子二人真定公謙字謙甫次曰謹字端甫廣平有弟曰守信字誠之娶鄭氏生子曰讓字吉甫三嵗誠之與鄭皆卒廣平撫育孤穉如其父母雖鄉鄰莫辨其為兄弟之子者其仁與義藹然世見之者如此真定公有至性妣郭夫人終事繼母賈尤極孝敬讀書逹政務以伍籍𨽻行間善騎射從事統軍司佐幕光化萬户府天兵長圍襄樊事平宋光化㨿上游要害公調兵饟畫戰畧將帥頼之大軍南下至采石説大將以符劵民俘獲三百餘口衆得更生爭持牛酒謝無為軍樊氏子曰端午者奴於公嵗餘無惰容夜聞其悲歎名問故曰兩親以䘮亂乖隔生死無從知故悲耳公慰之曰汝苐努力汝親果在吾聼汝歸聚因經無為訪之樊氏父媪方昬義男而公適至乃召以端午畀之其鄉黨驚歎至感泣至元十七年敕授將仕郎清逺縣丞莅事再月投版事親召諸子誨之曰吾以吏從軍門户計耳汝曹宜業儒以自逹也因以其子曰紳曰繹吉甫之子曰純等擇名士鐡齋陳先生節父道江張先生伯逹善夫師之故皆有立夫人趙氏婦道克備最教諸子有法享年八十有六清風素範鄉黨稱之紳學行修飭仁廟以處士徴不起繹最顯孫男鐔中書直省舍人繹之子也繹二十有六年以皇子寕王教從故宣徽使太師伊徹察喇見世祖皇帝宿衛扈從五六閱年大徳元年授上舍監丞遷寕司馬中書斷事官少中大夫寕王傅尚書省復中書省皆斷事官仁宗皇帝才其為人以其母老授亞中大夫汀州路總管以厚禄餋寔皇慶之元年也轉階大中嘉議厯福杭吉三路積官正議大夫擢海道亷訪使以兩淮都鹽運使丁太夫人憂廼勒石著銘以赫天寵以昭世徳以賁墳域以範鄉井曰是善慶之所自由吾先世之然也人之聞之能無勸乎况呉氏繼繼隆隆而見之者乎是宜銘銘曰相彼良穡菑畬耕穫一頴千粒其利實百相此德人充慶其門子子孫孫其逺益蕃呉自古昔極顯而晦種徳信都仁義崇大有令孫子郎衛紫宸命傅藩邸明倬有聞帝敕中書繹母夀耋惟朕知繹選清邦伯四綰郡綬再握使符憲牧賦曹器大不拘封爵自天秩三世再自侯而公其逹未艾𤣥鼇負山昴畢之野有赫厥靈以告來者申齋集卷七
