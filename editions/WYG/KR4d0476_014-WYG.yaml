body:
  text: 申齋集卷十四元劉岳申撰題贊題泣麟圖按春秋魯哀十四年西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之榖梁曰引取之也釋者曰麟為孔子來魯引而取之公羊氏曰大之也以為春秋撥亂反正之應與文成致麟合然其間載孔子稱孰為來者二稱吾道窮者一且記反袂拭面涕沾袍之事此秘書監何澄所畫圖盖本此意而畫有史筆廬陵劉岳申謹拜稽首而為之贊曰詩首闗雎其應麟趾詩亡而後春秋終矣于嗟麟兮奈何至此春秋文成闗雎盈耳㳺夏二子未知述作如何大野有麕而角聖曰麟也然後取之俯仰感慨斯焉取斯鳯兮吾已麟也吾窮吾窮吾已此始此終昔者此麟何為而紱今者此麟何為而獲聖老于行麟繋而覊志氣之感内恕孔悲䘮予祝予莫知我哀知我罪我孰為來哉庶幾以俟聖人復起萬世君臣萬世父子題宋髙宗御書酒徳頌後當建紹間而暇為翰墨之娯車攻之吉日可書也六月采芑可書也如此宋不為建紹矣此不書而書酒徳頌諸葛亮有言此臣之所未觧者也益國周文忠公贊此宋南渡之司馬其公論之在天下不如在宦者其所居為緑野不如為蘭若此千萬間之廣厦所以不如一丘一壑之畫也題胡剛簡考功印紙後右剛簡胡公考功印紙一卷得不與出身以來文字同時追毁若端平追復贈官朝奉當由至元初悉上送官今不知在亡矣大徳丙午余客洪泮時縉雲鄭公潜昭提學江右三山王澧翁適劉公舘中胡楊自立以此卷屬余求公一言遂併得王詩語各有意去之二十五年自立之子士㑹復求書其後謹按剛簡當宋寳慶乙酉上書言濟邸事稱周公蔡蔡叔而封蔡仲此周之所以長齊桓公殺子紏唐太宗殺建成元吉皆絶其世此齊之所以亂不旋踵則天之所以殺唐子孫幾盡又引申生得請其應為韓謂濟王不幸事異蔡叔子紏元吉宜厚其追贈褒崇録用其子孫嵗時致其祭祀使濟王之寃如戾太子之得以自伸不致如恭世子之欝而不散語極沉痛此宋三百年理義之所漸摩涵飬者也於乎逺矣反覆此書有味其言故特著之卷末昔先祖成敬先生與剛簡同年以詩貢於鄉名次適相先然宋嘉定丙子也至順改元八月朔里樊家諸孫劉岳申拜手謹書䟦張魏公與劉和州手帖和州名子昂字仲謙安成東江人右宋丞相張魏公與劉和州徃復手帖尚見當時宰相識度之逺英雄籌筞之良君子有考焉和州當兵興而課縣最嚴邉防而寛民力民不知擾而㓂不敢入境敵不敢窺邉邉閫長材非承平循良小吏比也嘗以江淮十五事獻書秦檜檜不能用以十二筞與防江三劄獻虞雍公公亟稱賞嘗夜移海陵城外横江數十萬艘燒隂沙積米三十餘萬石先是金人謀欲絶舟與糧至是失色遂奪其餘馬長江之成算雍公嘆服切中事機及高宗廵幸建康魏公起長沙為留守首以書招之倉卒應辦取之和州如一切豫備魏公深嘉其功而甚噐其材力薦之上以有和州之命仍留之建康以為首尾和應駕還臨安而後赴和州當創殘之餘守禦備至憂勤盡瘁以疾不起魏公痛恨深悲之嗟夫南渡事㑹之可惜人材之不幸多矣至如和州曽不及大用賫志以沒向㣲魏公此帖幾無有知和州者又安知其材略如此吾鄉安成多故家多鉅公名士和州六世孫謙而能不失舊物於是宋亡元興又六十年矣而忠賢邪佞之在人心者猶如當日未聞有得秦丞相書是寳藏之如是者又何也謙之父為漢川之父為溥泉皆和州賢子孫云時至元六年庚辰五月二十八日劉岳申書題李御史監祭畵像贊時為東粤憲副求贊有豸其冠何奸不逐有蒼者裘何善不録彼滛于慝匪我仇之此周于徳匪我醻之昔也臨事如承大祭今也臨祭國之大事於皇大社祀有成典御史蒞之羣工無慊彼都人士繪其冠服望之儼然式如金玉帝命我公䋲此南邦執其憲度以壹紛龎嗟爾逺人千載竒逢欲知我公視此徳容題文丞相真死忘其元生愛其膝宋亡誰謚宋史誰筆當日穆陵不可第七萬古廬陵進士第一題文丞相拜羅氏百嵗母圖文丞相以咸淳癸酉二月朔日率里中士奉幣載酒升堂拜新安羅氏百嵗母母答拜諸孫皆拜奉觴壽母母釂酢賔諸孫從執爵禮成丞相為留三日賦詩題㕔壁鄉人好事列為圖繪于是宋亡元興又六十八年矣後生誦其詩玩其圖者猶如當日至有得其臨本爭執之以為至寳者想見當日旌旗騎從之都賔從雜遝之衆筆墨淋漓之樂詩成燕喜酒酣樂作何如其盛也閭里見之而老老㓜㓜人人歆羡四方傳之而子子孫孫家家誦説計丞相奉兩國宦遊海陸之􅈿家山魚笋之美其聲名文物衣冠禮樂又有在鐘鳴鼎食之外者再踰年而丞相出師江上入衛京畿明年宋亡脱身京口亡命淮海走閩閩潰走粤粤沈向㣲潮陽蹉跌以幽燕獄市為枕蓆而安之即此紙流落復有能寳藏之如今日所觀者乎母蕭氏生宋淳熈甲午為承務郎致仕羅公士友生母終壽於宋亡之嵗百有三嵗云五孫為五桂其四曰畊字存叟宋開慶已未與丞相仲氏同年官至廣東提刑司幹官諸孫學孟有士行有文采與余遊視余此圖求余題其後時至元六年後庚辰六月望日里後學劉岳申謹題題須溪先生真贊其清足以洗一世之衆濁其新足以去千古之重陳昔之見者尚不足以得其真今之謗者復何足以望其塵嗚呼何年復見若人題東坡書牆有茨三章聖筆不删坡書不辱中冓之言猶可讀也題趙學士子昂照夜白圖曹將軍檄槊遺餘風流文采丹青在衛夫人王右軍外天馬玉花又在凌烟功臣外然不能自道頼子美能以斯須垂之萬古不然良工心苦誰其知之松雪公兼有曹杜之長能自致不朽猶區區著同時一二知者以記微意向微㬅碩道傳安知斯人為慱古君子哉於是松雪苦心愈益可悲矣東野王君得此卷於天上人間之後寳而藏之嗚呼必有能為子美者題程趙兩公手題馬圖右程趙兩公手題馬圖一卷藏東野王氏時臨川呉先生與伯生㬅碩皆有懐兩公情見乎辭而先生録趙舊詩與卷中程詩意同尤可感今先生已脱􅎗羈而虞掲二君方入天駟振鬛長鳴萬馬俱喑為東野誦老驥千里援筆慨然題唐君臣畵像唐太宗狄仁傑魏徴陸贄李靖卿顔真郭子儀裴度觀此然後知龍鳯之姿天日之表非異人不能識固宜英雄不敢仰視若鄭魏公之媚嫵非是君不能見衛公之姿貌魁秀非是君不能用畵史獨著其君臣慶㑹有以也其六七人而逸其姓名者二人必皆若是班者忠州遯荒闔户不使人識其面而與单騎免胄回鶻羅拜者並傳開元天子不識平原太守何如人而與斗南一人所至有生祠退然中人而神觀邁爽外夷君長問其年貌者相先後槩有凌烟筆意又有紀傳贊意友人李君仲元寳而藏之其將為良為忠修其可願者乎題呉草廬真贊其心休休其容肅肅多學多識以似以續耄有不倦瀆無不告允矣君子是宜其服䟦周益公撰王駒父居士墓銘書翰右宋故相益國周公銘居士王某墓所嘗與復某書居士曽孫璧寳藏遺墨也新余每伏讀未嘗不掩卷三歎也居士與丞相比隣誌稱把酒論文無虚日而以布衣終其身固已去人逾逺其校讐六籍百家淹貫群書尤不妄交遊鄉先生楊文節公稱為淮海文士詩人楊廣文以為有北忩風致謝尚書湯舍人劉袁州尤推重之其著書古史法家集皆可録而傳向㣲益國此銘雖孝子慈孫有不能之者矣太史公稱閭巷之士欲砥行立名非附青雲之士惡能施於後世豈不信哉抑居士可謂忘人之勢益國可謂忘其勢矣益國自書此銘而以登仕郎胡柯題其額柯亦居士其流亞者歟昔我先人與居士之子逺叔交遊最深厚児時于侍側耳熟焉秘書歐陽公實銘其墓今其聞孫能自立不辱其先𤣥孫又能世其業於是君子之澤五世其昌矣璧字君玉其讀書之室曰舊隠子㤗字與時延字與齡至正三年癸未七月既望里契家諸孫劉岳申謹書䟦巽齋歐陽公撰逺叔王先生墓銘後右鄉先賢著作歐陽公所撰王先生逺叔墓誌先生岳申先友也公以宋景定戊辰辭建昌通判不赴由宣教郎轉奉議郎庚午以著作郎兼崇殿説書入謝兼權都官郎官七月遷著作郎八月考試國子監出院免官歸此銘作於辛未九月葬前距明年壬申正月公易簀前數月耳嗚呼向使先生之子不知乞銘于公即先生世羙雖家藏百年手澤其誰知之其誰知之嗚呼先生可謂有子矣公為文章有歐蘇之羙此誌叙無羙若繁而實不可殺稱先生可謂有而實不可得在公集中為變例多㣲意罕有識者先生能守先人敝廬上遡先大父晏子之心益推廣故相賢徳此意豈愧恊律公與進士結主知與隠士君不愛鄉衮薦而從居謫徙者此豈有為鄉校而致謗尚煩守宰過聼朋友費辭者誌稱先生再被謗并載公所為辨謗者學廢俗偷志感也坡公有言有其實是辭其名者有後先生豈獨辭其名而且不辭其謗是足以有後矣岳申從先君子侍側聞先生躬行為多先生死先君子哭之慟謂岳申曰汝曹不復識王逺叔矣此誌從家藏刻本熟復今從先生之孫璧得覧公遺墨益増感涕念昔先君子之䘮須溪先生命子將孫致奠命岳申曰爾父孝友忠信俯仰不愧怍汝知之乎爾父千里外為他人作孝子爾知之乎嗚呼岳申不孝于是愧先生之子多矣先生有孫又能以時材自樹立不辱其先此豈可與流俗人共語哉岳申不獲辭而竊附姓名以繼世好益著先友代有賢子孫以信文正世徳云璧字君玉即誌所稱璧者有子可教公侯必復在斯乎延祐戊午六月初伏上距公誌之四十八年里後學劉岳申頓首謹書題百鴈圖如此稻粱全無矰繳猶是江南水淺土薄題彭小溪家藏五馬圖以良五馬少見其畫而况真者題子昂竹其翛然也有儒者之意其温然也有王孫之貴其頽然也有茅檐之味其儼然也有玉堂之氣清而不寒髙而不畏古之人與今之人瑞也嗚呼以嗜者尚其致申齋集卷十四
